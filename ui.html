<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0"
/>

<title>
FF API LINK EXTRACTOR
</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{

    background:#050505;

    color:#ffffff;

    font-family:
    Arial,
    sans-serif;

    min-height:100vh;

    padding:18px;
}

.container{

    width:100%;

    max-width:1600px;

    margin:auto;
}

.header{

    text-align:center;

    margin-bottom:25px;
}

.header h1{

    font-size:40px;

    font-weight:900;

    letter-spacing:2px;

    margin-bottom:10px;
}

.header p{

    color:#888;

    font-size:14px;
}

.panel{

    background:#0f0f0f;

    border:
    1px solid #1f1f1f;

    border-radius:22px;

    padding:20px;
}

.topbar{

    display:grid;

    grid-template-columns:
    150px
    1fr
    120px;

    gap:12px;

    margin-bottom:18px;
}

.input{

    width:100%;

    background:#181818;

    border:
    1px solid #292929;

    border-radius:14px;

    padding:16px;

    color:white;

    outline:none;

    font-size:14px;
}

.input:focus{

    border-color:#00a2ff;
}

.run-btn{

    width:100%;

    border:none;

    border-radius:14px;

    padding:16px;

    background:
    linear-gradient(
        135deg,
        #0066ff,
        #00a2ff
    );

    color:white;

    font-weight:900;

    cursor:pointer;

    margin-bottom:18px;

    transition:.2s;
}

.run-btn:hover{

    transform:translateY(-2px);
}

.stats{

    display:grid;

    grid-template-columns:
    repeat(auto-fit,minmax(200px,1fr));

    gap:12px;

    margin-bottom:18px;
}

.stat{

    background:#161616;

    border:
    1px solid #252525;

    border-radius:16px;

    padding:16px;
}

.stat-title{

    color:#888;

    font-size:12px;

    margin-bottom:8px;
}

.stat-value{

    font-size:24px;

    font-weight:900;
}

.search-box{

    margin-bottom:18px;
}

.grid{

    display:grid;

    grid-template-columns:
    1fr 1fr;

    gap:18px;
}

.section{

    background:#0a0a0a;

    border:
    1px solid #1c1c1c;

    border-radius:18px;

    overflow:hidden;
}

.section-header{

    padding:16px;

    background:#121212;

    border-bottom:
    1px solid #1e1e1e;

    font-weight:900;

    font-size:16px;

    color:#00a2ff;
}

.output{

    padding:15px;

    height:620px;

    overflow:auto;

    white-space:pre-wrap;

    word-break:break-word;

    font-family:
    Consolas,
    monospace;

    font-size:13px;

    line-height:1.6;
}

.link-card{

    background:#141414;

    border:
    1px solid #262626;

    border-radius:12px;

    padding:12px;

    margin-bottom:10px;
}

.link-card a{

    color:#55b6ff;

    text-decoration:none;
}

.link-card a:hover{

    text-decoration:underline;
}

.link-type{

    display:inline-block;

    padding:5px 10px;

    border-radius:999px;

    font-size:11px;

    font-weight:900;

    margin-bottom:10px;
}

.image{

    background:#0f3d1d;

    color:#6dff9b;
}

.other{

    background:#3d310f;

    color:#ffd86d;
}

.actions{

    display:flex;

    flex-wrap:wrap;

    gap:12px;

    margin-top:18px;
}

.action-btn{

    flex:1;

    min-width:180px;

    border:none;

    border-radius:14px;

    padding:15px;

    color:white;

    font-weight:900;

    cursor:pointer;

    transition:.2s;
}

.action-btn:hover{

    transform:translateY(-2px);
}

.copy-btn{

    background:
    linear-gradient(
        135deg,
        #18a558,
        #21d07a
    );
}

.download-btn{

    background:
    linear-gradient(
        135deg,
        #ff9800,
        #ffbc42
    );
}

.clear-btn{

    background:
    linear-gradient(
        135deg,
        #ff3b3b,
        #ff6666
    );
}

.footer{

    margin-top:18px;

    text-align:center;

    color:#666;

    font-size:13px;
}

::-webkit-scrollbar{

    width:10px;
}

::-webkit-scrollbar-thumb{

    background:#333;

    border-radius:999px;
}

@media(max-width:1100px){

    .grid{

        grid-template-columns:
        1fr;
    }
}

@media(max-width:700px){

    .topbar{

        grid-template-columns:
        1fr;
    }

    .header h1{

        font-size:28px;
    }

    .output{

        height:450px;
    }
}

</style>

</head>

<body>

<div class="container">

<div class="header">

<h1>
FF API LINK EXTRACTOR
</h1>

<p>
Extract CDN Assets, Images, URLs & Raw API Strings
</p>

</div>

<div class="panel">

<div class="topbar">

<select
id="server"
class="input">

<option value="ind">
IND
</option>

<option value="mea">
MEA
</option>

<option value="id">
ID
</option>

<option value="cis">
CIS
</option>

<option value="br">
BR
</option>

<option value="latam">
LATAM
</option>

<option value="vn">
VN
</option>

<option value="tw">
TW
</option>

<option value="th">
TH
</option>

<option value="sg">
SG
</option>

<option value="eu">
EU
</option>

<option value="na">
NA
</option>

<option value="pk">
PK
</option>

<option value="bd">
BD
</option>

</select>

<input
id="endpoint"
class="input"
placeholder="Enter Endpoint"
/>

<input
id="version"
class="input"
value="OB53"
/>

</div>

<button
class="run-btn"
onclick="runApi()">

RUN API REQUEST

</button>

<div class="stats">

<div class="stat">

<div class="stat-title">
TOTAL LINKS
</div>

<div
id="totalLinks"
class="stat-value">

0

</div>

</div>

<div class="stat">

<div class="stat-title">
RAW STRINGS
</div>

<div
id="totalStrings"
class="stat-value">

0

</div>

</div>

<div class="stat">

<div class="stat-title">
STATUS
</div>

<div
id="status"
class="stat-value">

READY

</div>

</div>

<div class="stat">

<div class="stat-title">
VERSION
</div>

<div
id="versionView"
class="stat-value">

OB53

</div>

</div>

</div>

<div class="search-box">

<input
id="search"
class="input"
placeholder="Search links or raw strings..."
oninput="filterResults()"
/>

</div>

<div class="grid">

<div class="section">

<div class="section-header">

EXTRACTED LINKS

</div>

<div
id="links"
class="output">

No Data

</div>

</div>

<div class="section">

<div class="section-header">

RAW RESPONSE

</div>

<div
id="raw"
class="output">

No Data

</div>

</div>

</div>

<div class="actions">

<button
class="action-btn copy-btn"
onclick="copyLinks()">

COPY LINKS

</button>

<button
class="action-btn download-btn"
onclick="downloadLinks()">

DOWNLOAD LINKS

</button>

<button
class="action-btn clear-btn"
onclick="clearAll()">

CLEAR OUTPUT

</button>

</div>

<div class="footer">

Built For Asset Extraction & Endpoint Testing

</div>

</div>

</div>

<script>

let imageLinks = []
let otherLinks = []
let rawStrings = []

async function runApi(){

    const server =
    document
    .getElementById("server")
    .value

    const endpoint =
    document
    .getElementById("endpoint")
    .value
    .trim()

    const version =
    document
    .getElementById("version")
    .value
    .trim()

    if(!endpoint){

        alert("Enter Endpoint")
        return
    }

    document
    .getElementById("status")
    .innerText =
    "LOADING"

    document
    .getElementById("versionView")
    .innerText =
    version

    try{

        const response =
        await fetch(

            `/run?server=${server}`
            + `&endpoint=${encodeURIComponent(endpoint)}`
            + `&version=${encodeURIComponent(version)}`

        )

        const data =
        await response.json()

        if(data.error){

            document
            .getElementById("status")
            .innerText =
            "ERROR"

            alert(data.error)

            return
        }

        imageLinks =
        data.image_links || []

        otherLinks =
        data.other_links || []

        rawStrings =
        data.raw_strings || []

        const totalLinks =
        imageLinks.length
        + otherLinks.length

        document
        .getElementById("totalLinks")
        .innerText =
        totalLinks

        document
        .getElementById("totalStrings")
        .innerText =
        rawStrings.length

        document
        .getElementById("status")
        .innerText =
        "SUCCESS"

        renderLinks()

        renderRaw(rawStrings)

    }catch(err){

        document
        .getElementById("status")
        .innerText =
        "FAILED"

        alert("Request Failed")
    }
}

function renderLinks(){

    const container =
    document.getElementById("links")

    let html = ""

    imageLinks.forEach(link => {

        html += `

        <div class="link-card">

        <div class="link-type image">

        IMAGE

        </div>

        <a
        href="${link}"
        target="_blank">

        ${link}

        </a>

        </div>

        `
    })

    otherLinks.forEach(link => {

        html += `

        <div class="link-card">

        <div class="link-type other">

        URL

        </div>

        <a
        href="${link}"
        target="_blank">

        ${link}

        </a>

        </div>

        `
    })

    if(!html){

        html = "No Links Found"
    }

    container.innerHTML = html
}

function renderRaw(strings){

    document
    .getElementById("raw")
    .innerText =
    strings.join("\n")
}

function filterResults(){

    const query =
    document
    .getElementById("search")
    .value
    .toLowerCase()

    const filteredImages =
    imageLinks.filter(
        x => x.toLowerCase().includes(query)
    )

    const filteredOthers =
    otherLinks.filter(
        x => x.toLowerCase().includes(query)
    )

    const filteredStrings =
    rawStrings.filter(
        x => x.toLowerCase().includes(query)
    )

    const container =
    document.getElementById("links")

    let html = ""

    filteredImages.forEach(link => {

        html += `

        <div class="link-card">

        <div class="link-type image">

        IMAGE

        </div>

        <a
        href="${link}"
        target="_blank">

        ${link}

        </a>

        </div>

        `
    })

    filteredOthers.forEach(link => {

        html += `

        <div class="link-card">

        <div class="link-type other">

        URL

        </div>

        <a
        href="${link}"
        target="_blank">

        ${link}

        </a>

        </div>

        `
    })

    if(!html){

        html = "No Results"
    }

    container.innerHTML = html

    renderRaw(filteredStrings)
}

function copyLinks(){

    const allLinks = [
        ...imageLinks,
        ...otherLinks
    ]

    if(!allLinks.length){

        alert("No Links")
        return
    }

    navigator.clipboard.writeText(
        allLinks.join("\n")
    )

    alert("Copied")
}

function downloadLinks(){

    const allLinks = [
        ...imageLinks,
        ...otherLinks
    ]

    if(!allLinks.length){

        alert("No Links")
        return
    }

    const blob =
    new Blob(

        [allLinks.join("\n")],

        {
            type:"text/plain"
        }

    )

    const a =
    document.createElement("a")

    a.href =
    URL.createObjectURL(blob)

    a.download =
    "ff_links.txt"

    a.click()
}

function clearAll(){

    imageLinks = []
    otherLinks = []
    rawStrings = []

    document
    .getElementById("links")
    .innerHTML =
    "No Data"

    document
    .getElementById("raw")
    .innerText =
    "No Data"

    document
    .getElementById("totalLinks")
    .innerText =
    "0"

    document
    .getElementById("totalStrings")
    .innerText =
    "0"

    document
    .getElementById("status")
    .innerText =
    "READY"
}

</script>

</body>
</html>
