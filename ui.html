<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1"
/>

<title>
FF API LINK EXTRACTOR
</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{

    background:#050505;

    color:white;

    font-family:
    Arial,
    sans-serif;

    padding:20px;
}

.container{

    max-width:1500px;

    margin:auto;
}

.header{

    text-align:center;

    margin-bottom:25px;
}

.header h1{

    font-size:38px;

    font-weight:900;

    letter-spacing:2px;
}

.header p{

    color:#888;

    margin-top:10px;
}

.panel{

    background:#101010;

    border:
    1px solid #222;

    border-radius:20px;

    padding:20px;
}

.input-grid{

    display:grid;

    grid-template-columns:
    140px
    1fr
    120px;

    gap:12px;

    margin-bottom:18px;
}

.input{

    background:#181818;

    border:
    1px solid #2a2a2a;

    color:white;

    padding:15px;

    border-radius:12px;

    outline:none;

    font-size:14px;
}

.input:focus{

    border-color:#00a2ff;
}

.run-btn{

    width:100%;

    border:none;

    background:
    linear-gradient(
        135deg,
        #0066ff,
        #00a2ff
    );

    color:white;

    padding:15px;

    border-radius:12px;

    cursor:pointer;

    font-weight:800;

    margin-bottom:18px;
}

.run-btn:hover{

    opacity:.9;
}

.stats{

    display:grid;

    grid-template-columns:
    repeat(auto-fit,minmax(180px,1fr));

    gap:12px;

    margin-bottom:18px;
}

.stat{

    background:#161616;

    border:
    1px solid #272727;

    padding:15px;

    border-radius:14px;
}

.stat-title{

    color:#888;

    font-size:12px;

    margin-bottom:8px;
}

.stat-value{

    font-size:22px;

    font-weight:900;
}

.search{

    margin-bottom:15px;
}

.section{

    background:#0a0a0a;

    border:
    1px solid #1c1c1c;

    border-radius:16px;

    padding:15px;

    margin-bottom:20px;
}

.section-title{

    font-size:18px;

    font-weight:900;

    margin-bottom:15px;

    color:#00a2ff;
}

.output{

    max-height:500px;

    overflow:auto;

    white-space:pre-wrap;

    word-break:break-word;

    font-family:
    Consolas,
    monospace;

    font-size:13px;

    line-height:1.6;
}

.link-item{

    background:#141414;

    border:
    1px solid #252525;

    padding:12px;

    border-radius:10px;

    margin-bottom:10px;
}

.link-item a{

    color:#55b6ff;

    text-decoration:none;
}

.link-item a:hover{

    text-decoration:underline;
}

.actions{

    display:flex;

    gap:10px;

    margin-top:15px;

    flex-wrap:wrap;
}

.action{

    flex:1;

    min-width:150px;

    border:none;

    padding:13px;

    border-radius:12px;

    font-weight:800;

    cursor:pointer;

    color:white;
}

.copy{
    background:#18a558;
}

.download{
    background:#ff9800;
}

.clear{
    background:#ff3b3b;
}

.footer{

    margin-top:15px;

    text-align:center;

    color:#666;
}

@media(max-width:700px){

    .input-grid{

        grid-template-columns:
        1fr;
    }

    .header h1{

        font-size:28px;
    }
}

</style>

</head>

<body>

<div class="container">

<div class="header">

<h1>
FF API LINK EXTRACTOR
</h1>

<p>
Auto Detect CDN Assets & Links
</p>

</div>

<div class="panel">

<div class="input-grid">

<select
id="server"
class="input">

<option value="ind">
IND
</option>

<option value="br">
BR
</option>

<option value="na">
NA
</option>

<option value="sg">
SG
</option>

</select>

<input
id="endpoint"
class="input"
placeholder="Enter Endpoint"
/>

<input
id="version"
class="input"
value="OB53"
/>

</div>

<button
class="run-btn"
onclick="runApi()">

RUN API

</button>

<div class="stats">

<div class="stat">

<div class="stat-title">
LINKS FOUND
</div>

<div
class="stat-value"
id="linkCount">

0

</div>

</div>

<div class="stat">

<div class="stat-title">
STRINGS FOUND
</div>

<div
class="stat-value"
id="stringCount">

0

</div>

</div>

<div class="stat">

<div class="stat-title">
STATUS
</div>

<div
class="stat-value"
id="status">

READY

</div>

</div>

</div>

<input
id="search"
class="input search"
placeholder="Find links or strings..."
oninput="filterResults()"
/>

<div class="section">

<div class="section-title">

EXTRACTED LINKS

</div>

<div
id="links"
class="output">

No Data

</div>

</div>

<div class="section">

<div class="section-title">

RAW RESPONSE

</div>

<div
id="raw"
class="output">

No Data

</div>

</div>

<div class="actions">

<button
class="action copy"
onclick="copyLinks()">

COPY LINKS

</button>

<button
class="action download"
onclick="downloadLinks()">

DOWNLOAD

</button>

<button
class="action clear"
onclick="clearAll()">

CLEAR

</button>

</div>

<div class="footer">

Powered By Flask + Vercel

</div>

</div>

</div>

<script>

let currentLinks = []
let currentStrings = []

async function runApi(){

    const server =
    document
    .getElementById("server")
    .value

    const endpoint =
    document
    .getElementById("endpoint")
    .value
    .trim()

    const version =
    document
    .getElementById("version")
    .value
    .trim()

    if(!endpoint){

        alert("Enter Endpoint")
        return
    }

    document
    .getElementById("status")
    .innerText =
    "LOADING"

    try{

        const response =
        await fetch(

            `/run?server=${server}`
            + `&endpoint=${encodeURIComponent(endpoint)}`
            + `&version=${encodeURIComponent(version)}`

        )

        const data =
        await response.json()

        if(data.error){

            document
            .getElementById("status")
            .innerText =
            "ERROR"

            alert(data.error)

            return
        }

        currentLinks =
        data.links || []

        currentStrings =
        data.strings || []

        document
        .getElementById("linkCount")
        .innerText =
        currentLinks.length

        document
        .getElementById("stringCount")
        .innerText =
        currentStrings.length

        document
        .getElementById("status")
        .innerText =
        "SUCCESS"

        renderLinks(
            currentLinks
        )

        renderRaw(
            currentStrings
        )

    }catch(err){

        document
        .getElementById("status")
        .innerText =
        "FAILED"

        alert("Request Failed")
    }
}

function renderLinks(links){

    const container =
    document.getElementById("links")

    if(!links.length){

        container.innerHTML =
        "No Links Found"

        return
    }

    container.innerHTML =
    links.map(link => `

        <div class="link-item">

        <a
        href="${link}"
        target="_blank">

        ${link}

        </a>

        </div>

    `).join("")
}

function renderRaw(strings){

    document
    .getElementById("raw")
    .innerText =
    strings.join("\n")
}

function filterResults(){

    const q =
    document
    .getElementById("search")
    .value
    .toLowerCase()

    const filteredLinks =
    currentLinks.filter(
        x => x.toLowerCase().includes(q)
    )

    const filteredStrings =
    currentStrings.filter(
        x => x.toLowerCase().includes(q)
    )

    renderLinks(filteredLinks)

    renderRaw(filteredStrings)
}

function copyLinks(){

    navigator.clipboard.writeText(
        currentLinks.join("\n")
    )

    alert("Copied")
}

function downloadLinks(){

    const blob =
    new Blob(
        [currentLinks.join("\n")],
        {
            type:"text/plain"
        }
    )

    const a =
    document.createElement("a")

    a.href =
    URL.createObjectURL(blob)

    a.download =
    "links.txt"

    a.click()
}

function clearAll(){

    currentLinks = []
    currentStrings = []

    document
    .getElementById("links")
    .innerHTML =
    "No Data"

    document
    .getElementById("raw")
    .innerText =
    "No Data"

    document
    .getElementById("status")
    .innerText =
    "READY"

    document
    .getElementById("linkCount")
    .innerText =
    "0"

    document
    .getElementById("stringCount")
    .innerText =
    "0"
}

</script>

</body>
</html>
