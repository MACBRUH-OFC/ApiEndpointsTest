<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">

<title>FREE FIRE API TOOL</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>
@font-face {
    font-family: 'GFF';
    src: url('https://dl.dir.freefiremobile.com/common/web_event/common/fonts/website/GFFLatinW05-Bold.woff') format('woff');
}

:root {
    --yellow: #ffde00;
    --yellow-glow: rgba(255, 222, 0, 0.15);
    --bg: #070707;
    --panel: rgba(13, 13, 13, 0.96);
    --panel-card: #141414;
    --border: #222222;
    --border-focus: #3d3d3d;
    --green: #00ff95;
    --red: #ff4343;
    --blue: #38bdf8;
    --text: #ffffff;
    --muted: #888888;
    
    /* Highlight styles */
    --highlight-bg: #ffe600;
    --highlight-text: #000000;
    --highlight-active-bg: #ff6a00;
}

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    background: #000;
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
    min-height: 100vh;
    background-image: url('https://dl.dir.freefiremobile.com/common/web_event/official2/dist/client/img/bg_pc.617c669.jpg');
    background-size: cover;
    background-position: center;
    background-attachment: fixed;
    overflow-x: hidden;
}

body::before {
    content: "";
    position: fixed;
    inset: 0;
    background: linear-gradient(180deg, rgba(0,0,0,0.85) 0%, rgba(0,0,0,0.96) 100%);
    z-index: -1;
}

/* Custom Scrollbar for Premium Look */
::-webkit-scrollbar {
    width: 8px;
    height: 8px;
}
::-webkit-scrollbar-track {
    background: #0a0a0a;
}
::-webkit-scrollbar-thumb {
    background: #252525;
    border-radius: 4px;
}
::-webkit-scrollbar-thumb:hover {
    background: var(--yellow);
}

.gff {
    font-family: 'GFF', Arial, sans-serif;
    letter-spacing: 0.5px;
}

.topbar {
    width: 100%;
    height: 75px;
    border-bottom: 2px solid var(--yellow);
    display: flex;
    align-items: center;
    justify-content: center;
    background: rgba(0, 0, 0, 0.9);
    backdrop-filter: blur(10px);
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 4px 20px rgba(0,0,0,0.5);
}

.topbar img {
    height: 32px;
    filter: drop-shadow(0 0 8px rgba(255,222,0,0.2));
}

.wrapper {
    width: 100%;
    max-width: 1200px;
    margin: auto;
    padding: 30px 20px;
}

.hero {
    text-align: center;
    margin-bottom: 30px;
}

.hero h1 {
    font-size: 52px;
    line-height: 1.0;
    font-style: italic;
    text-transform: uppercase;
    text-shadow: 0 4px 12px rgba(0,0,0,0.5);
}

.hero h1 span {
    color: var(--yellow);
    filter: drop-shadow(0 0 10px var(--yellow-glow));
}

.badge {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 6px 16px;
    background: rgba(20, 20, 20, 0.8);
    border: 1px solid var(--border);
    border-radius: 999px;
    margin-bottom: 16px;
    font-size: 12px;
    font-weight: bold;
    letter-spacing: 1px;
}

.dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--yellow);
    box-shadow: 0 0 10px var(--yellow);
}

.panel {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 24px;
    box-shadow: 0 25px 60px rgba(0, 0, 0, 0.8);
    backdrop-filter: blur(12px);
}

.input-box {
    width: 100%;
    height: 56px;
    border-radius: 14px;
    border: 1px solid var(--border);
    background: #0a0a0a;
    color: #fff;
    padding: 0 20px;
    font-size: 15px;
    font-weight: 500;
    outline: none;
    margin-bottom: 20px;
    transition: all 0.2s ease;
}

.input-box:focus {
    border-color: var(--yellow);
    box-shadow: 0 0 15px var(--yellow-glow);
}

.server-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(95px, 1fr));
    gap: 8px;
    margin-bottom: 20px;
}

.server-btn {
    height: 44px;
    border: 1px solid var(--border);
    border-radius: 10px;
    background: var(--panel-card);
    color: #aeaeae;
    cursor: pointer;
    font-weight: 700;
    transition: all 0.15s ease;
    font-size: 13px;
    letter-spacing: 0.5px;
}

.server-btn:hover {
    border-color: #555;
    color: #fff;
    transform: translateY(-1px);
}

.server-btn.active {
    background: var(--yellow);
    border-color: var(--yellow);
    color: #000;
    box-shadow: 0 4px 15px var(--yellow-glow);
}

.option-row {
    display: flex;
    flex-wrap: wrap;
    gap: 12px;
    margin-bottom: 20px;
}

.option-card {
    flex: 1;
    min-width: 160px;
    height: 52px;
    background: var(--panel-card);
    border: 1px solid var(--border);
    border-radius: 12px;
    display: flex;
    align-items: center;
    padding: 0 16px;
    gap: 12px;
    cursor: pointer;
    user-select: none;
    transition: border 0.2s;
}

.option-card:hover {
    border-color: var(--border-focus);
}

.option-card input {
    width: 18px;
    height: 18px;
    accent-color: var(--yellow);
    cursor: pointer;
}

.option-card span {
    font-size: 13px;
    font-weight: 700;
    color: #d1d1d1;
    letter-spacing: 0.5px;
}

.run-btn {
    width: 100%;
    height: 58px;
    border: none;
    border-radius: 14px;
    background: var(--yellow);
    color: #000;
    font-size: 16px;
    font-weight: 900;
    cursor: pointer;
    transition: all 0.2s ease;
    margin-bottom: 24px;
    text-transform: uppercase;
    box-shadow: 0 4px 20px rgba(255, 222, 0, 0.1);
}

.run-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 25px rgba(255, 222, 0, 0.25);
}

.run-btn:active {
    transform: translateY(0);
}

.stats {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    gap: 12px;
    margin-bottom: 24px;
}

.stat-box {
    background: var(--panel-card);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 16px;
    position: relative;
    overflow: hidden;
}

.stat-title {
    font-size: 11px;
    color: var(--muted);
    margin-bottom: 6px;
    text-transform: uppercase;
    letter-spacing: 1px;
    font-weight: 600;
}

.stat-value {
    font-size: 24px;
    font-weight: 900;
    color: var(--text);
}

.stat-box[data-status="SUCCESS"] .stat-value { color: var(--green); }
.stat-box[data-status="FAILED"] .stat-value,
.stat-box[data-status="ERROR"] .stat-value { color: var(--red); }
.stat-box[data-status="LOADING"] .stat-value { color: var(--yellow); }

.toolbar {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-bottom: 16px;
}

.tool-btn {
    height: 40px;
    padding: 0 16px;
    border: 1px solid var(--border);
    border-radius: 10px;
    background: var(--panel-card);
    color: #e0e0e0;
    cursor: pointer;
    font-weight: bold;
    font-size: 13px;
    display: flex;
    align-items: center;
    gap: 8px;
    transition: all 0.15s;
}

.tool-btn:hover {
    border-color: #555;
    background: #1a1a1a;
    color: #fff;
}

/* Search Wrapper & Controls styling */
.search-container {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 14px;
    background: #0a0a0a;
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 0 8px 0 16px;
    transition: all 0.2s ease;
}

.search-container:focus-within {
    border-color: var(--yellow);
    box-shadow: 0 0 12px var(--yellow-glow);
}

.search-icon {
    color: #555;
    font-size: 14px;
}

.search-box {
    flex: 1;
    height: 48px;
    background: transparent;
    border: none;
    color: #fff;
    outline: none;
    font-size: 14px;
    padding-right: 8px;
}

.search-nav-controls {
    display: flex;
    align-items: center;
    gap: 4px;
    color: var(--muted);
    font-size: 12px;
    user-select: none;
}

.search-count {
    margin-right: 8px;
    font-weight: 600;
    font-variant-numeric: tabular-nums;
}

.search-nav-btn {
    width: 32px;
    height: 32px;
    border: 1px solid var(--border);
    background: var(--panel-card);
    color: #fff;
    border-radius: 8px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s;
}

.search-nav-btn:hover:not(:disabled) {
    background: #222;
    border-color: #606060;
}

.search-nav-btn:disabled {
    opacity: 0.3;
    cursor: not-allowed;
}

.output {
    width: 100%;
    height: 550px;
    background: #050505;
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 20px;
    overflow: auto;
    white-space: pre-wrap;
    word-break: break-word;
    line-height: 1.6;
    font-size: 14px;
    color: #dcdcdc;
    font-family: 'Courier New', Courier, monospace;
}

/* Real-time Highlighting Classes */
mark.search-match {
    background-color: var(--highlight-bg);
    color: var(--highlight-text);
    border-radius: 2px;
    box-shadow: 0 0 4px var(--highlight-bg);
}

mark.search-match.match-active {
    background-color: var(--highlight-active-bg);
    color: #fff;
    box-shadow: 0 0 8px var(--highlight-active-bg);
}

.link-item {
    padding: 12px 16px;
    background: var(--panel-card);
    border: 1px solid var(--border);
    border-radius: 10px;
    margin-bottom: 8px;
    transition: all 0.2s ease;
    display: flex;
    align-items: center;
}

.link-item:hover {
    border-color: #444;
    background: #181818;
    transform: translateX(2px);
}

.link-item a {
    color: var(--blue);
    text-decoration: none;
    word-break: break-all;
    font-size: 13.5px;
}

.link-item a:hover {
    text-decoration: underline;
}

/* Toast Notification styling */
.toast {
    position: fixed;
    bottom: 24px;
    right: 24px;
    background: var(--yellow);
    color: #000;
    padding: 12px 24px;
    border-radius: 10px;
    font-weight: bold;
    box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    transform: translateY(100px);
    opacity: 0;
    transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    z-index: 1000;
}

.toast.show {
    transform: translateY(0);
    opacity: 1;
}

.loading {
    color: var(--yellow);
    display: flex;
    align-items: center;
    gap: 10px;
    font-weight: bold;
    animation: pulse 1.5s infinite ease-in-out;
}

@keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
}

@media (max-width: 768px) {
    .hero h1 { font-size: 36px; }
    .wrapper { padding: 15px 10px; }
    .panel { padding: 16px; }
    .server-grid { grid-template-columns: repeat(4, 1fr); }
    .output { height: 450px; }
}
</style>
</head>
<body>

<div class="topbar">
    <img src="https://dl.dir.freefiremobile.com/common/web_event/official2/dist/client/img/full_logo.969f536.png" alt="Free Fire Logo">
</div>

<div class="wrapper">

    <div class="hero gff">
        <div class="badge">
            <div class="dot"></div>
            <span>LIVE API RESPONSE ANALYZER</span>
        </div>
        <h1>FREE FIRE<br><span>API TOOL</span></h1>
    </div>

    <div class="panel">

        <input type="text" id="apiName" class="input-box" placeholder="ENTER API NAME OR PATH...">

        <div class="server-grid">
            <button class="server-btn active" onclick="setServer(this,'ind')">IND</button>
            <button class="server-btn" onclick="setServer(this,'mea')">MEA</button>
            <button class="server-btn" onclick="setServer(this,'id')">ID</button>
            <button class="server-btn" onclick="setServer(this,'cis')">CIS</button>
            <button class="server-btn" onclick="setServer(this,'br')">BR</button>
            <button class="server-btn" onclick="setServer(this,'latam')">LATAM</button>
            <button class="server-btn" onclick="setServer(this,'vn')">VN</button>
            <button class="server-btn" onclick="setServer(this,'tw')">TW</button>
            <button class="server-btn" onclick="setServer(this,'th')">TH</button>
            <button class="server-btn" onclick="setServer(this,'sg')">SG</button>
            <button class="server-btn" onclick="setServer(this,'eu')">EU</button>
            <button class="server-btn" onclick="setServer(this,'na')">NA</button>
            <button class="server-btn" onclick="setServer(this,'pk')">PK</button>
            <button class="server-btn" onclick="setServer(this,'bd')">BD</button>
        </div>

        <div class="option-row">
            <div class="option-card" onclick="toggleOption('showLinks')">
                <input type="checkbox" id="showLinks" checked onclick="event.stopPropagation(); handleOptionChange();">
                <span>LINKS ONLY</span>
            </div>
            <div class="option-card" onclick="toggleOption('showRaw')">
                <input type="checkbox" id="showRaw" onclick="event.stopPropagation(); handleOptionChange();">
                <span>RAW RESPONSE</span>
            </div>
            <div class="option-card" onclick="toggleOption('showStrings')">
                <input type="checkbox" id="showStrings" onclick="event.stopPropagation(); handleOptionChange();">
                <span>ALL STRINGS</span>
            </div>
        </div>

        <button class="run-btn gff" onclick="runAPI()">
            RUN API SCAN
        </button>

        <div class="stats">
            <div class="stat-box">
                <div class="stat-title">TOTAL STRINGS</div>
                <div class="stat-value" id="stringCount">0</div>
            </div>
            <div class="stat-box">
                <div class="stat-title">TOTAL LINKS</div>
                <div class="stat-value" id="linkCount">0</div>
            </div>
            <div class="stat-box" id="statusBox">
                <div class="stat-title">STATUS</div>
                <div class="stat-value" id="statusText">IDLE</div>
            </div>
        </div>

        <div class="toolbar">
            <button class="tool-btn" onclick="copyOutput()">
                <i class="fa-solid fa-copy"></i> COPY
            </button>
            <button class="tool-btn" onclick="downloadOutput()">
                <i class="fa-solid fa-download"></i> DOWNLOAD
            </button>
            <button class="tool-btn" onclick="clearOutput()">
                <i class="fa-solid fa-trash"></i> CLEAR
            </button>
        </div>

        <!-- Upgraded Premium Search Wrapper Controls -->
        <div class="search-container">
            <i class="fa-solid fa-magnifying-glass search-icon"></i>
            <input type="text" class="search-box" id="searchBox" placeholder="SEARCH INSIDE ACTIVE RESULTS view..." oninput="performSearch()">
            <div class="search-nav-controls">
                <span class="search-count" id="searchCount">0/0</span>
                <button class="search-nav-btn" id="prevSearchBtn" onclick="navigateSearch(-1)" title="Previous match (Shift+Enter)" disabled>
                    <i class="fa-solid fa-arrow-up"></i>
                </button>
                <button class="search-nav-btn" id="nextSearchBtn" onclick="navigateSearch(1)" title="Next match (Enter)" disabled>
                    <i class="fa-solid fa-arrow-down"></i>
                </button>
            </div>
        </div>

        <div class="output" id="output">READY</div>

    </div>
</div>

<div class="toast" id="toastNotification">COPIED TO高度CLIPBOARD</div>

<script>
let selectedServer = "ind";
let lastOutput = "";
let currentLinks = [];
let apiDataPayload = null; // Caches the active raw JSON payload object

// Dom element mapping cache
let searchMatches = [];
let currentMatchIndex = -1;

function setServer(btn, server) {
    selectedServer = server;
    document.querySelectorAll(".server-btn").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
}

function toggleOption(id) {
    const check = document.getElementById(id);
    check.checked = !check.checked;
    handleOptionChange();
}

function handleOptionChange() {
    if (apiDataPayload) {
        renderOutput(apiDataPayload);
    }
}

function updateStatusUI(status) {
    const txt = document.getElementById("statusText");
    const box = document.getElementById("statusBox");
    txt.innerText = status;
    box.setAttribute("data-status", status);
}

function showToast(msg) {
    const toast = document.getElementById("toastNotification");
    toast.innerText = msg;
    toast.classList.add("show");
    setTimeout(() => {
        toast.classList.remove("show");
    }, 2000);
}

async function runAPI() {
    const apiName = document.getElementById("apiName").value.trim();
    if (!apiName) {
        alert("PLEASE ENTER AN API NAME OR PATH");
        return;
    }

    updateStatusUI("LOADING");
    document.getElementById("output").innerHTML = '<div class="loading"><i class="fa-solid fa-spinner fa-spin"></i> FETCHING API RESPONSE...</div>';
    resetSearchState();

    try {
        const res = await fetch(`/run_script?server=${selectedServer}&name=${encodeURIComponent(apiName)}`);
        const data = await res.json();

        if (data.error) {
            updateStatusUI("ERROR");
            document.getElementById("output").innerHTML = `<div style="color:var(--red); font-weight:bold;"><i class="fa-solid fa-triangle-exclamation"></i> ${data.error}</div>`;
            return;
        }

        document.getElementById("stringCount").innerText = data.count || 0;
        document.getElementById("linkCount").innerText = data.raw_count || 0;
        updateStatusUI("SUCCESS");

        currentLinks = data.urls || [];
        apiDataPayload = data; 
        
        renderOutput(data);

    } catch (err) {
        updateStatusUI("FAILED");
        document.getElementById("output").innerHTML = `<div style="color:var(--red); font-weight:bold;"><i class="fa-solid fa-circle-xmark"></i> LIVE REQUEST CONNECTION FAILED</div>`;
    }
}

function renderOutput(data) {
    const output = document.getElementById("output");
    const showLinks = document.getElementById("showLinks").checked;
    const showRaw = document.getElementById("showRaw").checked;
    const showStrings = document.getElementById("showStrings").checked;

    if (showRaw) {
        lastOutput = data.raw_response || "";
        output.textContent = lastOutput;
    } else if (showStrings) {
        lastOutput = (data.strings || []).join("\n");
        output.textContent = lastOutput;
    } else if (showLinks) {
        if (!currentLinks || currentLinks.length === 0) {
            output.innerHTML = `<div style="color:var(--muted); font-style:italic;">No extracted URLs found.</div>`;
            lastOutput = "";
        } else {
            let html = "";
            currentLinks.forEach(link => {
                html += `<div class="link-item"><a href="${link}" target="_blank">${link}</a></div>`;
            });
            output.innerHTML = html;
            lastOutput = currentLinks.join("\n");
        }
    }
    // Re-trigger search optimization processing rule over newly populated DOM view content
    performSearch();
}

function copyOutput() {
    if (!lastOutput) {
        alert("NOTHING TO COPY");
        return;
    }
    navigator.clipboard.writeText(lastOutput);
    showToast("OUTPUT COPIED TO CLIPBOARD");
}

function clearOutput() {
    document.getElementById("output").innerHTML = "READY";
    document.getElementById("stringCount").innerText = "0";
    document.getElementById("linkCount").innerText = "0";
    updateStatusUI("IDLE");
    lastOutput = "";
    apiDataPayload = null;
    currentLinks = [];
    resetSearchState();
    showToast("DASHBOARD CLEARED");
}

function downloadOutput() {
    if (!lastOutput) {
        alert("NO DATA PRESENT TO DOWNLOAD");
        return;
    }
    const blob = new Blob([lastOutput], { type: "text/plain" });
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = `ff_api_output_${selectedServer}.txt`;
    a.click();
}

/* ==========================================================================
   ADVANCED DOM INTERACTIVE SEARCH HIGHLIGHT & NAVIGATION SYSTEM
   ========================================================================== */

function resetSearchState() {
    searchMatches = [];
    currentMatchIndex = -1;
    document.getElementById("searchCount").innerText = "0/0";
    document.getElementById("prevSearchBtn").disabled = true;
    document.getElementById("nextSearchBtn").disabled = true;
}

function performSearch() {
    const query = document.getElementById("searchBox").value.trim();
    const output = document.getElementById("output");
    
    // Clear dynamic matching structures if search is empty
    if (!query) {
        resetSearchState();
        // Remove highlight nodes by forcing render standard configurations
        if (apiDataPayload) {
            const showLinks = document.getElementById("showLinks").checked;
            const showRaw = document.getElementById("showRaw").checked;
            const showStrings = document.getElementById("showStrings").checked;
            
            if (showRaw || showStrings) {
                output.textContent = lastOutput;
            } else if (showLinks) {
                let html = "";
                currentLinks.forEach(link => {
                    html += `<div class="link-item"><a href="${link}" target="_blank">${link}</a></div>`;
                });
                output.innerHTML = html;
            }
        }
        return;
    }

    const isHtmlMode = document.getElementById("showLinks").checked && !document.getElementById("showRaw").checked && !document.getElementById("showStrings").checked;

    if (isHtmlMode) {
        // Search across structured HTML Link elements
        let html = "";
        currentLinks.forEach(link => {
            html += `<div class="link-item"><a href="${link}" target="_blank">${link}</a></div>`;
        });
        output.innerHTML = html;
        
        // Execute targeting against container nodes
        highlightTextNodes(output, query);
    } else {
        // Plaintext Raw mapping view execution
        output.textContent = lastOutput;
        highlightTextNodes(output, query);
    }

    // Collect array targets of all dynamically spawned highlights
    searchMatches = Array.from(output.querySelectorAll("mark.search-match"));
    
    if (searchMatches.length > 0) {
        currentMatchIndex = 0;
        updateSearchUI();
        highlightActiveMatch();
    } else {
        currentMatchIndex = -1;
        updateSearchUI();
    }
}

// Recursive DOM text tokenizer matching highlighter 
function highlightTextNodes(rootElement, query) {
    const regex = new RegExp(`(${escapeRegExp(query)})`, "gi");
    
    function walk(node) {
        if (node.nodeType === Node.TEXT_NODE) {
            if (node.textContent.match(regex)) {
                const span = document.createElement("span");
                span.innerHTML = node.textContent.replace(regex, `<mark class="search-match">$1</mark>`);
                node.parentNode.replaceChild(span, node);
            }
        } else if (node.nodeType === Node.ELEMENT_NODE && node.nodeName !== 'MARK' && node.nodeName !== 'SCRIPT' && node.nodeName !== 'STYLE') {
            for (let i = node.childNodes.length - 1; i >= 0; i--) {
                walk(node.childNodes[i]);
            }
        }
    }
    walk(rootElement);
}

function escapeRegExp(string) {
    return string.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
}

function updateSearchUI() {
    const total = searchMatches.length;
    const active = total > 0 ? currentMatchIndex + 1 : 0;
    
    document.getElementById("searchCount").innerText = `${active}/${total}`;
    
    const disabledState = total === 0;
    document.getElementById("prevSearchBtn").disabled = disabledState;
    document.getElementById("nextSearchBtn").disabled = disabledState;
}

function highlightActiveMatch() {
    // Clear active highlight context positions
    searchMatches.forEach(el => el.classList.remove("match-active"));
    
    if (currentMatchIndex >= 0 && currentMatchIndex < searchMatches.length) {
        const activeTarget = searchMatches[currentMatchIndex];
        activeTarget.classList.add("match-active");
        
        // Smoothly scroll container track views direct into frame viewport orientation
        activeTarget.scrollIntoView({
            behavior: "smooth",
            block: "center"
        });
    }
}

function navigateSearch(direction) {
    if (searchMatches.length === 0) return;
    
    currentMatchIndex += direction;
    
    // Bounds wrapping execution rules
    if (currentMatchIndex >= searchMatches.length) {
        currentMatchIndex = 0;
    } else if (currentMatchIndex < 0) {
        currentMatchIndex = searchMatches.length - 1;
    }
    
    updateSearchUI();
    highlightActiveMatch();
}

// Bind universal dashboard key listeners for pro search tools orientation
document.getElementById("searchBox").addEventListener("keydown", function(e) {
    if (searchMatches.length === 0) return;
    
    if (e.key === "Enter") {
        e.preventDefault();
        if (e.shiftKey) {
            navigateSearch(-1); // Shift+Enter jumps to previous match
        } else {
            navigateSearch(1);  // Enter jumps to next match
        }
    }
});
</script>
