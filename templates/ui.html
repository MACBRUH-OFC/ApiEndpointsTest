<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>Free Fire API Tool</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>

body{
background:#050505;
color:white;
font-family:Arial,sans-serif;
padding:20px;
}

.card{
background:#111;
border:1px solid #222;
border-radius:18px;
padding:18px;
}

.server-btn{
padding:12px;
border-radius:12px;
background:#191919;
border:1px solid #2a2a2a;
cursor:pointer;
transition:.2s;
font-size:13px;
}

.server-btn:hover{
background:#ffde00;
color:black;
}

.server-btn.active{
background:#ffde00;
color:black;
}

.link{
background:#0d0d0d;
border:1px solid #1e1e1e;
padding:10px;
border-radius:12px;
word-break:break-all;
}

input{
background:#0c0c0c;
border:1px solid #222;
padding:14px;
border-radius:14px;
width:100%;
outline:none;
color:white;
}

</style>

</head>

<body>

<div class="max-w-7xl mx-auto space-y-5">

<div class="text-center">

<h1 class="text-5xl font-black text-yellow-400">
FF API TOOL
</h1>

<p class="text-zinc-400 mt-2">
Link Extractor + Raw Debug
</p>

</div>

<div class="card space-y-5">

<input
id="api"
placeholder="Enter API Name"
/>

<div
id="servers"
class="grid grid-cols-2 md:grid-cols-4 gap-3"
></div>

<button
onclick="run()"
class="w-full bg-yellow-400 text-black font-black p-4 rounded-2xl"
>
RUN API
</button>

<div class="grid grid-cols-2 md:grid-cols-4 gap-3">

<div class="card">
<div class="text-zinc-500 text-sm">LINKS</div>
<div id="count" class="text-3xl font-bold">0</div>
</div>

<div class="card">
<div class="text-zinc-500 text-sm">STATUS</div>
<div id="status" class="text-3xl font-bold">0</div>
</div>

<div class="card">
<div class="text-zinc-500 text-sm">RAW SIZE</div>
<div id="rawsize" class="text-3xl font-bold">0</div>
</div>

<div class="card">
<div class="text-zinc-500 text-sm">STRINGS</div>
<div id="stringscount" class="text-3xl font-bold">0</div>
</div>

</div>

<input
id="search"
placeholder="Search links..."
oninput="renderLinks()"
/>

<div class="flex gap-5 flex-wrap">

<label>
<input type="checkbox" id="preview" checked>
 Preview
</label>

<label>
<input type="checkbox" id="images" checked>
 Images
</label>

<label>
<input type="checkbox" id="html" checked>
 HTML
</label>

<label>
<input type="checkbox" id="json" checked>
 JSON
</label>

</div>

<div class="flex gap-3">

<button
onclick="downloadLinks()"
class="bg-zinc-800 px-5 py-3 rounded-xl"
>
Download Links
</button>

<button
onclick="downloadStrings()"
class="bg-zinc-800 px-5 py-3 rounded-xl"
>
Download Strings
</button>

</div>

</div>

<div
id="results"
class="space-y-3"
></div>

</div>

<script>

const regions = [
"ind","mea","id","cis","br","latam",
"vn","tw","th","sg","eu","na","pk","bd"
]

let selectedServer = "ind"

let currentLinks = []

let currentStrings = []

const servers = document.getElementById("servers")

regions.forEach(region=>{

const btn = document.createElement("button")

btn.className = "server-btn"

btn.innerText = region.toUpperCase()

if(region==="ind"){
btn.classList.add("active")
}

btn.onclick = ()=>{

document
.querySelectorAll(".server-btn")
.forEach(x=>x.classList.remove("active"))

btn.classList.add("active")

selectedServer = region

}

servers.appendChild(btn)

})

async function run(){

const api = document
.getElementById("api")
.value
.trim()

if(!api){
alert("Enter API")
return
}

document.getElementById("results").innerHTML =
"<div class='text-yellow-400'>Loading...</div>"

try{

const response = await fetch(
`/run_script?server=${selectedServer}&name=${encodeURIComponent(api)}`
)

const data = await response.json()

if(!data.success){

document.getElementById("results").innerHTML =
`<div class="text-red-500">${data.error}</div>`

return

}

currentLinks = data.links || []

currentStrings = data.strings || []

document.getElementById("count").innerText =
data.count

document.getElementById("status").innerText =
data.status

document.getElementById("rawsize").innerText =
data.raw_size

document.getElementById("stringscount").innerText =
data.strings_count

renderLinks()

}catch(err){

document.getElementById("results").innerHTML =
`<div class="text-red-500">${err}</div>`

}

}

function renderLinks(){

const search = document
.getElementById("search")
.value
.toLowerCase()

const preview =
document.getElementById("preview").checked

const images =
document.getElementById("images").checked

const html =
document.getElementById("html").checked

const json =
document.getElementById("json").checked

const results =
document.getElementById("results")

results.innerHTML = ""

let filtered = currentLinks.filter(link=>{

if(search && !link.toLowerCase().includes(search)){
return false
}

if(!images){

if(link.match(/\.(png|jpg|jpeg|webp|gif|ktx)$/i)){
return false
}

}

if(!html){

if(link.includes(".html")){
return false
}

}

if(!json){

if(link.includes(".json")){
return false
}

}

return true

})

if(filtered.length===0){

results.innerHTML =
"<div class='text-zinc-500'>No links found</div>"

return

}

filtered.forEach(link=>{

const div = document.createElement("div")

div.className = "link"

div.innerHTML = `

<div class="flex justify-between gap-3">

<a
href="${link}"
target="_blank"
class="text-cyan-400"
>
${link}
</a>

<button
onclick="copyLink('${link}')"
class="text-yellow-400"
>
COPY
</button>

</div>

${preview ? getPreview(link) : ""}

`

results.appendChild(div)

})

}

function getPreview(link){

if(link.match(/\.(png|jpg|jpeg|webp|gif)$/i)){

return `
<img
src="${link}"
class="mt-3 rounded-xl border border-zinc-800 max-h-72"
/>
`

}

return ""

}

function copyLink(link){

navigator.clipboard.writeText(link)

}

function downloadLinks(){

if(currentLinks.length===0){
return
}

const blob = new Blob(
[currentLinks.join("\n")],
{type:"text/plain"}
)

const a = document.createElement("a")

a.href = URL.createObjectURL(blob)

a.download = "links.txt"

a.click()

}

function downloadStrings(){

if(currentStrings.length===0){
return
}

const blob = new Blob(
[currentStrings.join("\n")],
{type:"text/plain"}
)

const a = document.createElement("a")

a.href = URL.createObjectURL(blob)

a.download = "strings.txt"

a.click()

}

</script>

</body>
</html>
