<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>FREE FIRE API ENGINE - CONTROL DECK</title>

<link rel="preconnect" href="https://fonts.googleapis.com">

<style>
@font-face {
    font-family: 'GFF';
    src: url('https://dl.dir.freefiremobile.com/common/web_event/common/fonts/website/GFFLatinW05-Bold.woff') format('woff');
}

:root {
    --yellow: #ffde00;
    --bg: #030303;
    --panel: #0a0a0a;
    --card: #0e0e0e;
    --border: #161616;
    --border-hover: #2a2a2a;
    --text: #dfdfdf;
    --muted: #5e5e5e;
    
    /* Contrast highlights */
    --match-bg: #ffe600;
    --match-text: #000000;
    --match-active: #ff5e00;
}

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    background-color: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    min-height: 100vh;
    letter-spacing: -0.2px;
}

/* Scrollbar styles */
::-webkit-scrollbar {
    width: 6px;
    height: 6px;
}
::-webkit-scrollbar-track {
    background: #000000;
}
::-webkit-scrollbar-thumb {
    background: #181818;
    border-radius: 3px;
}
::-webkit-scrollbar-thumb:hover {
    background: var(--yellow);
}

.wrapper {
    width: 100%;
    max-width: 1100px;
    margin: 0 auto;
    padding: 40px 24px;
}

/* Header Optimization */
header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid var(--border);
    padding-bottom: 20px;
    margin-bottom: 32px;
}

.brand-group {
    display: flex;
    align-items: center;
    gap: 16px;
}

.brand-logo {
    height: 24px;
    object-fit: contain;
}

.badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 4px 10px;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 6px;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.5px;
    color: var(--muted);
}

.dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--yellow);
    box-shadow: 0 0 8px var(--yellow);
    animation: pulseGlow 2s infinite alternate;
}

@keyframes pulseGlow {
    0% { transform: scale(0.9); box-shadow: 0 0 4px var(--yellow); }
    100% { transform: scale(1.1); box-shadow: 0 0 12px var(--yellow); }
}

.engine-title {
    font-family: 'GFF', sans-serif;
    font-size: 18px;
    font-style: italic;
    text-transform: uppercase;
}
.engine-title span {
    color: var(--yellow);
}

/* Core Dashboard Layout */
.app-panel {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 24px;
    box-shadow: 0 10px 30px rgba(0, 0, 0, 0.55);
}

/* Structured options container look */
.control-container {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 16px;
    margin-bottom: 24px;
}

/* Input design */
.input-row {
    position: relative;
    margin-bottom: 12px;
}

.main-input {
    width: 100%;
    height: 52px;
    background: #000000;
    border: 1px solid var(--border);
    border-radius: 8px;
    color: #ffffff;
    padding: 0 140px 0 16px;
    font-size: 14px;
    font-family: monospace;
    outline: none;
    transition: all 0.2s ease;
}

.main-input:focus {
    border-color: var(--yellow);
    box-shadow: 0 0 14px rgba(255, 222, 0, 0.12);
}

.run-action-btn {
    position: absolute;
    right: 6px;
    top: 6px;
    height: 40px;
    padding: 0 20px;
    background: var(--yellow);
    border: none;
    border-radius: 6px;
    color: #000000;
    font-family: 'GFF', sans-serif;
    font-size: 13px;
    font-weight: 900;
    cursor: pointer;
    transition: background 0.15s ease;
}

.run-action-btn:hover {
    background: #e5c800;
}

/* Recents/History pills layout */
.history-row {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    align-items: center;
}

.history-pill {
    padding: 4px 10px;
    background: #000000;
    border: 1px solid var(--border);
    border-radius: 4px;
    font-size: 11px;
    color: #909090;
    cursor: pointer;
    transition: all 0.15s ease;
    font-family: monospace;
}

.history-pill:hover {
    border-color: var(--yellow);
    color: var(--yellow);
    background: rgba(255, 222, 0, 0.02);
}

/* Minimal Grid Systems */
.section-label {
    font-size: 11px;
    text-transform: uppercase;
    color: var(--muted);
    font-weight: 700;
    letter-spacing: 0.8px;
    margin-bottom: 10px;
}

.server-selector {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(70px, 1fr));
    gap: 6px;
}

.srv-chip {
    height: 34px;
    background: #000000;
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--muted);
    font-size: 11px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.15s ease;
}

.srv-chip:hover {
    border-color: var(--border-hover);
    color: #fff;
}

.srv-chip.active {
    background: var(--yellow);
    border-color: var(--yellow);
    color: #000000;
    box-shadow: 0 0 10px rgba(255, 222, 0, 0.25);
}

/* Unified View Options Switcher */
.view-options {
    display: flex;
    gap: 8px;
    border-bottom: 1px solid #141414;
    padding-bottom: 14px;
}

.opt-toggle {
    padding: 8px 16px;
    background: #000000;
    border: 1px solid var(--border);
    border-radius: 6px;
    font-size: 11px;
    font-weight: 700;
    color: var(--muted);
    cursor: pointer;
    transition: all 0.15s ease;
}

.opt-toggle:hover {
    border-color: var(--border-hover);
}

.opt-toggle.active {
    border-color: var(--yellow);
    color: var(--yellow);
    background: rgba(255, 222, 0, 0.02);
}

/* Performance Metrics Track */
.metrics-row {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
}

.metric-card {
    background: #000000;
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 14px 16px;
}

.metric-card .lbl {
    font-size: 10px;
    text-transform: uppercase;
    color: var(--muted);
    letter-spacing: 0.5px;
    margin-bottom: 4px;
}

.metric-card .val {
    font-size: 20px;
    font-weight: 700;
    font-family: monospace;
}

/* Control Hub Console Deck */
.control-deck {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 16px;
    margin-bottom: 12px;
}

.search-wrapper {
    flex: 1;
    display: flex;
    align-items: center;
    background: #000000;
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 0 12px;
    height: 38px;
}

.search-wrapper:focus-within {
    border-color: var(--border-hover);
}

.search-input {
    width: 100%;
    background: transparent;
    border: none;
    outline: none;
    color: #ffffff;
    font-size: 13px;
}

.search-counter {
    font-size: 11px;
    color: var(--muted);
    font-family: monospace;
    white-space: nowrap;
    margin-right: 8px;
}

.search-nav {
    display: flex;
    gap: 2px;
}

.search-step-btn {
    width: 24px;
    height: 24px;
    background: transparent;
    border: none;
    color: var(--muted);
    cursor: pointer;
    border-radius: 4px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 11px;
}

.search-step-btn:hover:not(:disabled) {
    color: #fff;
    background: var(--card);
}

.search-step-btn:disabled {
    opacity: 0.2;
    cursor: not-allowed;
}

.utility-actions {
    display: flex;
    gap: 6px;
}

.util-btn {
    height: 38px;
    padding: 0 14px;
    background: #000000;
    border: 1px solid var(--border);
    border-radius: 6px;
    color: #a0a0a0;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 6px;
    transition: all 0.15s ease;
}

.util-btn:hover {
    border-color: var(--border-hover);
    color: #ffffff;
}

/* Output Monitor Console Screen */
.console-monitor {
    width: 100%;
    height: 500px;
    background: #000000;
    background-image: linear-gradient(rgba(10, 10, 10, 0.45) 50%, rgba(0, 0, 0, 0.45) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.02), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.02));
    background-size: 100% 4px, 6px 100%;
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 0;
    overflow: auto;
    color: #bbbbbb;
    font-family: ui-monospace, SFMono-Regular, SF Mono, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
}

/* Dynamic Interactive Scanning View */
.engine-loading-container {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
    min-height: 400px;
    color: var(--yellow);
    text-align: center;
    gap: 20px;
}

.engine-spinner {
    width: 52px;
    height: 52px;
    border: 3px solid rgba(255, 222, 0, 0.1);
    border-top: 3px solid var(--yellow);
    border-radius: 50%;
    animation: spin 0.9s cubic-bezier(0.4, 0.1, 0.3, 1) infinite;
    box-shadow: 0 0 18px rgba(255, 222, 0, 0.2);
}

@keyframes spin {
    0% { transform: rotate(0deg); }
    100% { transform: rotate(360deg); }
}

.engine-loading-text {
    font-family: 'GFF', sans-serif;
    font-size: 15px;
    letter-spacing: 1.5px;
    animation: pulseText 1.5s infinite alternate;
}

@keyframes pulseText {
    0% { opacity: 0.5; }
    100% { opacity: 1; }
}

.engine-loading-sub {
    font-size: 11px;
    color: var(--muted);
    font-family: monospace;
}

/* Group Block Layouts */
.group-block {
    margin-bottom: 0px;
    border-bottom: 1px solid #141414;
}

.group-block:last-child {
    border-bottom: none;
}

.group-header {
    font-family: 'GFF', sans-serif;
    font-size: 11px;
    text-transform: uppercase;
    color: var(--yellow);
    letter-spacing: 1px;
    padding: 12px 14px;
    background: #060606;
    border-bottom: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: center;
    position: sticky;
    top: 0;
    z-index: 10;
}

.group-meta {
    display: flex;
    align-items: center;
    gap: 8px;
}

.group-copy-btn {
    background: transparent;
    border: none;
    color: var(--muted);
    font-size: 9px;
    font-weight: 700;
    cursor: pointer;
    text-transform: uppercase;
    padding: 2px 6px;
    border-radius: 3px;
    transition: all 0.15s ease;
}

.group-copy-btn:hover {
    color: var(--yellow);
    background: rgba(255, 222, 0, 0.05);
}

.group-count {
    background: rgba(255, 222, 0, 0.08);
    padding: 2px 8px;
    border-radius: 4px;
    font-size: 10px;
    color: var(--yellow);
    border: 1px solid rgba(255, 222, 0, 0.15);
}

/* Row Styling with Media support */
.url-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 14px;
    border-bottom: 1px solid #141414;
    font-family: monospace;
    font-size: 13px;
    word-break: break-all;
    background: #020202;
    gap: 16px;
}

.url-row:hover {
    background: #080808;
}

.url-row:last-child {
    border-bottom: none;
}

.url-main {
    display: flex;
    align-items: center;
    gap: 12px;
    flex: 1;
    overflow: hidden;
}

.url-href {
    color: #58a6ff;
    text-decoration: none;
    transition: color 0.1s ease;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
}

.url-href:hover {
    color: #79b8ff;
    text-decoration: underline;
}

/* Row-level copy control */
.row-copy-btn {
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 4px;
    color: var(--muted);
    font-size: 10px;
    font-weight: 700;
    cursor: pointer;
    text-transform: uppercase;
    padding: 5px 10px;
    display: flex;
    align-items: center;
    gap: 4px;
    transition: all 0.15s ease;
    white-space: nowrap;
}

.row-copy-btn:hover {
    color: var(--yellow);
    border-color: var(--yellow);
    background: rgba(255, 222, 0, 0.02);
}

.row-copy-btn svg {
    flex-shrink: 0;
}

/* Corrected Image aspect-ratio preview box */
.img-preview-container {
    width: 44px;
    height: 44px;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: #111111;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    flex-shrink: 0;
    transition: border-color 0.15s ease;
}

.img-preview-container:hover {
    border-color: var(--yellow);
}

.img-preview-thumb {
    max-width: 100%;
    max-height: 100%;
    object-fit: contain; /* Preserves both landscape and portrait aspect-ratios beautifully */
    cursor: pointer;
    display: block;
}

.video-preview-thumb {
    width: 44px;
    height: 44px;
    object-fit: contain;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: #111111;
    display: block;
    cursor: pointer;
}

.audio-preview-player {
    height: 28px;
    width: 140px;
    border-radius: 4px;
    background: #000000;
}

/* Decoded Row Layouts */
.decoded-row {
    padding: 8px 14px;
    border-bottom: 1px solid #141414;
    font-family: monospace;
    font-size: 13px;
    color: #bbbbbb;
    word-break: break-all;
}

.decoded-row:last-child {
    border-bottom: none;
}

/* Dynamic Popup Modal */
.modal {
    display: none;
    position: fixed;
    z-index: 10000;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: rgba(0, 0, 0, 0.9);
    align-items: center;
    justify-content: center;
}

.modal-content {
    position: relative;
    max-width: 90%;
    max-height: 85%;
    background: #000000;
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px;
    display: flex;
    flex-direction: column;
    align-items: center;
    box-shadow: 0 10px 40px rgba(0, 0, 0, 0.9);
}

.modal-content img, .modal-content video {
    max-width: 100%;
    max-height: 70vh;
    object-fit: contain;
    border-radius: 4px;
}

.close-modal {
    position: absolute;
    top: 10px; right: 15px;
    color: #ffffff;
    font-size: 28px;
    font-weight: 300;
    cursor: pointer;
    transition: color 0.15s ease;
}

.close-modal:hover {
    color: var(--yellow);
}

.modal-caption {
    margin-top: 12px;
    color: var(--muted);
    font-family: monospace;
    font-size: 12px;
    word-break: break-all;
    text-align: center;
    padding: 0 8px;
}

/* Highlighted searches */
mark.search-match {
    background-color: var(--match-bg);
    color: var(--match-text);
    border-radius: 1px;
}

mark.search-match.match-active {
    background-color: var(--match-active);
    color: #ffffff;
}

.toast {
    position: fixed;
    bottom: 20px;
    right: 20px;
    background: #ffffff;
    color: #000000;
    padding: 10px 18px;
    border-radius: 6px;
    font-size: 12px;
    font-weight: 700;
    opacity: 0;
    transform: translateY(10px);
    transition: all 0.2s ease;
    z-index: 1000;
    pointer-events: none;
}

.toast.show {
    opacity: 1;
    transform: translateY(0);
}

@media (max-width: 768px) {
    header { flex-direction: column; align-items: flex-start; gap: 14px; }
    .control-deck { flex-direction: column; align-items: stretch; gap: 8px; }
    .server-selector { grid-template-columns: repeat(4, 1fr); }
    .metrics-row { grid-template-columns: 1fr; gap: 8px; }
}
</style>
</head>
<body>

<div class="wrapper">

    <!-- Header Block -->
    <header>
        <div class="brand-group">
            <img src="https://dl.dir.freefiremobile.com/common/web_event/official2/dist/client/img/full_logo.969f536.png" class="brand-logo" alt="FF">
            <div class="badge">
                <div class="dot"></div>
                <span>LIVE RESPONDER</span>
            </div>
        </div>
        <div class="engine-title">API <span>TOOL</span></div>
    </header>

    <div class="app-panel">

        <!-- Target Endpoint Input Container -->
        <div class="control-container" style="padding-bottom: 12px; margin-bottom: 12px;">
            <div class="input-row">
                <input type="text" id="apiName" class="main-input" placeholder="Enter endpoint path string (e.g. LoginGetDesc)...">
                <button class="run-action-btn" onclick="runAPI()">SCAN ENGINE</button>
            </div>
            <!-- Query History/Recents -->
            <div class="history-row" id="historyContainer">
                <!-- Dynamic pills populate here -->
            </div>
        </div>

        <!-- Option Settings container -->
        <div class="control-container" style="margin-bottom: 20px;">
            <div class="config-grid" style="grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 14px;">
                <div class="config-item">
                    <label>Binary Hex Payload override</label>
                    <input type="text" id="customPayload" value="8533b7e1d34a5dfd9a830ee5cc36664e" style="font-family: monospace; height: 38px;">
                </div>
                <div class="config-item" style="display: flex; flex-direction: row; align-items: center; height: 100%;">
                    <div class="checkbox-item">
                        <input type="checkbox" id="togglePreviews" checked onchange="toggleMediaPreviewsState()">
                        <label for="togglePreviews">Enable Inline Media Previews</label>
                    </div>
                </div>
            </div>
        </div>

        <!-- Server Selector chips container -->
        <div class="control-container" style="margin-bottom: 20px;">
            <div class="section-label">Target Region Cluster</div>
            <div class="server-selector" id="serverSelectorGrid">
                <button class="srv-chip active" onclick="setServer(this,'ind')">IND</button>
                <button class="srv-chip" onclick="setServer(this,'mea')">MEA</button>
                <button class="srv-chip" onclick="setServer(this,'id')">ID</button>
                <button class="srv-chip" onclick="setServer(this,'cis')">CIS</button>
                <button class="srv-chip" onclick="setServer(this,'br')">BR</button>
                <button class="srv-chip" onclick="setServer(this,'latam')">LATAM</button>
                <button class="srv-chip" onclick="setServer(this,'vn')">VN</button>
                <button class="srv-chip" onclick="setServer(this,'tw')">TW</button>
                <button class="srv-chip" onclick="setServer(this,'th')">TH</button>
                <button class="srv-chip" onclick="setServer(this,'sg')">SG</button>
                <button class="srv-chip" onclick="setServer(this,'eu')">EU</button>
                <button class="srv-chip" onclick="setServer(this,'na')">NA</button>
                <button class="srv-chip" onclick="setServer(this,'pk')">PK</button>
                <button class="srv-chip" onclick="setServer(this,'bd')">BD</button>
            </div>
        </div>

        <!-- Perspective View Switcher container -->
        <div class="control-container" style="margin-bottom: 20px;">
            <div class="section-label">Output Perspective View</div>
            <div class="view-options">
                <button class="opt-toggle active" id="btn-links" onclick="setViewMode('links')">LINKS ONLY</button>
                <button class="opt-toggle" id="btn-decoded" onclick="setViewMode('decoded')">DECODED RESPONSE</button>
                <button class="opt-toggle" id="btn-raw" onclick="setViewMode('raw')">RAW RESPONSE</button>
            </div>
        </div>

        <!-- Metrics Tracker container -->
        <div class="control-container" style="margin-bottom: 24px;">
            <div class="metrics-row">
                <div class="metric-card">
                    <div class="lbl">Total Decoded Strings</div>
                    <div class="val" id="stringCount">0</div>
                </div>
                <div class="metric-card">
                    <div class="lbl">Discovered Links</div>
                    <div class="val" id="linkCount">0</div>
                </div>
                <div class="metric-card">
                    <div class="lbl">Engine Status</div>
                    <div class="val" id="statusText" style="color: var(--muted);">IDLE</div>
                </div>
            </div>
        </div>

        <!-- Consolidated controls deck -->
        <div class="control-deck">
            <div class="search-wrapper">
                <input type="text" class="search-input" id="searchBox" placeholder="Filter / Search output..." oninput="performSearch()">
                <span class="search-counter" id="searchCount">0/0</span>
                <div class="search-nav">
                    <button class="search-step-btn" id="prevSearchBtn" onclick="navigateSearch(-1)" disabled>▲</button>
                    <button class="search-step-btn" id="nextSearchBtn" onclick="navigateSearch(1)" disabled>▼</button>
                </div>
            </div>
            
            <div class="utility-actions">
                <button class="util-btn" onclick="copyOutput()">Copy</button>
                <button class="util-btn" onclick="downloadOutput()">Download</button>
                <button class="util-btn" onclick="clearOutput()">Reset</button>
            </div>
        </div>

        <!-- Live Content monitor screen -->
        <div class="console-monitor" id="output">SYSTEM LOG: READY DEVICE OVERFLOW</div>

    </div>
</div>

<!-- Dynamic Overlay Modal popup -->
<div id="imageModal" class="modal" onclick="closeModal()">
    <div class="modal-content" onclick="event.stopPropagation()">
        <span class="close-modal" onclick="closeModal()">&times;</span>
        <div id="modalMediaContainer"></div>
        <div class="modal-caption" id="modalCaption"></div>
    </div>
</div>

<div class="toast" id="toastNotifier">Copied to clipboard</div>

<script>
let selectedServer = "ind";
let viewMode = "links"; // Option states: 'links' | 'decoded' | 'raw'
let enableMediaPreviews = true;
let lastOutputText = "";
let currentLinksArray = [];
let apiCachedData = null;

let searchMatches = [];
let currentMatchIndex = -1;

let queryHistory = JSON.parse(localStorage.getItem("ff_query_history") || "[]");

const BASE_LINK = "https://dl.dir.freefiremobile.com/common/";

const VALID_EXTENSIONS = [
    "png", "jpg", "jpeg", "webp", "gif",
    "bmp", "ktx", "html", "json",
    "mp4", "mp3", "wav", "ogg", "webm"
];

// Initialize Query History pills on startup
document.addEventListener("DOMContentLoaded", () => {
    updateHistoryUI();
});

function setServer(btn, server) {
    selectedServer = server;
    document.querySelectorAll(".srv-chip").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
}

function setViewMode(mode) {
    viewMode = mode;
    document.querySelectorAll(".opt-toggle").forEach(b => b.classList.remove("active"));
    document.getElementById(`btn-${mode}`).classList.add("active");
    if (apiCachedData) {
        renderOutput(apiCachedData);
    }
}

function toggleMediaPreviewsState() {
    enableMediaPreviews = document.getElementById("togglePreviews").checked;
    if (apiCachedData) {
        renderOutput(apiCachedData);
    }
}

function updateHistoryUI() {
    const container = document.getElementById("historyContainer");
    if (queryHistory.length === 0) {
        container.innerHTML = `<span style="color: var(--muted); font-style: italic; font-size:11px;">No recent scans cached.</span>`;
        return;
    }
    container.innerHTML = `<span style="color: var(--muted); font-size:11px; font-weight:700; margin-right:4px; text-transform:uppercase;">Recent:</span>`;
    queryHistory.forEach(endpoint => {
        const pill = document.createElement("button");
        pill.className = "history-pill";
        pill.innerText = endpoint;
        pill.onclick = () => {
            document.getElementById("apiName").value = endpoint;
            runAPI();
        };
        container.appendChild(pill);
    });
}

function saveToHistory(endpoint) {
    if (!endpoint) return;
    queryHistory = queryHistory.filter(e => e !== endpoint);
    queryHistory.unshift(endpoint);
    if (queryHistory.length > 5) queryHistory.pop(); // Max 5 pills cached
    localStorage.setItem("ff_query_history", JSON.stringify(queryHistory));
    updateHistoryUI();
}

function updateStatusUI(status, hexColor) {
    const el = document.getElementById("statusText");
    el.innerText = status;
    el.style.color = hexColor || "var(--text)";
}

function displayToast(msg) {
    const toast = document.getElementById("toastNotifier");
    toast.innerText = msg;
    toast.classList.add("show");
    setTimeout(() => toast.classList.remove("show"), 1800);
}

// Client-side URL normalizer and absolute link generator
function processHtmlUrl(val) {
    val = val.trim();
    if (!val) return null;

    // String normalization replacements
    val = val.replace(/\.ff_extend/gi, '.jpg');
    val = val.replace(/\.ktx(p)?/gi, '.jpg');

    let val_lower = val.toLowerCase();

    // 1. Return as is if it's already an absolute URL
    if (val_lower.startsWith("http://") || val_lower.startsWith("https://")) {
        return val;
    }

    // 2. Map relative paths matching any extension (e.g. Local/IND/, test/, common/, OB16/)
    const hasValidExtension = VALID_EXTENSIONS.some(ext => val_lower.endsWith('.' + ext)) || val_lower.endsWith('.ff_extend') || val_lower.endsWith('.ktxp');

    if (hasValidExtension) {
        const cleanVal = val.replace(/^\/+/, ''); // Clean redundant leading slashes
        const cleanValLower = cleanVal.toLowerCase();

        if (cleanValLower.startsWith("common/")) {
            return "https://dl.dir.freefiremobile.com/" + cleanVal;
        } else {
            return BASE_LINK + cleanVal;
        }
    }

    // 3. Map common social domains
    const social_domains = ["instagram.com", "discord.gg", "youtube.com", "youtu.be", "facebook.com", "twitter.com", "x.com", "whatsapp.com", "linktr.ee"];
    if (social_domains.some(domain => val_lower.includes(domain))) {
        if (!val_lower.startsWith("http://") && !val_lower.startsWith("https://")) {
            return "https://" + val;
        }
        return val;
    }

    return null;
}

function getCategory(url) {
    const lower = url.toLowerCase();
    if (/\.(png|jpg|jpeg|webp|gif|bmp)/i.test(lower)) return "images";
    if (/\.(mp4|webm)/i.test(lower)) return "videos";
    if (/\.(mp3|wav|ogg)/i.test(lower)) return "audio";
    return "other";
}

async function runAPI() {
    const apiName = document.getElementById("apiName").value.trim();
    if (!apiName) {
        alert("Enter a target endpoint path string.");
        return;
    }

    const payloadInput = document.getElementById("customPayload").value.trim();

    updateStatusUI("SCANNING", "var(--yellow)");
    
    // Dynamic peak interactive loader
    document.getElementById("output").innerHTML = `
        <div class="engine-loading-container">
            <div class="engine-spinner"></div>
            <div class="engine-loading-text">ENGAGING QUANTUM ENGINE SCAN...</div>
            <div class="engine-loading-sub">Decoding binary payload, mapping paths, and translating clusters...</div>
        </div>
    `;
    resetSearchState();

    try {
        let endpoint = `/run_script?server=${selectedServer}&name=${encodeURIComponent(apiName)}`;
        if (payloadInput) {
            endpoint += `&payload=${encodeURIComponent(payloadInput)}`;
        }
        
        const res = await fetch(endpoint);
        const data = await res.json();

        if (data.error) {
            updateStatusUI("ERROR", "#ff4444");
            document.getElementById("output").innerHTML = `<div style="color:#ff4444; font-family:monospace; padding: 16px;">Engine Fault: ${data.error}</div>`;
            return;
        }

        document.getElementById("stringCount").innerText = data.count || 0;
        document.getElementById("linkCount").innerText = data.raw_count || 0;
        updateStatusUI("ONLINE", "#00ff95");

        currentLinksArray = data.urls || [];
        apiCachedData = data; 
        
        saveToHistory(apiName);
        renderOutput(data);

    } catch (err) {
        updateStatusUI("FAULT", "#ff4444");
        document.getElementById("output").innerHTML = `<div style="color:#ff4444; font-family:monospace; padding: 16px;">Network connection handshake termination reset.</div>`;
    }
}

function renderOutput(data) {
    const output = document.getElementById("output");
    output.innerHTML = ""; 

    if (viewMode === "links") {
        // Build clean formatted endpoint URLs
        let processedUrls = [];
        const allCandidates = new Set([...(data.urls || []), ...(data.strings || [])]);
        
        allCandidates.forEach(cand => {
            const parsed = processHtmlUrl(cand);
            if (parsed) {
                processedUrls.push(parsed);
            }
        });
        
        processedUrls = Array.from(new Set(processedUrls)).sort();
        currentLinksArray = processedUrls;

        if (processedUrls.length === 0) {
            output.innerHTML = `<div style="color:var(--muted); font-style:italic; padding: 16px;">No endpoint URLs matched.</div>`;
            lastOutputText = "";
        } else {
            // Group lists beautifully by category
            const grouped = { images: [], videos: [], audio: [], other: [] };
            processedUrls.forEach(link => {
                grouped[getCategory(link)].push(link);
            });

            let finalHtml = "";

            // 1. Render IMAGES Category
            if (grouped.images.length > 0) {
                let sectionHtml = `<div class="group-block" id="block-images">
                    <div class="group-header">
                        <span>IMAGES</span>
                        <div class="group-meta">
                            <button class="group-copy-btn" onclick="copyCategoryUrls('images')">[Copy Group]</button>
                            <span class="group-count" id="badge-images">${grouped.images.length}</span>
                        </div>
                    </div>`;
                grouped.images.forEach(link => {
                    sectionHtml += `
                    <div class="url-row" data-url="${link}">
                        <div class="url-main">
                            ${enableMediaPreviews ? `
                            <div class="img-preview-container" onclick="openMediaModal('${link}', 'image')">
                                <img src="${link}" class="img-preview-thumb" loading="lazy" onerror="this.src='https://dl.dir.freefiremobile.com/common/web_event/official2/dist/client/img/full_logo.969f536.png'">
                            </div>` : ''}
                            <a href="${link}" target="_blank" class="url-href">${link}</a>
                        </div>
                        <button class="row-copy-btn" onclick="copyIndividualText('${link}')">
                            <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>
                            Copy Link
                        </button>
                    </div>`;
                });
                sectionHtml += `</div>`;
                finalHtml += sectionHtml;
            }

            // 2. Render VIDEOS Category
            if (grouped.videos.length > 0) {
                let sectionHtml = `<div class="group-block" id="block-videos">
                    <div class="group-header">
                        <span>VIDEOS</span>
                        <div class="group-meta">
                            <button class="group-copy-btn" onclick="copyCategoryUrls('videos')">[Copy Group]</button>
                            <span class="group-count" id="badge-videos">${grouped.videos.length}</span>
                        </div>
                    </div>`;
                grouped.videos.forEach(link => {
                    sectionHtml += `
                    <div class="url-row" data-url="${link}">
                        <div class="url-main">
                            ${enableMediaPreviews ? `
                            <video src="${link}" class="video-preview-thumb" preload="metadata" muted loop onmouseover="this.play()" onmouseout="this.pause(); this.currentTime=0;" onclick="openMediaModal('${link}', 'video')"></video>` : ''}
                            <a href="${link}" target="_blank" class="url-href">${link}</a>
                        </div>
                        <button class="row-copy-btn" onclick="copyIndividualText('${link}')">
                            <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>
                            Copy Link
                        </button>
                    </div>`;
                });
                sectionHtml += `</div>`;
                finalHtml += sectionHtml;
            }

            // 3. Render AUDIO Category
            if (grouped.audio.length > 0) {
                let sectionHtml = `<div class="group-block" id="block-audio">
                    <div class="group-header">
                        <span>AUDIO</span>
                        <div class="group-meta">
                            <button class="group-copy-btn" onclick="copyCategoryUrls('audio')">[Copy Group]</button>
                            <span class="group-count" id="badge-audio">${grouped.audio.length}</span>
                        </div>
                    </div>`;
                grouped.audio.forEach(link => {
                    sectionHtml += `
                    <div class="url-row" data-url="${link}">
                        <div class="url-main">
                            ${enableMediaPreviews ? `
                            <div class="media-preview-container">
                                <audio src="${link}" controls class="audio-preview-player" onclick="event.stopPropagation();"></audio>
                            </div>` : ''}
                            <a href="${link}" target="_blank" class="url-href">${link}</a>
                        </div>
                        <button class="row-copy-btn" onclick="copyIndividualText('${link}')">
                            <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>
                            Copy Link
                        </button>
                    </div>`;
                });
                sectionHtml += `</div>`;
                finalHtml += sectionHtml;
            }

            // 4. Render OTHER configs/endpoints
            if (grouped.other.length > 0) {
                let sectionHtml = `<div class="group-block" id="block-other">
                    <div class="group-header">
                        <span>OTHER / CONFIGS</span>
                        <div class="group-meta">
                            <button class="group-copy-btn" onclick="copyCategoryUrls('other')">[Copy Group]</button>
                            <span class="group-count" id="badge-other">${grouped.other.length}</span>
                        </div>
                    </div>`;
                grouped.other.forEach(link => {
                    sectionHtml += `
                    <div class="url-row" data-url="${link}">
                        <div class="url-main" style="padding-left: 2px;">
                            <a href="${link.startsWith('http') ? link : '#'}" target="_blank" class="url-href">${link}</a>
                        </div>
                        <button class="row-copy-btn" onclick="copyIndividualText('${link}')">
                            <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>
                            Copy Link
                        </button>
                    </div>`;
                });
                sectionHtml += `</div>`;
                finalHtml += sectionHtml;
            }

            output.innerHTML = finalHtml;
            lastOutputText = processedUrls.join("\n");
        }
    } 
    else if (viewMode === "decoded") {
        const strings = data.strings || [];
        if (strings.length === 0) {
            output.innerHTML = `<div style="color:var(--muted); font-style:italic; padding: 16px;">No decoded protobuf strings found.</div>`;
            lastOutputText = "";
        } else {
            let html = "";
            strings.forEach(str => {
                // Apply dynamic filename replacements in decoded view as well
                let cleanStr = str.replace(/\.ff_extend/gi, '.jpg');
                cleanStr = cleanStr.replace(/\.ktx(p)?/gi, '.jpg');

                html += `
                <div class="decoded-row" data-text="${cleanStr}">
                    <span class="decoded-text">${cleanStr}</span>
                </div>`;
            });
            output.innerHTML = html;
            lastOutputText = strings.map(str => str.replace(/\.ff_extend/gi, '.jpg').replace(/\.ktx(p)?/gi, '.jpg')).join("\n");
        }
    } 
    else if (viewMode === "raw") {
        lastOutputText = data.raw_response || "";
        output.textContent = lastOutputText;
    }
    
    performSearch();
}

// Media Modal popup triggers
function openMediaModal(src, type) {
    const modal = document.getElementById("imageModal");
    const container = document.getElementById("modalMediaContainer");
    const caption = document.getElementById("modalCaption");
    
    container.innerHTML = "";
    caption.innerText = src;

    if (type === 'image') {
        const img = document.createElement("img");
        img.src = src;
        img.onerror = () => { img.src = 'https://dl.dir.freefiremobile.com/common/web_event/official2/dist/client/img/full_logo.969f536.png'; };
        container.appendChild(img);
    } else if (type === 'video') {
        const vid = document.createElement("video");
        vid.src = src;
        vid.controls = true;
        vid.autoplay = true;
        container.appendChild(vid);
    }
    
    modal.style.display = "flex";
}

function closeModal() {
    const modal = document.getElementById("imageModal");
    const container = document.getElementById("modalMediaContainer");
    container.innerHTML = ""; // Stop playing videos inside modal instantly on close
    modal.style.display = "none";
}

function copyIndividualText(text) {
    navigator.clipboard.writeText(text);
    displayToast("URL buffered to clipboard");
}

function copyOutput() {
    if (!lastOutputText) return;
    navigator.clipboard.writeText(lastOutputText);
    displayToast("Console content buffered");
}

function clearOutput() {
    document.getElementById("output").innerHTML = "SYSTEM LOG: FLUSH COMPLETED";
    document.getElementById("stringCount").innerText = "0";
    document.getElementById("linkCount").innerText = "0";
    document.getElementById("apiName").value = "";
    document.getElementById("customPayload").value = "8533b7e1d34a5dfd9a830ee5cc36664e";
    document.getElementById("searchBox").value = "";
    updateStatusUI("IDLE", "var(--muted)");
    lastOutputText = "";
    apiCachedData = null;
    currentLinksArray = [];
    resetSearchState();
    displayToast("System caches cleared");
}

function downloadOutput() {
    if (!lastOutputText) return;
    const blob = new Blob([lastOutputText], { type: "text/plain" });
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = `ff_api_logs_${selectedServer}.log`;
    a.click();
}

function copyCategoryUrls(category) {
    const urls = currentLinksArray.filter(link => getCategory(link) === category);
    if (urls.length === 0) return;
    navigator.clipboard.writeText(urls.join("\n"));
    displayToast(`Copied all discovered ${category.toUpperCase()} endpoints`);
}

/* Node Searching & Real-time Filter-while-typing Logic */
function resetSearchState() {
    searchMatches = [];
    currentMatchIndex = -1;
    document.getElementById("searchCount").innerText = "0/0";
    document.getElementById("prevSearchBtn").disabled = true;
    document.getElementById("nextSearchBtn").disabled = true;
}

function performSearch() {
    const query = document.getElementById("searchBox").value.trim().toLowerCase();
    const output = document.getElementById("output");
    
    if (viewMode === "links") {
        if (!apiCachedData) return;
        const groups = output.querySelectorAll(".group-block");
        let visibleCount = 0;
        
        groups.forEach(group => {
            const rows = group.querySelectorAll(".url-row");
            let groupVisibleCount = 0;
            
            rows.forEach(row => {
                const url = row.getAttribute("data-url") || "";
                const hrefElement = row.querySelector(".url-href");
                
                if (!query) {
                    row.style.display = "flex";
                    hrefElement.innerHTML = url;
                    groupVisibleCount++;
                } else if (url.toLowerCase().includes(query)) {
                    row.style.display = "flex";
                    groupVisibleCount++;
                    const regex = new RegExp(`(${escapePattern(query)})`, "gi");
                    hrefElement.innerHTML = url.replace(regex, `<mark class="search-match">$1</mark>`);
                } else {
                    row.style.display = "none";
                }
            });
            
            // Recalculate visible items per category and toggle group header visibility
            if (groupVisibleCount > 0) {
                group.style.display = "block";
                const badge = group.querySelector(".group-count");
                if (badge) badge.innerText = groupVisibleCount;
                visibleCount += groupVisibleCount;
            } else {
                group.style.display = "none";
            }
        });
        
        searchMatches = Array.from(output.querySelectorAll("mark.search-match"));
        updateSearchStats(visibleCount, query);
    } 
    else if (viewMode === "decoded") {
        if (!apiCachedData) return;
        const rows = output.querySelectorAll(".decoded-row");
        let visibleCount = 0;
        
        rows.forEach(row => {
            const text = row.getAttribute("data-text") || "";
            const textElement = row.querySelector(".decoded-text");
            
            if (!query) {
                row.style.display = "block";
                textElement.innerHTML = text;
                visibleCount++;
            } else if (text.toLowerCase().includes(query)) {
                row.style.display = "block";
                visibleCount++;
                const regex = new RegExp(`(${escapePattern(query)})`, "gi");
                textElement.innerHTML = text.replace(regex, `<mark class="search-match">$1</mark>`);
            } else {
                row.style.display = "none";
            }
        });
        
        searchMatches = Array.from(output.querySelectorAll("mark.search-match"));
        updateSearchStats(visibleCount, query);
    } 
    else if (viewMode === "raw") {
        if (!query) {
            resetSearchState();
            output.textContent = lastOutputText;
            return;
        }

        output.textContent = lastOutputText;
        highlightNodes(output, query);
        searchMatches = Array.from(output.querySelectorAll("mark.search-match"));
        
        if (searchMatches.length > 0) {
            currentMatchIndex = 0;
            updateSearchStatsUI();
            applyFocusHighlight();
        } else {
            currentMatchIndex = -1;
            updateSearchStatsUI();
        }
    }
}

function updateSearchStats(visibleCount, query) {
    const total = viewMode === "links" ? (currentLinksArray.length) : (apiCachedData ? apiCachedData.strings.length : 0);
    if (!query) {
        document.getElementById("searchCount").innerText = `${total}/${total}`;
        resetSearchState();
    } else {
        const matchLen = searchMatches.length;
        document.getElementById("searchCount").innerText = `Filtered: ${visibleCount} | Matches: ${matchLen}`;
        const state = matchLen === 0;
        document.getElementById("prevSearchBtn").disabled = state;
        document.getElementById("nextSearchBtn").disabled = state;
        if (matchLen > 0) {
            currentMatchIndex = 0;
            applyFocusHighlight();
        } else {
            currentMatchIndex = -1;
        }
    }
}

function highlightNodes(root, token) {
    const regex = new RegExp(`(${escapePattern(token)})`, "gi");
    function parser(node) {
        if (node.nodeType === Node.TEXT_NODE) {
            if (node.textContent.match(regex)) {
                const wrapper = document.createElement("span");
                wrapper.innerHTML = node.textContent.replace(regex, `<mark class="search-match">$1</mark>`);
                node.parentNode.replaceChild(wrapper, node);
            }
        } else if (node.nodeType === Node.ELEMENT_NODE && node.nodeName !== 'MARK' && node.nodeName !== 'SCRIPT' && node.nodeName !== 'STYLE') {
            for (let i = node.childNodes.length - 1; i >= 0; i--) {
                parser(node.childNodes[i]);
            }
        }
    }
    parser(root);
}

function escapePattern(str) {
    return str.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
}

function updateSearchStatsUI() {
    const len = searchMatches.length;
    const cur = len > 0 ? currentMatchIndex + 1 : 0;
    document.getElementById("searchCount").innerText = `${cur}/${len}`;
    const state = len === 0;
    document.getElementById("prevSearchBtn").disabled = state;
    document.getElementById("nextSearchBtn").disabled = state;
}

function applyFocusHighlight() {
    searchMatches.forEach(el => el.classList.remove("match-active"));
    if (currentMatchIndex >= 0 && currentMatchIndex < searchMatches.length) {
        const target = searchMatches[currentMatchIndex];
        target.classList.add("match-active");
        target.scrollIntoView({
            behavior: "smooth",
            block: "center"
        });
    }
}

function navigateSearch(offset) {
    if (searchMatches.length === 0) return;
    currentMatchIndex += offset;
    if (currentMatchIndex >= searchMatches.length) currentMatchIndex = 0;
    if (currentMatchIndex < 0) currentMatchIndex = searchMatches.length - 1;
    updateSearchStatsUI();
    applyFocusHighlight();
}

document.getElementById("searchBox").addEventListener("keydown", function(e) {
    if (searchMatches.length === 0) return;
    if (e.key === "Enter") {
        e.preventDefault();
        if (e.shiftKey) {
            navigateSearch(-1);
        } else {
            navigateSearch(1);
        }
    }
});
