<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>FF API Extractor</title>

<script src="https://cdn.tailwindcss.com"></script>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>

@font-face{
font-family:'GFF';
src:url('https://dl.dir.freefiremobile.com/common/web_event/common/fonts/website/GFFLatinW05-Bold.woff') format('woff');
}

body{
background:#000;
color:#fff;
font-family:Inter,sans-serif;
}

.gff{
font-family:'GFF';
}

.card{
background:#111;
border:1px solid #222;
border-radius:22px;
}

.server{
padding:10px;
border-radius:12px;
background:#1a1a1a;
border:1px solid #2a2a2a;
font-size:12px;
cursor:pointer;
transition:.2s;
}

.server:hover{
background:#ffde00;
color:#000;
}

.server.active{
background:#ffde00;
color:#000;
}

.linkbox{
background:#0f0f0f;
border:1px solid #1f1f1f;
padding:12px;
border-radius:12px;
word-break:break-all;
font-size:12px;
}

input{
background:#0d0d0d;
border:1px solid #222;
outline:none;
}

</style>

</head>

<body>

<div class="max-w-6xl mx-auto p-4">

<div class="text-center py-8">

<div class="gff text-5xl italic">
FF API
</div>

<div class="gff text-yellow-400 text-5xl italic">
EXTRACTOR
</div>

</div>

<div class="card p-5 space-y-5">

<input
id="api"
placeholder="Enter API Name"
class="w-full p-4 rounded-xl"
/>

<div
id="servers"
class="grid grid-cols-2 md:grid-cols-4 gap-3"
></div>

<div class="flex gap-3">

<button
onclick="run()"
class="flex-1 bg-yellow-400 text-black font-bold p-4 rounded-xl"
>
RUN API
</button>

<button
onclick="downloadTxt()"
class="bg-zinc-800 px-6 rounded-xl"
>
<i class="fa fa-download"></i>
</button>

</div>

<div class="grid grid-cols-2 gap-4">

<div class="card p-4">
<div class="text-zinc-400 text-sm">LINKS</div>
<div id="count" class="text-3xl font-bold">0</div>
</div>

<div class="card p-4">
<div class="text-zinc-400 text-sm">RAW SIZE</div>
<div id="size" class="text-3xl font-bold">0</div>
</div>

</div>

<input
id="search"
placeholder="Search links..."
class="w-full p-4 rounded-xl"
/>

<div class="flex gap-4 flex-wrap text-sm">

<label>
<input type="checkbox" id="preview" checked>
 Preview
</label>

<label>
<input type="checkbox" id="images" checked>
 Images
</label>

<label>
<input type="checkbox" id="htmls" checked>
 HTML
</label>

<label>
<input type="checkbox" id="jsons" checked>
 JSON
</label>

</div>

<div
id="results"
class="space-y-3"
></div>

</div>

</div>

<script>

const regions = [
"ind","mea","id","cis","br","latam",
"vn","tw","th","sg","eu","na","pk","bd"
]

let current = "ind"

let allLinks = []

const servers = document.getElementById("servers")

regions.forEach(region=>{

const div = document.createElement("div")

div.className = "server"

if(region==="ind"){
div.classList.add("active")
}

div.innerText = region.toUpperCase()

div.onclick=()=>{

document.querySelectorAll(".server")
.forEach(x=>x.classList.remove("active"))

div.classList.add("active")

current=region

}

servers.appendChild(div)

})

async function run(){

const api = document.getElementById("api").value.trim()

if(!api){
alert("Enter API")
return
}

document.getElementById("results").innerHTML =
"<div class='text-yellow-400'>Loading...</div>"

try{

const res = await fetch(
`/run_script?server=${current}&name=${api}`
)

const data = await res.json()

if(data.error){

document.getElementById("results").innerHTML =
`<div class="text-red-500">${data.error}</div>`

return

}

allLinks = data.links || []

document.getElementById("count").innerText =
data.count || 0

document.getElementById("size").innerText =
data.size || 0

render()

}catch(err){

document.getElementById("results").innerHTML =
`<div class="text-red-500">${err}</div>`

}

}

function render(){

const results = document.getElementById("results")

results.innerHTML = ""

const search =
document.getElementById("search")
.value.toLowerCase()

const preview =
document.getElementById("preview").checked

const images =
document.getElementById("images").checked

const htmls =
document.getElementById("htmls").checked

const jsons =
document.getElementById("jsons").checked

let filtered = allLinks.filter(link=>{

if(search && !link.toLowerCase().includes(search)){
return false
}

if(!images){

if(link.match(/\.(png|jpg|jpeg|webp|gif|ktx)/i)){
return false
}

}

if(!htmls && link.includes(".html")){
return false
}

if(!jsons && link.includes(".json")){
return false
}

return true

})

if(filtered.length===0){

results.innerHTML =
"<div class='text-zinc-500'>No links found</div>"

return

}

filtered.forEach(link=>{

const box = document.createElement("div")

box.className = "linkbox"

box.innerHTML = `
<div class="flex justify-between gap-3">

<a
href="${link}"
target="_blank"
class="text-cyan-400"
>
${link}
</a>

<button
onclick="copyLink('${link}')"
class="text-yellow-400"
>
COPY
</button>

</div>

${preview ? previewHTML(link) : ""}
`

results.appendChild(box)

})

}

function previewHTML(link){

if(link.match(/\.(png|jpg|jpeg|webp|gif)$/i)){

return `
<img
src="${link}"
class="mt-3 rounded-xl max-h-48 border border-zinc-800"
/>
`

}

return ""

}

function copyLink(link){

navigator.clipboard.writeText(link)

}

function downloadTxt(){

if(allLinks.length===0){
return
}

const blob = new Blob(
[allLinks.join("\\n")],
{type:"text/plain"}
)

const a = document.createElement("a")

a.href = URL.createObjectURL(blob)

a.download = "links.txt"

a.click()

}

document
.getElementById("search")
.addEventListener("input",render)

document
.querySelectorAll("input[type='checkbox']")
.forEach(x=>x.addEventListener("change",render))

</script>

</body>
</html>
