<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>FREE FIRE API ENGINE</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>
@font-face {
    font-family: 'GFF';
    src: url('https://dl.dir.freefiremobile.com/common/web_event/common/fonts/website/GFFLatinW05-Bold.woff') format('woff');
}

:root {
    --yellow: #ffde00;
    --bg: #0a0a0a;
    --panel: #111111;
    --card: #161616;
    --border: #222222;
    --border-hover: #333333;
    --text: #f5f5f5;
    --muted: #707070;
    
    /* Contrast highlights */
    --match-bg: #ffe600;
    --match-text: #000000;
    --match-active: #ff7700;
}

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    background-color: #000000;
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    min-height: 100vh;
    letter-spacing: -0.2px;
}

/* Premium micro scrollbars */
::-webkit-scrollbar {
    width: 6px;
    height: 6px;
}
::-webkit-scrollbar-track {
    background: #000000;
}
::-webkit-scrollbar-thumb {
    background: #222222;
    border-radius: 3px;
}
::-webkit-scrollbar-thumb:hover {
    background: var(--yellow);
}

.wrapper {
    width: 100%;
    max-width: 1100px;
    margin: 0 auto;
    padding: 40px 24px;
}

/* Header Optimization */
header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid var(--border);
    padding-bottom: 20px;
    margin-bottom: 32px;
}

.brand-group {
    display: flex;
    align-items: center;
    gap: 16px;
}

.brand-logo {
    height: 24px;
    object-fit: contain;
}

.badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 4px 10px;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 6px;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.5px;
    color: var(--muted);
}

.dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--yellow);
    box-shadow: 0 0 8px var(--yellow);
}

.engine-title {
    font-family: 'GFF', sans-serif;
    font-size: 18px;
    font-style: italic;
    text-transform: uppercase;
}
.engine-title span {
    color: var(--yellow);
}

/* Core Dashboard Layout */
.app-panel {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 24px;
}

/* Pure Inputs UI */
.input-row {
    position: relative;
    margin-bottom: 20px;
}

.main-input {
    width: 100%;
    height: 52px;
    background: #000000;
    border: 1px solid var(--border);
    border-radius: 8px;
    color: #ffffff;
    padding: 0 140px 0 16px;
    font-size: 14px;
    font-family: monospace;
    outline: none;
    transition: all 0.15s ease;
}

.main-input:focus {
    border-color: var(--yellow);
    box-shadow: 0 0 12px rgba(255, 222, 0, 0.15);
}

.run-action-btn {
    position: absolute;
    right: 6px;
    top: 6px;
    height: 40px;
    padding: 0 20px;
    background: var(--yellow);
    border: none;
    border-radius: 6px;
    color: #000000;
    font-family: 'GFF', sans-serif;
    font-size: 13px;
    font-weight: 900;
    cursor: pointer;
    transition: background 0.15s ease;
}

.run-action-btn:hover {
    background: #e5c800;
}

/* Custom Payload Options Toggle */
.toggle-payload-btn {
    background: transparent;
    border: none;
    color: var(--muted);
    font-size: 10px;
    font-weight: 700;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 4px;
    text-transform: uppercase;
    transition: color 0.15s ease;
}

.toggle-payload-btn:hover {
    color: var(--yellow);
}

/* Minimal Grid Systems */
.section-label {
    font-size: 11px;
    text-transform: uppercase;
    color: var(--muted);
    font-weight: 700;
    letter-spacing: 0.8px;
    margin-bottom: 10px;
}

.server-selector {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(70px, 1fr));
    gap: 6px;
    margin-bottom: 24px;
}

.srv-chip {
    height: 34px;
    background: #000000;
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--muted);
    font-size: 11px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.15s ease;
}

.srv-chip:hover {
    border-color: var(--border-hover);
    color: #fff;
}

.srv-chip.active {
    background: var(--yellow);
    border-color: var(--yellow);
    color: #000000;
    box-shadow: 0 0 10px rgba(255, 222, 0, 0.25);
}

/* Unified Layout Options Switcher */
.view-options {
    display: flex;
    gap: 8px;
    margin-bottom: 20px;
    border-bottom: 1px solid #1a1a1a;
    padding-bottom: 16px;
}

.opt-toggle {
    padding: 8px 16px;
    background: #000000;
    border: 1px solid var(--border);
    border-radius: 6px;
    font-size: 11px;
    font-weight: 700;
    color: var(--muted);
    cursor: pointer;
    transition: all 0.15s ease;
}

.opt-toggle:hover {
    border-color: var(--border-hover);
}

.opt-toggle.active {
    border-color: var(--yellow);
    color: var(--yellow);
    background: rgba(255, 222, 0, 0.02);
}

/* Dynamic Category Tabs for Links */
.category-tabs {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-bottom: 24px;
}

.cat-tab {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 6px 12px;
    background: #000000;
    border: 1px solid var(--border);
    border-radius: 6px;
    font-size: 11px;
    font-weight: 700;
    color: var(--muted);
    cursor: pointer;
    transition: all 0.15s ease;
}

.cat-tab:hover {
    border-color: var(--border-hover);
    color: #ffffff;
}

.cat-tab.active {
    background: var(--yellow);
    color: #000000;
    border-color: var(--yellow);
}

.cat-tab.active .badge-num {
    background: rgba(0, 0, 0, 0.15);
    color: #000000;
}

.badge-num {
    padding: 2px 6px;
    background: #1e1e1e;
    color: var(--muted);
    border-radius: 4px;
    font-size: 9px;
}

/* Performance Metrics Track */
.metrics-row {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
    margin-bottom: 24px;
}

.metric-card {
    background: #000000;
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 14px 16px;
}

.metric-card .lbl {
    font-size: 10px;
    text-transform: uppercase;
    color: var(--muted);
    letter-spacing: 0.5px;
    margin-bottom: 4px;
}

.metric-card .val {
    font-size: 20px;
    font-weight: 700;
    font-family: monospace;
}

/* Control Hub Console Deck */
.control-deck {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 16px;
    margin-bottom: 12px;
}

.search-wrapper {
    flex: 1;
    display: flex;
    align-items: center;
    background: #000000;
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 0 12px;
    height: 38px;
}

.search-wrapper:focus-within {
    border-color: var(--border-hover);
}

.search-input {
    width: 100%;
    background: transparent;
    border: none;
    outline: none;
    color: #ffffff;
    font-size: 13px;
    padding-left: 8px;
}

.search-counter {
    font-size: 11px;
    color: var(--muted);
    font-family: monospace;
    white-space: nowrap;
    margin-right: 8px;
}

.search-nav {
    display: flex;
    gap: 2px;
}

.search-step-btn {
    width: 24px;
    height: 24px;
    background: transparent;
    border: none;
    color: var(--muted);
    cursor: pointer;
    border-radius: 4px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 11px;
}

.search-step-btn:hover:not(:disabled) {
    color: #fff;
    background: var(--card);
}

.search-step-btn:disabled {
    opacity: 0.2;
    cursor: not-allowed;
}

.utility-actions {
    display: flex;
    gap: 6px;
}

.util-btn {
    height: 38px;
    padding: 0 14px;
    background: #000000;
    border: 1px solid var(--border);
    border-radius: 6px;
    color: #a0a0a0;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 6px;
    transition: all 0.15s ease;
}

.util-btn:hover {
    border-color: var(--border-hover);
    color: #ffffff;
}

/* Output Monitor Dashboard */
.console-monitor {
    width: 100%;
    height: 500px;
    background: #000000;
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 18px;
    overflow: auto;
    white-space: pre-wrap;
    word-break: break-word;
    font-size: 13px;
    line-height: 1.6;
    color: #bbbbbb;
    font-family: ui-monospace, SFMono-Regular, SF Mono, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
}

/* URL Asset Cards */
.url-card {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 16px;
    background: #0d0d0d;
    border: 1px solid var(--border);
    border-radius: 8px;
    margin-bottom: 8px;
    gap: 12px;
    transition: transform 0.15s ease, border-color 0.15s ease;
}

.url-card:hover {
    border-color: var(--border-hover);
    transform: translateY(-1px);
}

.url-badge {
    padding: 4px 8px;
    font-size: 10px;
    font-weight: 900;
    border-radius: 4px;
    text-transform: uppercase;
    font-family: 'GFF', sans-serif;
    letter-spacing: 0.5px;
    min-width: 70px;
    text-align: center;
}

.badge-images { background: rgba(0, 191, 255, 0.1); color: #00bfff; border: 1px solid rgba(0, 191, 255, 0.2); }
.badge-videos { background: rgba(255, 127, 80, 0.1); color: #ff7f50; border: 1px solid rgba(255, 127, 80, 0.2); }
.badge-audio { background: rgba(144, 238, 144, 0.1); color: #90ee90; border: 1px solid rgba(144, 238, 144, 0.2); }
.badge-html  { background: rgba(238, 130, 238, 0.1); color: #ee82ee; border: 1px solid rgba(238, 130, 238, 0.2); }
.badge-social{ background: rgba(255, 222, 0, 0.1); color: var(--yellow); border: 1px solid rgba(255, 222, 0, 0.2); }
.badge-other { background: rgba(120, 120, 120, 0.1); color: #a0a0a0; border: 1px solid rgba(120, 120, 120, 0.2); }

.url-details {
    flex: 1;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
}

.url-href {
    color: #58a6ff;
    text-decoration: none;
    font-family: monospace;
    font-size: 13px;
    transition: color 0.1s ease;
}

.url-href:hover {
    color: #79b8ff;
    text-decoration: underline;
}

.url-actions {
    display: flex;
    gap: 6px;
}

.card-action-btn {
    width: 32px;
    height: 32px;
    background: #161616;
    border: 1px solid var(--border);
    color: #a0a0a0;
    border-radius: 6px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 12px;
    transition: all 0.15s ease;
}

.card-action-btn:hover {
    color: #ffffff;
    background: #222222;
    border-color: #333333;
}

/* Marker Highlighting */
mark.search-match {
    background-color: var(--match-bg);
    color: var(--match-text);
    border-radius: 1px;
}

mark.search-match.match-active {
    background-color: var(--match-active);
    color: #ffffff;
}

.toast {
    position: fixed;
    bottom: 20px;
    right: 20px;
    background: #ffffff;
    color: #000000;
    padding: 10px 18px;
    border-radius: 6px;
    font-size: 12px;
    font-weight: 700;
    opacity: 0;
    transform: translateY(10px);
    transition: all 0.2s ease;
    z-index: 1000;
    pointer-events: none;
}

.toast.show {
    opacity: 1;
    transform: translateY(0);
}

.loading-state {
    color: var(--muted);
    font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    font-size: 13px;
}

@media (max-width: 768px) {
    header { flex-direction: column; align-items: flex-start; gap: 14px; }
    .control-deck { flex-direction: column; align-items: stretch; gap: 8px; }
    .server-selector { grid-template-columns: repeat(4, 1fr); }
    .metrics-row { grid-template-columns: 1fr; gap: 8px; }
}
</style>
</head>
<body>

<div class="wrapper">

    <!-- Premium Minimal Header -->
    <header>
        <div class="brand-group">
            <img src="https://dl.dir.freefiremobile.com/common/web_event/official2/dist/client/img/full_logo.969f536.png" class="brand-logo" alt="FF">
            <div class="badge">
                <div class="dot"></div>
                <span>LIVE RESPONDER</span>
            </div>
        </div>
        <div class="engine-title">API <span>TOOL</span></div>
    </header>

    <div class="app-panel">

        <!-- Target Input -->
        <div class="input-row">
            <input type="text" id="apiName" class="main-input" placeholder="Enter endpoint path string (e.g. LoginGetDesc)...">
            <button class="run-action-btn" onclick="runAPI()">SCAN ENGINE</button>
        </div>

        <!-- Request Hex Payload Selection -->
        <div class="section-label" style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px;">
            <span>Custom Binary Hex Payload</span>
            <button class="toggle-payload-btn" onclick="togglePayloadInput()"><i class="fa-solid fa-code"></i> Toggle Custom</button>
        </div>
        <div class="input-row" id="payloadInputContainer" style="display: none; margin-bottom: 24px;">
            <input type="text" id="customPayload" class="main-input" style="height: 44px; font-family: monospace;" placeholder="Enter hex payload (fallback used if empty)..." value="8533b7e1d34a5dfd9a830ee5cc36664e">
        </div>

        <!-- Servers -->
        <div class="section-label">Target Region Cluster</div>
        <div class="server-selector" id="serverSelectorGrid">
            <button class="srv-chip active" onclick="setServer(this,'ind')">IND</button>
            <button class="srv-chip" onclick="setServer(this,'mea')">MEA</button>
            <button class="srv-chip" onclick="setServer(this,'id')">ID</button>
            <button class="srv-chip" onclick="setServer(this,'cis')">CIS</button>
            <button class="srv-chip" onclick="setServer(this,'br')">BR</button>
            <button class="srv-chip" onclick="setServer(this,'latam')">LATAM</button>
            <button class="srv-chip" onclick="setServer(this,'vn')">VN</button>
            <button class="srv-chip" onclick="setServer(this,'tw')">TW</button>
            <button class="srv-chip" onclick="setServer(this,'th')">TH</button>
            <button class="srv-chip" onclick="setServer(this,'sg')">SG</button>
            <button class="srv-chip" onclick="setServer(this,'eu')">EU</button>
            <button class="srv-chip" onclick="setServer(this,'na')">NA</button>
            <button class="srv-chip" onclick="setServer(this,'pk')">PK</button>
            <button class="srv-chip" onclick="setServer(this,'bd')">BD</button>
        </div>

        <!-- Layout Views Configuration -->
        <div class="section-label">Output Perspective View</div>
        <div class="view-options">
            <button class="opt-toggle active" id="btn-links" onclick="setViewMode('links')">LINKS ONLY</button>
            <button class="opt-toggle" id="btn-raw" onclick="setViewMode('raw')">RAW RESPONSE</button>
            <button class="opt-toggle" id="btn-strings" onclick="setViewMode('strings')">ALL STRINGS</button>
        </div>

        <!-- Dynamic Category Tabs (Visible when VIEW = LINKS) -->
        <div class="category-tabs" id="categoryTabsContainer" style="display: none;">
            <button class="cat-tab active" onclick="setCategoryFilter('all')">All <span class="badge-num" id="count-all">0</span></button>
            <button class="cat-tab" onclick="setCategoryFilter('images')">Images <span class="badge-num" id="count-images">0</span></button>
            <button class="cat-tab" onclick="setCategoryFilter('videos')">Videos <span class="badge-num" id="count-videos">0</span></button>
            <button class="cat-tab" onclick="setCategoryFilter('audio')">Audio <span class="badge-num" id="count-audio">0</span></button>
            <button class="cat-tab" onclick="setCategoryFilter('html')">HTML <span class="badge-num" id="count-html">0</span></button>
            <button class="cat-tab" onclick="setCategoryFilter('social')">Social <span class="badge-num" id="count-social">0</span></button>
            <button class="cat-tab" onclick="setCategoryFilter('other')">Other <span class="badge-num" id="count-other">0</span></button>
        </div>

        <!-- Operational Status Metrics Tracker -->
        <div class="metrics-row">
            <div class="metric-card">
                <div class="lbl">Total Strings</div>
                <div class="val" id="stringCount">0</div>
            </div>
            <div class="metric-card">
                <div class="lbl">Extracted Links</div>
                <div class="val" id="linkCount">0</div>
            </div>
            <div class="metric-card">
                <div class="lbl">Engine Status</div>
                <div class="val" id="statusText" style="color: var(--muted);">IDLE</div>
            </div>
        </div>

        <!-- Streamlined Control Deck -->
        <div class="control-deck">
            <div class="search-wrapper">
                <i class="fa-solid fa-magnifying-glass" style="color: #444; font-size: 12px;"></i>
                <input type="text" class="search-input" id="searchBox" placeholder="Filter/Search current output..." oninput="performSearch()">
                <span class="search-counter" id="searchCount">0/0</span>
                <div class="search-nav">
                    <button class="search-step-btn" id="prevSearchBtn" onclick="navigateSearch(-1)" disabled><i class="fa-solid fa-chevron-up"></i></button>
                    <button class="search-step-btn" id="nextSearchBtn" onclick="navigateSearch(1)" disabled><i class="fa-solid fa-chevron-down"></i></button>
                </div>
            </div>
            
            <div class="utility-actions">
                <button class="util-btn" onclick="copyOutput()"><i class="fa-solid fa-copy"></i> Copy</button>
                <button class="util-btn" onclick="downloadOutput()"><i class="fa-solid fa-download"></i> Download</button>
                <button class="util-btn" onclick="clearOutput()"><i class="fa-solid fa-trash"></i> Reset</button>
            </div>
        </div>

        <!-- Clean Output Console -->
        <div class="console-monitor" id="output">SYSTEM LOG: READY DEVICE OVERFLOW</div>

    </div>
</div>

<div class="toast" id="toastNotifier">Copied to clipboard</div>

<script>
let selectedServer = "ind";
let viewMode = "links"; // Option states tracking: 'links' | 'raw' | 'strings'
let currentCategory = "all"; // Category states tracking for URLs
let lastOutputText = "";
let currentLinksArray = [];
let apiCachedData = null;

let searchMatches = [];
let currentMatchIndex = -1;

function setServer(btn, server) {
    selectedServer = server;
    document.querySelectorAll(".srv-chip").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
}

function setViewMode(mode) {
    viewMode = mode;
    document.querySelectorAll(".opt-toggle").forEach(b => b.classList.remove("active"));
    document.getElementById(`btn-${mode}`).classList.add("active");
    if (apiCachedData) {
        renderOutput(apiCachedData);
    }
}

function togglePayloadInput() {
    const container = document.getElementById("payloadInputContainer");
    const btn = document.querySelector(".toggle-payload-btn");
    if (container.style.display === "none") {
        container.style.display = "block";
        btn.innerHTML = `<i class="fa-solid fa-code"></i> Hide Custom`;
    } else {
        container.style.display = "none";
        btn.innerHTML = `<i class="fa-solid fa-code"></i> Toggle Custom`;
    }
}

function setCategoryFilter(category) {
    currentCategory = category;
    document.querySelectorAll(".cat-tab").forEach(b => b.classList.remove("active"));
    
    // Support finding either single or double quote attributes
    const activeTab = document.querySelector(`.cat-tab[onclick*="'${category}'"]`) || document.querySelector(`.cat-tab[onclick*='"${category}"']`);
    if (activeTab) activeTab.classList.add("active");
    
    if (apiCachedData) {
        renderOutput(apiCachedData);
    }
}

function classifyUrl(url) {
    const lower = url.toLowerCase();
    if (/\.(png|jpg|jpeg|webp|gif|bmp|ktx)/i.test(lower)) return "images";
    if (/\.(mp4|webm)/i.test(lower)) return "videos";
    if (/\.(mp3|wav|ogg)/i.test(lower)) return "audio";
    if (/\.html/i.test(lower)) return "html";
    if (/(discord\.gg|instagram\.com|youtube\.com|youtu\.be|facebook\.com|twitter\.com|x\.com|linktr\.ee|whatsapp\.com)/i.test(lower)) return "social";
    return "other";
}

function updateCategoryCounts(data) {
    const urls = data.urls || [];
    const counts = { all: urls.length, images: 0, videos: 0, audio: 0, html: 0, social: 0, other: 0 };
    
    urls.forEach(url => {
        const cat = classifyUrl(url);
        if (counts[cat] !== undefined) {
            counts[cat]++;
        } else {
            counts["other"]++;
        }
    });

    for (const [key, value] of Object.entries(counts)) {
        const element = document.getElementById(`count-${key}`);
        if (element) element.innerText = value;
    }
}

function updateStatusUI(status, hexColor) {
    const el = document.getElementById("statusText");
    el.innerText = status;
    el.style.color = hexColor || "var(--text)";
}

function displayToast(msg) {
    const toast = document.getElementById("toastNotifier");
    toast.innerText = msg;
    toast.classList.add("show");
    setTimeout(() => toast.classList.remove("show"), 1800);
}

async function runAPI() {
    const apiName = document.getElementById("apiName").value.trim();
    if (!apiName) {
        alert("Enter a target endpoint path string.");
        return;
    }

    const payloadInput = document.getElementById("customPayload").value.trim();

    updateStatusUI("SCANNING", "var(--yellow)");
    document.getElementById("output").innerHTML = '<div class="loading-state">Engine handshake parsing payload packets...</div>';
    resetSearchState();

    try {
        let endpoint = `/run_script?server=${selectedServer}&name=${encodeURIComponent(apiName)}`;
        if (payloadInput) {
            endpoint += `&payload=${encodeURIComponent(payloadInput)}`;
        }
        
        const res = await fetch(endpoint);
        const data = await res.json();

        if (data.error) {
            updateStatusUI("ERROR", "#ff4444");
            document.getElementById("output").innerHTML = `<div style="color:#ff4444; font-family:monospace;">Engine Fault: ${data.error}</div>`;
            return;
        }

        document.getElementById("stringCount").innerText = data.count || 0;
        document.getElementById("linkCount").innerText = data.raw_count || 0;
        updateStatusUI("ONLINE", "#00ff95");

        currentLinksArray = data.urls || [];
        apiCachedData = data; 
        
        updateCategoryCounts(data);
        renderOutput(data);

    } catch (err) {
        updateStatusUI("FAULT", "#ff4444");
        document.getElementById("output").innerHTML = `<div style="color:#ff4444; font-family:monospace;">Network connection handshake termination reset.</div>`;
    }
}

function renderOutput(data) {
    const output = document.getElementById("output");
    const categoryTabs = document.getElementById("categoryTabsContainer");

    if (viewMode === "links") {
        categoryTabs.style.display = "flex";
        
        // Filter elements locally based on selected category tab
        const filteredUrls = (data.urls || []).filter(url => {
            if (currentCategory === "all") return true;
            return classifyUrl(url) === currentCategory;
        });

        if (filteredUrls.length === 0) {
            output.innerHTML = `<div style="color:var(--muted); font-style:italic; padding: 24px; text-align: center; font-size:13px;">No assets discovered under this category filter.</div>`;
            lastOutputText = "";
        } else {
            let html = "";
            filteredUrls.forEach(link => {
                const cat = classifyUrl(link);
                html += `
                <div class="url-card" data-url="${link}">
                    <div class="url-badge badge-${cat}">${cat}</div>
                    <div class="url-details">
                        <a href="${link}" target="_blank" class="url-href">${link}</a>
                    </div>
                    <div class="url-actions">
                        <button class="card-action-btn" onclick="copyIndividualText('${link}')" title="Copy URL"><i class="fa-solid fa-copy"></i></button>
                        <button class="card-action-btn" onclick="window.open('${link}', '_blank')" title="Open"><i class="fa-solid fa-external-link"></i></button>
                    </div>
                </div>`;
            });
            output.innerHTML = html;
            lastOutputText = filteredUrls.join("\n");
        }
    } else {
        categoryTabs.style.display = "none";
        if (viewMode === "raw") {
            lastOutputText = data.raw_response || "";
            output.textContent = lastOutputText;
        } else if (viewMode === "strings") {
            lastOutputText = (data.strings || []).join("\n");
            output.textContent = lastOutputText;
        }
    }
    performSearch();
}

function copyIndividualText(text) {
    navigator.clipboard.writeText(text);
    displayToast("URL buffered to clip");
}

function copyOutput() {
    if (!lastOutputText) return;
    navigator.clipboard.writeText(lastOutputText);
    displayToast("Buffered log context copied");
}

function clearOutput() {
    document.getElementById("output").innerHTML = "SYSTEM LOG: FLUSH COMPLETED";
    document.getElementById("stringCount").innerText = "0";
    document.getElementById("linkCount").innerText = "0";
    document.getElementById("apiName").value = "";
    document.getElementById("customPayload").value = "8533b7e1d34a5dfd9a830ee5cc36664e";
    updateStatusUI("IDLE", "var(--muted)");
    lastOutputText = "";
    apiCachedData = null;
    currentLinksArray = [];
    currentCategory = "all";
    resetSearchState();
    
    const categories = ["all", "images", "videos", "audio", "html", "social", "other"];
    categories.forEach(cat => {
        const el = document.getElementById(`count-${cat}`);
        if (el) el.innerText = "0";
    });
    setCategoryFilter("all");
    
    displayToast("Console memory flushed");
}

function downloadOutput() {
    if (!lastOutputText) return;
    const blob = new Blob([lastOutputText], { type: "text/plain" });
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = `ff_api_logs_${selectedServer}.log`;
    a.click();
}

/* Precise Minimal Node Search System */
function resetSearchState() {
    searchMatches = [];
    currentMatchIndex = -1;
    document.getElementById("searchCount").innerText = "0/0";
    document.getElementById("prevSearchBtn").disabled = true;
    document.getElementById("nextSearchBtn").disabled = true;
}

function performSearch() {
    const query = document.getElementById("searchBox").value.trim().toLowerCase();
    const output = document.getElementById("output");
    
    if (viewMode === "links") {
        if (!apiCachedData) return;
        const cards = output.querySelectorAll(".url-card");
        
        cards.forEach(card => {
            const url = card.getAttribute("data-url") || "";
            const hrefElement = card.querySelector(".url-href");
            
            if (!query) {
                card.style.display = "flex";
                hrefElement.innerHTML = url;
            } else if (url.toLowerCase().includes(query)) {
                card.style.display = "flex";
                const regex = new RegExp(`(${escapePattern(query)})`, "gi");
                hrefElement.innerHTML = url.replace(regex, `<mark class="search-match">$1</mark>`);
            } else {
                card.style.display = "none";
            }
        });
        
        searchMatches = Array.from(output.querySelectorAll("mark.search-match"));
        
        if (searchMatches.length > 0) {
            currentMatchIndex = 0;
            updateSearchStatsUI();
            applyFocusHighlight();
        } else {
            currentMatchIndex = -1;
            updateSearchStatsUI();
        }
    } else {
        if (!query) {
            resetSearchState();
            output.textContent = lastOutputText;
            return;
        }

        output.textContent = lastOutputText;
        highlightNodes(output, query);
        searchMatches = Array.from(output.querySelectorAll("mark.search-match"));
        
        if (searchMatches.length > 0) {
            currentMatchIndex = 0;
            updateSearchStatsUI();
            applyFocusHighlight();
        } else {
            currentMatchIndex = -1;
            updateSearchStatsUI();
        }
    }
}

function highlightNodes(root, token) {
    const regex = new RegExp(`(${escapePattern(token)})`, "gi");
    function parser(node) {
        if (node.nodeType === Node.TEXT_NODE) {
            if (node.textContent.match(regex)) {
                const wrapper = document.createElement("span");
                wrapper.innerHTML = node.textContent.replace(regex, `<mark class="search-match">$1</mark>`);
                node.parentNode.replaceChild(wrapper, node);
            }
        } else if (node.nodeType === Node.ELEMENT_NODE && node.nodeName !== 'MARK' && node.nodeName !== 'SCRIPT' && node.nodeName !== 'STYLE') {
            for (let i = node.childNodes.length - 1; i >= 0; i--) {
                parser(node.childNodes[i]);
            }
        }
    }
    parser(root);
}

function escapePattern(str) {
    return str.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
}

function updateSearchStatsUI() {
    const len = searchMatches.length;
    const cur = len > 0 ? currentMatchIndex + 1 : 0;
    document.getElementById("searchCount").innerText = `${cur}/${len}`;
    const state = len === 0;
    document.getElementById("prevSearchBtn").disabled = state;
    document.getElementById("nextSearchBtn").disabled = state;
}

function applyFocusHighlight() {
    searchMatches.forEach(el => el.classList.remove("match-active"));
    if (currentMatchIndex >= 0 && currentMatchIndex < searchMatches.length) {
        const target = searchMatches[currentMatchIndex];
        target.classList.add("match-active");
        target.scrollIntoView({
            behavior: "smooth",
            block: "center"
        });
    }
}

function navigateSearch(offset) {
    if (searchMatches.length === 0) return;
    currentMatchIndex += offset;
    if (currentMatchIndex >= searchMatches.length) currentMatchIndex = 0;
    if (currentMatchIndex < 0) currentMatchIndex = searchMatches.length - 1;
    updateSearchStatsUI();
    applyFocusHighlight();
}

document.getElementById("searchBox").addEventListener("keydown", function(e) {
    if (searchMatches.length === 0) return;
    if (e.key === "Enter") {
        e.preventDefault();
        if (e.shiftKey) {
            navigateSearch(-1);
        } else {
            navigateSearch(1);
        }
    }
});
</script>
