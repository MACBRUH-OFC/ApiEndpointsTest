<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Free Fire API Tool</title>

<style>

body{
background:#f5f5f5;
font-family:Arial,sans-serif;
padding:15px;
max-width:1000px;
margin:auto;
}

h2{
text-align:center;
margin-bottom:15px;
}

input{
padding:10px;
width:100%;
border-radius:6px;
border:1px solid #ccc;
font-size:14px;
margin-bottom:12px;
box-sizing:border-box;
}

.btn-container{
display:flex;
flex-wrap:wrap;
gap:10px;
justify-content:center;
}

.server-btn{
flex:1 1 120px;
padding:10px;
border:none;
border-radius:6px;
background:#007BFF;
color:white;
cursor:pointer;
transition:.2s;
}

.server-btn:hover{
background:#0056b3;
}

.server-btn.active{
background:#28a745;
}

pre{
background:#1e1e1e;
color:#eaeaea;
padding:12px;
border-radius:6px;
height:450px;
overflow-y:auto;
font-size:14px;
white-space:pre-wrap;
word-break:break-word;
}

.download-btn{
padding:12px;
background:#ff9800;
border:none;
color:white;
border-radius:6px;
cursor:pointer;
font-size:15px;
width:100%;
margin-top:12px;
}

.copy-btn{
padding:12px;
background:#28a745;
border:none;
color:white;
border-radius:6px;
cursor:pointer;
font-size:15px;
width:100%;
margin-top:12px;
}

.top-buttons{
display:flex;
gap:10px;
}

.status{
margin-bottom:10px;
font-weight:bold;
}

</style>

</head>

<body>

<h2>Free Fire API Tool</h2>

<input
type="text"
id="name"
placeholder="Enter API Name"
>

<div class="btn-container">

<button class="server-btn active" id="ind" onclick="runServer('ind')">Indian</button>
<button class="server-btn" id="mea" onclick="runServer('mea')">MEA</button>
<button class="server-btn" id="id" onclick="runServer('id')">Indonesia</button>
<button class="server-btn" id="cis" onclick="runServer('cis')">CIS</button>
<button class="server-btn" id="br" onclick="runServer('br')">Brazil</button>
<button class="server-btn" id="latam" onclick="runServer('latam')">Latam</button>
<button class="server-btn" id="vn" onclick="runServer('vn')">Vietnam</button>
<button class="server-btn" id="tw" onclick="runServer('tw')">Taiwan</button>
<button class="server-btn" id="th" onclick="runServer('th')">Thailand</button>
<button class="server-btn" id="sg" onclick="runServer('sg')">Singapore</button>
<button class="server-btn" id="eu" onclick="runServer('eu')">Europe</button>
<button class="server-btn" id="na" onclick="runServer('na')">North America</button>
<button class="server-btn" id="pk" onclick="runServer('pk')">Pakistan</button>
<button class="server-btn" id="bd" onclick="runServer('bd')">Bangladesh</button>

</div>

<div class="status" id="status">
Ready
</div>

<pre id="output">Results will appear here...</pre>

<div class="top-buttons">

<button
class="copy-btn"
onclick="copyResults()"
>
Copy All
</button>

<button
class="download-btn"
onclick="downloadResults()"
>
Download Results
</button>

</div>

<script>

let selectedServer = "ind"

let lastResults = []

function runServer(server){

selectedServer = server

document
.querySelectorAll('.server-btn')
.forEach(btn => btn.classList.remove('active'))

document
.getElementById(server)
.classList.add('active')

let name =
document
.getElementById('name')
.value
.trim()

if(!name){
alert("Enter API name")
return
}

document.getElementById('status').textContent =
"Loading..."

document.getElementById('output').textContent =
"Loading results..."

lastResults = []

fetch(`/run_script?server=${server}&name=${encodeURIComponent(name)}`)

.then(res => res.json())

.then(data => {

if(data.error){

document.getElementById('status').textContent =
"Error"

document.getElementById('output').textContent =
"Error: " + data.error

}else{

lastResults = data.strings || []

document.getElementById('status').textContent =
"Loaded " + lastResults.length + " strings"

document.getElementById('output').textContent =
lastResults.join("\\n")

}

})

.catch(err => {

document.getElementById('status').textContent =
"Request Failed"

document.getElementById('output').textContent =
err

})

}

function downloadResults(){

if(!lastResults.length){
alert("No results")
return
}

let blob = new Blob(
[lastResults.join("\\n")],
{
type:"text/plain"
}
)

let link = document.createElement("a")

link.href = URL.createObjectURL(blob)

link.download = "results.txt"

link.click()

}

function copyResults(){

if(!lastResults.length){
alert("No results")
return
}

navigator.clipboard.writeText(
lastResults.join("\\n")
)

alert("Copied")

}

</script>

</body>
</html>
