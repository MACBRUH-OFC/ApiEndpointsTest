<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Free Fire API Explorer</title>

<script src="https://cdn.tailwindcss.com"></script>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>

@font-face{
font-family:'GFF';
src:url('https://dl.dir.freefiremobile.com/common/web_event/common/fonts/website/GFFLatinW05-Bold.woff') format('woff');
}

body{
margin:0;
background:#000;
color:#fff;
font-family:Inter,sans-serif;
background-image:url('https://dl.dir.freefiremobile.com/common/web_event/official2/dist/client/img/bg_pc.617c669.jpg');
background-size:cover;
background-attachment:fixed;
}

body::before{
content:"";
position:fixed;
inset:0;
background:rgba(0,0,0,.92);
z-index:-1;
}

.gff{
font-family:'GFF';
}

.container{
max-width:560px;
margin:auto;
padding:18px;
}

.logo{
height:70px;
display:flex;
align-items:center;
justify-content:center;
border-bottom:2px solid #ffde00;
background:#000;
}

.logo img{
height:28px;
}

.hero{
text-align:center;
margin:28px 0;
}

.hero h1{
font-size:52px;
line-height:.9;
font-style:italic;
margin:0;
}

.hero .y{
color:#ffde00;
}

.panel{
background:#101010;
border:1px solid #232323;
border-radius:24px;
padding:20px;
box-shadow:0 20px 50px rgba(0,0,0,.7);
}

.label{
font-size:11px;
color:#999;
margin-bottom:8px;
letter-spacing:2px;
}

.input{
width:100%;
height:56px;
background:#161616;
border:1px solid #2c2c2c;
border-radius:16px;
padding:0 16px;
color:#fff;
outline:none;
margin-bottom:14px;
}

.input:focus{
border-color:#ffde00;
}

.btn{
width:100%;
height:58px;
border:none;
border-radius:16px;
background:#ffde00;
color:#000;
font-size:18px;
font-family:'GFF';
font-style:italic;
cursor:pointer;
margin-top:8px;
}

.stats{
margin-top:16px;
padding:14px;
background:#171717;
border-radius:16px;
display:flex;
justify-content:space-between;
font-size:13px;
}

.results{
margin-top:18px;
background:#111;
border:1px solid #252525;
border-radius:18px;
overflow:hidden;
}

.search{
width:100%;
height:50px;
background:#181818;
border:none;
outline:none;
padding:0 14px;
color:#fff;
border-bottom:1px solid #252525;
}

.box{
max-height:70vh;
overflow:auto;
padding:12px;
}

.card{
background:#171717;
border:1px solid #282828;
border-radius:14px;
padding:12px;
margin-bottom:12px;
}

.url{
word-break:break-all;
font-size:12px;
line-height:1.5;
}

.preview{
width:100%;
margin-top:10px;
border-radius:12px;
display:none;
}

.row{
display:flex;
gap:10px;
margin-top:12px;
}

.small{
flex:1;
height:40px;
border:none;
border-radius:10px;
background:#242424;
color:#fff;
cursor:pointer;
}

.loading{
padding:60px 20px;
text-align:center;
color:#999;
}

</style>

</head>

<body>

<div class="logo">
<img src="https://dl.dir.freefiremobile.com/common/web_event/official2/dist/client/img/full_logo.969f536.png">
</div>

<div class="container">

<div class="hero gff">
<h1>API</h1>
<h1 class="y">EXPLORER</h1>
</div>

<div class="panel">

<div class="label gff">REGION</div>

<select class="input" id="region">
<option value="ind">IND</option>
<option value="br">BR</option>
<option value="na">NA</option>
<option value="eu">EU</option>
<option value="sg">SG</option>
<option value="vn">VN</option>
<option value="th">TH</option>
<option value="tw">TW</option>
<option value="id">ID</option>
<option value="pk">PK</option>
<option value="bd">BD</option>
</select>

<div class="label gff">ENDPOINT</div>

<input class="input" id="endpoint" placeholder="major/login">

<button class="btn" onclick="scanLinks()">
SCAN LINKS
</button>

<div class="stats">
<div id="status">READY</div>
<div id="count">0 links</div>
</div>

<div class="results">

<input class="search" id="search" placeholder="Find links..." oninput="filterLinks()">

<div class="box" id="results">

<div class="loading">
No links loaded
</div>

</div>

</div>

</div>

</div>

<script>

let allLinks = [];

async function scanLinks(){

const endpoint = document.getElementById('endpoint').value.trim();

const region = document.getElementById('region').value;

if(!endpoint){
alert("Enter endpoint");
return;
}

document.getElementById('status').innerText = 'SCANNING';

document.getElementById('results').innerHTML = `
<div class="loading">
<i class="fa-solid fa-spinner fa-spin"></i>
<br><br>
Scanning assets...
</div>
`;

try{

const response = await fetch(`/run_script?server=${region}&name=${encodeURIComponent(endpoint)}`);

const data = await response.json();

if(data.error){
throw new Error(data.error);
}

allLinks = data.strings || [];

renderLinks(allLinks);

document.getElementById('status').innerText = 'SUCCESS';

document.getElementById('count').innerText = allLinks.length + ' links';

}catch(e){

document.getElementById('status').innerText = 'ERROR';

document.getElementById('results').innerHTML = `
<div class="loading">
${e.message}
</div>
`;

}

}

function renderLinks(arr){

if(arr.length === 0){

document.getElementById('results').innerHTML = `
<div class="loading">
No valid links found
</div>
`;

return;
}

let html = '';

arr.forEach(link=>{

const isImage =
link.includes('.png') ||
link.includes('.jpg') ||
link.includes('.jpeg') ||
link.includes('.webp');

html += `
<div class="card">

<div class="url">${link}</div>

${isImage ? `
<img
class="preview"
src="${link}"
loading="lazy"
onload="this.style.display='block'"
>
` : ''}

<div class="row">

<button class="small" onclick="copyLink('${link}')">
COPY
</button>

<button class="small" onclick="window.open('${link}','_blank')">
OPEN
</button>

</div>

</div>
`;

});

document.getElementById('results').innerHTML = html;

}

function copyLink(link){

navigator.clipboard.writeText(link);

}

function filterLinks(){

const q = document.getElementById('search').value.toLowerCase();

const filtered = allLinks.filter(x=>x.toLowerCase().includes(q));

renderLinks(filtered);

}

</script>

</body>
</html>
