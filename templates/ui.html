<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>FF API TOOL</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>

body{
background:#050505;
color:white;
font-family:Arial,sans-serif;
padding:16px;
}

.panel{
background:#101010;
border:1px solid #222;
border-radius:18px;
padding:16px;
}

.server-btn{
padding:12px;
border-radius:12px;
background:#171717;
border:1px solid #2a2a2a;
font-size:13px;
font-weight:bold;
cursor:pointer;
transition:.2s;
}

.server-btn:hover{
background:#ffde00;
color:black;
}

.server-btn.active{
background:#ffde00;
color:black;
}

input{
width:100%;
padding:14px;
border-radius:14px;
background:#0b0b0b;
border:1px solid #222;
outline:none;
color:white;
}

.result-card{
background:#0d0d0d;
border:1px solid #202020;
border-radius:16px;
padding:14px;
overflow:hidden;
}

.raw-box{
background:#070707;
border:1px solid #1d1d1d;
padding:12px;
border-radius:12px;
font-size:12px;
white-space:pre-wrap;
word-break:break-word;
max-height:260px;
overflow:auto;
color:#cfcfcf;
}

.toggle{
display:flex;
align-items:center;
gap:8px;
font-size:14px;
}

.preview-img{
margin-top:12px;
border-radius:12px;
border:1px solid #2a2a2a;
max-height:240px;
}

.small-btn{
padding:10px 14px;
border-radius:12px;
background:#1a1a1a;
border:1px solid #2a2a2a;
font-size:13px;
cursor:pointer;
}

.small-btn:hover{
background:#2a2a2a;
}

</style>

</head>

<body>

<div class="max-w-7xl mx-auto space-y-5">

<div class="text-center">

<h1 class="text-5xl font-black text-yellow-400">
FF API TOOL
</h1>

<p class="text-zinc-500 mt-2">
Advanced Link Extractor + Raw Viewer
</p>

</div>

<div class="panel space-y-5">

<input
id="api"
placeholder="Enter API Name"
/>

<div
id="servers"
class="grid grid-cols-2 md:grid-cols-4 gap-3"
></div>

<button
onclick="runAPI()"
class="w-full bg-yellow-400 text-black font-black p-4 rounded-2xl"
>
RUN API
</button>

<div class="grid grid-cols-2 md:grid-cols-4 gap-3">

<div class="panel">
<div class="text-zinc-500 text-sm">LINKS</div>
<div id="count" class="text-3xl font-bold">0</div>
</div>

<div class="panel">
<div class="text-zinc-500 text-sm">STATUS</div>
<div id="status" class="text-3xl font-bold">0</div>
</div>

<div class="panel">
<div class="text-zinc-500 text-sm">RAW SIZE</div>
<div id="rawsize" class="text-3xl font-bold">0</div>
</div>

<div class="panel">
<div class="text-zinc-500 text-sm">STRINGS</div>
<div id="stringscount" class="text-3xl font-bold">0</div>
</div>

</div>

<input
id="search"
placeholder="Search..."
oninput="renderResults()"
/>

<div class="flex flex-wrap gap-5">

<label class="toggle">
<input type="checkbox" id="preview" checked>
Preview Images
</label>

<label class="toggle">
<input type="checkbox" id="linksOnly" checked>
Links Only
</label>

<label class="toggle">
<input type="checkbox" id="showRaw">
Show Raw Strings
</label>

<label class="toggle">
<input type="checkbox" id="images" checked>
Images
</label>

<label class="toggle">
<input type="checkbox" id="json" checked>
JSON
</label>

<label class="toggle">
<input type="checkbox" id="html" checked>
HTML
</label>

</div>

<div class="flex flex-wrap gap-3">

<button
onclick="copyAllLinks()"
class="small-btn"
>
COPY ALL LINKS
</button>

<button
onclick="copyRawStrings()"
class="small-btn"
>
COPY RAW
</button>

<button
onclick="downloadLinks()"
class="small-btn"
>
DOWNLOAD LINKS
</button>

<button
onclick="downloadRaw()"
class="small-btn"
>
DOWNLOAD RAW
</button>

</div>

</div>

<div
id="results"
class="space-y-4"
></div>

</div>

<script>

const regions = [
"ind","mea","id","cis","br","latam",
"vn","tw","th","sg","eu","na","pk","bd"
]

let selectedServer = "ind"

let allLinks = []
let allStrings = []

const serverBox = document.getElementById("servers")

regions.forEach(region=>{

const btn = document.createElement("button")

btn.className = "server-btn"

btn.innerText = region.toUpperCase()

if(region==="ind"){
btn.classList.add("active")
}

btn.onclick = ()=>{

document
.querySelectorAll(".server-btn")
.forEach(x=>x.classList.remove("active"))

btn.classList.add("active")

selectedServer = region

}

serverBox.appendChild(btn)

})

async function runAPI(){

const api = document
.getElementById("api")
.value
.trim()

if(!api){

alert("Enter API")

return

}

document.getElementById("results").innerHTML =
"<div class='text-yellow-400'>Loading...</div>"

try{

const response = await fetch(
`/run_script?server=${selectedServer}&name=${encodeURIComponent(api)}`
)

const data = await response.json()

if(!data.success){

document.getElementById("results").innerHTML =
`<div class="text-red-500">${data.error}</div>`

return

}

allLinks = data.links || []

allStrings = data.strings || []

document.getElementById("count").innerText =
data.count

document.getElementById("status").innerText =
data.status

document.getElementById("rawsize").innerText =
data.raw_size

document.getElementById("stringscount").innerText =
data.strings_count

renderResults()

}catch(err){

document.getElementById("results").innerHTML =
`<div class="text-red-500">${err}</div>`

}

}

function renderResults(){

const results = document.getElementById("results")

results.innerHTML = ""

const search =
document.getElementById("search")
.value
.toLowerCase()

const preview =
document.getElementById("preview").checked

const linksOnly =
document.getElementById("linksOnly").checked

const showRaw =
document.getElementById("showRaw").checked

const images =
document.getElementById("images").checked

const json =
document.getElementById("json").checked

const html =
document.getElementById("html").checked

let filteredLinks = allLinks.filter(link=>{

if(search && !link.toLowerCase().includes(search)){
return false
}

if(!images){

if(link.match(/\.(png|jpg|jpeg|webp|gif|ktx)$/i)){
return false
}

}

if(!json){

if(link.includes(".json")){
return false
}

}

if(!html){

if(link.includes(".html")){
return false
}

}

return true

})

if(linksOnly){

filteredLinks.forEach(link=>{

const card = document.createElement("div")

card.className = "result-card"

card.innerHTML = `

<div class="flex justify-between gap-3">

<a
href="${link}"
target="_blank"
class="text-cyan-400 break-all"
>
${link}
</a>

<button
onclick="copyText('${link}')"
class="text-yellow-400"
>
COPY
</button>

</div>

${preview ? previewHTML(link) : ""}

`

results.appendChild(card)

})

}else{

allStrings.forEach(str=>{

if(search && !str.toLowerCase().includes(search)){
return
}

const card = document.createElement("div")

card.className = "result-card"

card.innerHTML = `

<div class="raw-box">${escapeHTML(str)}</div>

`

results.appendChild(card)

})

}

if(showRaw){

const rawCard = document.createElement("div")

rawCard.className = "result-card"

rawCard.innerHTML = `

<div class="text-yellow-400 font-bold mb-3">
RAW STRINGS
</div>

<div class="raw-box">
${escapeHTML(allStrings.join("\n"))}
</div>

`

results.appendChild(rawCard)

}

}

function previewHTML(link){

if(link.match(/\.(png|jpg|jpeg|webp|gif)$/i)){

return `
<img
src="${link}"
class="preview-img"
/>
`

}

return ""

}

function copyText(text){

navigator.clipboard.writeText(text)

}

function copyAllLinks(){

navigator.clipboard.writeText(
allLinks.join("\n")
)

}

function copyRawStrings(){

navigator.clipboard.writeText(
allStrings.join("\n")
)

}

function downloadLinks(){

const blob = new Blob(
[allLinks.join("\n")],
{type:"text/plain"}
)

const a = document.createElement("a")

a.href = URL.createObjectURL(blob)

a.download = "links.txt"

a.click()

}

function downloadRaw(){

const blob = new Blob(
[allStrings.join("\n")],
{type:"text/plain"}
)

const a = document.createElement("a")

a.href = URL.createObjectURL(blob)

a.download = "raw_strings.txt"

a.click()

}

function escapeHTML(text){

return text
.replace(/&/g,"&amp;")
.replace(/</g,"&lt;")
.replace(/>/g,"&gt;")

}

</script>

</body>
</html>
