<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>FREE FIRE API ENGINE</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>
@font-face {
    font-family: 'GFF';
    src: url('https://dl.dir.freefiremobile.com/common/web_event/common/fonts/website/GFFLatinW05-Bold.woff') format('woff');
}

:root {
    --yellow: #ffde00;
    --bg: #0a0a0a;
    --panel: #111111;
    --card: #161616;
    --border: #222222;
    --border-hover: #333333;
    --text: #f5f5f5;
    --muted: #707070;
    
    /* Perfect contrast highlights */
    --match-bg: #ffe600;
    --match-text: #000000;
    --match-active: #ff7700;
}

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    background-color: #000000;
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    min-height: 100vh;
    letter-spacing: -0.2px;
}

/* Premium micro scrollbars */
::-webkit-scrollbar {
    width: 6px;
    height: 6px;
}
::-webkit-scrollbar-track {
    background: #000000;
}
::-webkit-scrollbar-thumb {
    background: #222222;
    border-radius: 3px;
}
::-webkit-scrollbar-thumb:hover {
    background: var(--yellow);
}

.wrapper {
    width: 100%;
    max-width: 1100px;
    margin: 0 auto;
    padding: 40px 24px;
}

/* Header Optimization */
header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid var(--border);
    padding-bottom: 20px;
    margin-bottom: 32px;
}

.brand-group {
    display: flex;
    align-items: center;
    gap: 16px;
}

.brand-logo {
    height: 24px;
    object-fit: contain;
}

.badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 4px 10px;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 6px;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.5px;
    color: var(--muted);
}

.dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--yellow);
    box-shadow: 0 0 8px var(--yellow);
}

.engine-title {
    font-family: 'GFF', sans-serif;
    font-size: 18px;
    font-style: italic;
    text-transform: uppercase;
}
.engine-title span {
    color: var(--yellow);
}

/* Core Dashboard Layout */
.app-panel {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 24px;
}

/* Pure Inputs UI */
.input-row {
    position: relative;
    margin-bottom: 20px;
}

.main-input {
    width: 100%;
    height: 52px;
    background: #000000;
    border: 1px solid var(--border);
    border-radius: 8px;
    color: #ffffff;
    padding: 0 140px 0 16px;
    font-size: 14px;
    font-family: monospace;
    outline: none;
    transition: all 0.15s ease;
}

.main-input:focus {
    border-color: var(--yellow);
}

.run-action-btn {
    position: absolute;
    right: 6px;
    top: 6px;
    height: 40px;
    padding: 0 20px;
    background: var(--yellow);
    border: none;
    border-radius: 6px;
    color: #000000;
    font-family: 'GFF', sans-serif;
    font-size: 13px;
    font-weight: 900;
    cursor: pointer;
    transition: background 0.15s ease;
}

.run-action-btn:hover {
    background: #e5c800;
}

/* Minimal Grid Systems */
.section-label {
    font-size: 11px;
    text-transform: uppercase;
    color: var(--muted);
    font-weight: 700;
    letter-spacing: 0.8px;
    margin-bottom: 10px;
}

.server-selector {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(70px, 1fr));
    gap: 6px;
    margin-bottom: 24px;
}

.srv-chip {
    height: 34px;
    background: #000000;
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--muted);
    font-size: 11px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.15s ease;
}

.srv-chip:hover {
    border-color: var(--border-hover);
    color: #fff;
}

.srv-chip.active {
    background: #ffffff;
    border-color: #ffffff;
    color: #000000;
}

/* Unified Layout Options Switcher */
.view-options {
    display: flex;
    gap: 8px;
    margin-bottom: 28px;
    border-bottom: 1px solid #1a1a1a;
    padding-bottom: 16px;
}

.opt-toggle {
    padding: 8px 16px;
    background: #000000;
    border: 1px solid var(--border);
    border-radius: 6px;
    font-size: 11px;
    font-weight: 700;
    color: var(--muted);
    cursor: pointer;
    transition: all 0.15s ease;
}

.opt-toggle:hover {
    border-color: var(--border-hover);
}

.opt-toggle.active {
    border-color: var(--yellow);
    color: var(--yellow);
    background: rgba(255, 222, 0, 0.02);
}

/* Performance Metrics Track */
.metrics-row {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
    margin-bottom: 24px;
}

.metric-card {
    background: #000000;
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 14px 16px;
}

.metric-card .lbl {
    font-size: 10px;
    text-transform: uppercase;
    color: var(--muted);
    letter-spacing: 0.5px;
    margin-bottom: 4px;
}

.metric-card .val {
    font-size: 20px;
    font-weight: 700;
    font-family: monospace;
}

/* Control Hub Console Deck */
.control-deck {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 16px;
    margin-bottom: 12px;
}

.search-wrapper {
    flex: 1;
    display: flex;
    align-items: center;
    background: #000000;
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 0 12px;
    height: 38px;
}

.search-wrapper:focus-within {
    border-color: var(--border-hover);
}

.search-input {
    width: 100%;
    background: transparent;
    border: none;
    outline: none;
    color: #ffffff;
    font-size: 13px;
    padding-left: 8px;
}

.search-counter {
    font-size: 11px;
    color: var(--muted);
    font-family: monospace;
    white-space: nowrap;
    margin-right: 8px;
}

.search-nav {
    display: flex;
    gap: 2px;
}

.search-step-btn {
    width: 24px;
    height: 24px;
    background: transparent;
    border: none;
    color: var(--muted);
    cursor: pointer;
    border-radius: 4px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 11px;
}

.search-step-btn:hover:not(:disabled) {
    color: #fff;
    background: var(--card);
}

.search-step-btn:disabled {
    opacity: 0.2;
    cursor: not-allowed;
}

.utility-actions {
    display: flex;
    gap: 6px;
}

.util-btn {
    height: 38px;
    padding: 0 14px;
    background: #000000;
    border: 1px solid var(--border);
    border-radius: 6px;
    color: #a0a0a0;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 6px;
    transition: all 0.15s ease;
}

.util-btn:hover {
    border-color: var(--border-hover);
    color: #ffffff;
}

/* Pristine Code Output Monitor */
.console-monitor {
    width: 100%;
    height: 500px;
    background: #000000;
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 18px;
    overflow: auto;
    white-space: pre-wrap;
    word-break: break-word;
    font-size: 13px;
    line-height: 1.6;
    color: #bbbbbb;
    font-family: 'Courier New', Courier, monospace;
}

/* Precise Marker Highlighting styling */
mark.search-match {
    background-color: var(--match-bg);
    color: var(--match-text);
    border-radius: 1px;
}

mark.search-match.match-active {
    background-color: var(--match-active);
    color: #ffffff;
}

.url-item {
    padding: 10px 12px;
    background: #050505;
    border: 1px solid #161616;
    border-radius: 6px;
    margin-bottom: 6px;
}

.url-item a {
    color: #58a6ff;
    text-decoration: none;
    font-family: monospace;
    font-size: 12.5px;
}

.url-item a:hover {
    text-decoration: underline;
}

.toast {
    position: fixed;
    bottom: 20px;
    right: 20px;
    background: #ffffff;
    color: #000000;
    padding: 10px 18px;
    border-radius: 6px;
    font-size: 12px;
    font-weight: 700;
    opacity: 0;
    transform: translateY(10px);
    transition: all 0.2s ease;
    z-index: 1000;
    pointer-events: none;
}

.toast.show {
    opacity: 1;
    transform: translateY(0);
}

.loading-state {
    color: var(--muted);
    font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    font-size: 13px;
}

@media (max-width: 768px) {
    header { flex-direction: column; align-items: flex-start; gap: 14px; }
    .control-deck { flex-direction: column; align-items: stretch; gap: 8px; }
    .server-selector { grid-template-columns: repeat(4, 1fr); }
    .metrics-row { grid-template-columns: 1fr; gap: 8px; }
}
</style>
</head>
<body>

<div class="wrapper">

    <!-- Premium Minimal Header -->
    <header>
        <div class="brand-group">
            <img src="https://dl.dir.freefiremobile.com/common/web_event/official2/dist/client/img/full_logo.969f536.png" class="brand-logo" alt="FF">
            <div class="badge">
                <div class="dot"></div>
                <span>LIVE RESPONDER</span>
            </div>
        </div>
        <div class="engine-title">API <span>TOOL</span></div>
    </header>

    <div class="app-panel">

        <!-- Target Input -->
        <div class="input-row">
            <input type="text" id="apiName" class="main-input" placeholder="Enter endpoint path string...">
            <button class="run-action-btn" onclick="runAPI()">SCAN ENGINE</button>
        </div>

        <!-- Servers -->
        <div class="section-label">Target Region Cluster</div>
        <div class="server-selector" id="serverSelectorGrid">
            <button class="srv-chip active" onclick="setServer(this,'ind')">IND</button>
            <button class="srv-chip" onclick="setServer(this,'mea')">MEA</button>
            <button class="srv-chip" onclick="setServer(this,'id')">ID</button>
            <button class="srv-chip" onclick="setServer(this,'cis')">CIS</button>
            <button class="srv-chip" onclick="setServer(this,'br')">BR</button>
            <button class="srv-chip" onclick="setServer(this,'latam')">LATAM</button>
            <button class="srv-chip" onclick="setServer(this,'vn')">VN</button>
            <button class="srv-chip" onclick="setServer(this,'tw')">TW</button>
            <button class="srv-chip" onclick="setServer(this,'th')">TH</button>
            <button class="srv-chip" onclick="setServer(this,'sg')">SG</button>
            <button class="srv-chip" onclick="setServer(this,'eu')">EU</button>
            <button class="srv-chip" onclick="setServer(this,'na')">NA</button>
            <button class="srv-chip" onclick="setServer(this,'pk')">PK</button>
            <button class="srv-chip" onclick="setServer(this,'bd')">BD</button>
        </div>

        <!-- Layout Views Configuration -->
        <div class="section-label">Output Perspective View</div>
        <div class="view-options">
            <button class="opt-toggle active" id="btn-links" onclick="setViewMode('links')">LINKS ONLY</button>
            <button class="opt-toggle" id="btn-raw" onclick="setViewMode('raw')">RAW RESPONSE</button>
            <button class="opt-toggle" id="btn-strings" onclick="setViewMode('strings')">ALL STRINGS</button>
        </div>

        <!-- Operational Status Metrics Tracker -->
        <div class="metrics-row">
            <div class="metric-card">
                <div class="lbl">Total Strings</div>
                <div class="val" id="stringCount">0</div>
            </div>
            <div class="metric-card">
                <div class="lbl">Extracted Links</div>
                <div class="val" id="linkCount">0</div>
            </div>
            <div class="metric-card">
                <div class="lbl">Engine Status</div>
                <div class="val" id="statusText" style="color: var(--muted);">IDLE</div>
            </div>
        </div>

        <!-- Streamlined Control Deck -->
        <div class="control-deck">
            <div class="search-wrapper">
                <i class="fa-solid fa-magnifying-glass" style="color: #444; font-size: 12px;"></i>
                <input type="text" class="search-input" id="searchBox" placeholder="Filter / Find..." oninput="performSearch()">
                <span class="search-counter" id="searchCount">0/0</span>
                <div class="search-nav">
                    <button class="search-step-btn" id="prevSearchBtn" onclick="navigateSearch(-1)" disabled><i class="fa-solid fa-chevron-up"></i></button>
                    <button class="search-step-btn" id="nextSearchBtn" onclick="navigateSearch(1)" disabled><i class="fa-solid fa-chevron-down"></i></button>
                </div>
            </div>
            
            <div class="utility-actions">
                <button class="util-btn" onclick="copyOutput()"><i class="fa-solid fa-copy"></i> Copy</button>
                <button class="util-btn" onclick="downloadOutput()"><i class="fa-solid fa-download"></i> Download</button>
                <button class="util-btn" onclick="clearOutput()"><i class="fa-solid fa-trash"></i> Reset</button>
            </div>
        </div>

        <!-- Clean Output Console -->
        <div class="console-monitor" id="output">SYSTEM LOG: READY DEVICE OVERFLOW</div>

    </div>
</div>

<div class="toast" id="toastNotifier">Copied to clipboard</div>

<script>
let selectedServer = "ind";
let viewMode = "links"; // Option states tracking: 'links' | 'raw' | 'strings'
let lastOutputText = "";
let currentLinksArray = [];
let apiCachedData = null;

let searchMatches = [];
let currentMatchIndex = -1;

function setServer(btn, server) {
    selectedServer = server;
    document.querySelectorAll(".srv-chip").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
}

function setViewMode(mode) {
    viewMode = mode;
    document.querySelectorAll(".opt-toggle").forEach(b => b.classList.remove("active"));
    document.getElementById(`btn-${mode}`).classList.add("active");
    if (apiCachedData) {
        renderOutput(apiCachedData);
    }
}

function updateStatusUI(status, hexColor) {
    const el = document.getElementById("statusText");
    el.innerText = status;
    el.style.color = hexColor || "var(--text)";
}

function displayToast(msg) {
    const toast = document.getElementById("toastNotifier");
    toast.innerText = msg;
    toast.classList.add("show");
    setTimeout(() => toast.classList.remove("show"), 1800);
}

async function runAPI() {
    const apiName = document.getElementById("apiName").value.trim();
    if (!apiName) {
        alert("Enter a target pipeline string.");
        return;
    }

    updateStatusUI("SCANNING", "var(--yellow)");
    document.getElementById("output").innerHTML = '<div class="loading-state">Engine handshake parsing payload packets...</div>';
    resetSearchState();

    try {
        const res = await fetch(`/run_script?server=${selectedServer}&name=${encodeURIComponent(apiName)}`);
        const data = await res.json();

        if (data.error) {
            updateStatusUI("ERROR", "#ff4444");
            document.getElementById("output").innerHTML = `<div style="color:#ff4444; font-family:monospace;">Engine Fault: ${data.error}</div>`;
            return;
        }

        document.getElementById("stringCount").innerText = data.count || 0;
        document.getElementById("linkCount").innerText = data.raw_count || 0;
        updateStatusUI("ONLINE", "#00ff95");

        currentLinksArray = data.urls || [];
        apiCachedData = data; 
        
        renderOutput(data);

    } catch (err) {
        updateStatusUI("FAULT", "#ff4444");
        document.getElementById("output").innerHTML = `<div style="color:#ff4444; font-family:monospace;">Network connection handshake termination reset.</div>`;
    }
}

function renderOutput(data) {
    const output = document.getElementById("output");

    if (viewMode === "raw") {
        lastOutputText = data.raw_response || "";
        output.textContent = lastOutputText;
    } else if (viewMode === "strings") {
        lastOutputText = (data.strings || []).join("\n");
        output.textContent = lastOutputText;
    } else if (viewMode === "links") {
        if (!currentLinksArray || currentLinksArray.length === 0) {
            output.innerHTML = `<div style="color:var(--muted); font-style:italic;">Null URLs collection dataset response.</div>`;
            lastOutputText = "";
        } else {
            let html = "";
            currentLinksArray.forEach(link => {
                html += `<div class="url-item"><a href="${link}" target="_blank">${link}</a></div>`;
            });
            output.innerHTML = html;
            lastOutputText = currentLinksArray.join("\n");
        }
    }
    performSearch();
}

function copyOutput() {
    if (!lastOutputText) return;
    navigator.clipboard.writeText(lastOutputText);
    displayToast("Buffered logs copied to clip");
}

function clearOutput() {
    document.getElementById("output").innerHTML = "SYSTEM LOG: FLUSH COMPLETED";
    document.getElementById("stringCount").innerText = "0";
    document.getElementById("linkCount").innerText = "0";
    updateStatusUI("IDLE", "var(--muted)");
    lastOutputText = "";
    apiCachedData = null;
    currentLinksArray = [];
    resetSearchState();
    displayToast("Console memory flushed");
}

function downloadOutput() {
    if (!lastOutputText) return;
    const blob = new Blob([lastOutputText], { type: "text/plain" });
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = `api_logs_${selectedServer}.log`;
    a.click();
}

/* Precise Minimal Node Search System */
function resetSearchState() {
    searchMatches = [];
    currentMatchIndex = -1;
    document.getElementById("searchCount").innerText = "0/0";
    document.getElementById("prevSearchBtn").disabled = true;
    document.getElementById("nextSearchBtn").disabled = true;
}

function performSearch() {
    const query = document.getElementById("searchBox").value.trim();
    const output = document.getElementById("output");
    
    if (!query) {
        resetSearchState();
        if (apiCachedData) {
            if (viewMode === "raw" || viewMode === "strings") {
                output.textContent = lastOutputText;
            } else if (viewMode === "links") {
                let html = "";
                currentLinksArray.forEach(link => {
                    html += `<div class="url-item"><a href="${link}" target="_blank">${link}</a></div>`;
                });
                output.innerHTML = html;
            }
        }
        return;
    }

    if (viewMode === "links") {
        let html = "";
        currentLinksArray.forEach(link => {
            html += `<div class="url-item"><a href="${link}" target="_blank">${link}</a></div>`;
        });
        output.innerHTML = html;
        highlightNodes(output, query);
    } else {
        output.textContent = lastOutputText;
        highlightNodes(output, query);
    }

    searchMatches = Array.from(output.querySelectorAll("mark.search-match"));
    
    if (searchMatches.length > 0) {
        currentMatchIndex = 0;
        updateSearchStatsUI();
        applyFocusHighlight();
    } else {
        currentMatchIndex = -1;
        updateSearchStatsUI();
    }
}

function highlightNodes(root, token) {
    const regex = new RegExp(`(${escapePattern(token)})`, "gi");
    function parser(node) {
        if (node.nodeType === Node.TEXT_NODE) {
            if (node.textContent.match(regex)) {
                const wrapper = document.createElement("span");
                wrapper.innerHTML = node.textContent.replace(regex, `<mark class="search-match">$1</mark>`);
                node.parentNode.replaceChild(wrapper, node);
            }
        } else if (node.nodeType === Node.ELEMENT_NODE && node.nodeName !== 'MARK' && node.nodeName !== 'SCRIPT' && node.nodeName !== 'STYLE') {
            for (let i = node.childNodes.length - 1; i >= 0; i--) {
                parser(node.childNodes[i]);
            }
        }
    }
    parser(root);
}

function escapePattern(str) {
    return str.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
}

function updateSearchStatsUI() {
    const len = searchMatches.length;
    const cur = len > 0 ? currentMatchIndex + 1 : 0;
    document.getElementById("searchCount").innerText = `${cur}/${len}`;
    const state = len === 0;
    document.getElementById("prevSearchBtn").disabled = state;
    document.getElementById("nextSearchBtn").disabled = state;
}

function applyFocusHighlight() {
    searchMatches.forEach(el => el.classList.remove("match-active"));
    if (currentMatchIndex >= 0 && currentMatchIndex < searchMatches.length) {
        const target = searchMatches[currentMatchIndex];
        target.classList.add("match-active");
        target.scrollIntoView({
            behavior: "smooth",
            block: "center"
        });
    }
}

function navigateSearch(offset) {
    if (searchMatches.length === 0) return;
    currentMatchIndex += offset;
    if (currentMatchIndex >= searchMatches.length) currentMatchIndex = 0;
    if (currentMatchIndex < 0) currentMatchIndex = searchMatches.length - 1;
    updateSearchStatsUI();
    applyFocusHighlight();
}

document.getElementById("searchBox").addEventListener("keydown", function(e) {
    if (searchMatches.length === 0) return;
    if (e.key === "Enter") {
        e.preventDefault();
        if (e.shiftKey) {
            navigateSearch(-1);
        } else {
            navigateSearch(1);
        }
    }
});
</script>

</body>
</html>
