<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FF API Explorer</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>

@font-face{
font-family:'GFF';
src:url('https://dl.dir.freefiremobile.com/common/web_event/common/fonts/website/GFFLatinW05-Bold.woff');
}

:root{
--yellow:#ffde00;
--bg:#000;
--card:#111;
--border:#262626;
--text:#fff;
--green:#00ff95;
}

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'GFF',sans-serif;
}

body{
background:#000;
color:#fff;
min-height:100vh;
padding:20px;
background-image:url('https://dl.dir.freefiremobile.com/common/web_event/official2/dist/client/img/bg_pc.617c669.jpg');
background-size:cover;
background-attachment:fixed;
}

body::before{
content:'';
position:fixed;
inset:0;
background:rgba(0,0,0,.92);
z-index:-1;
}

.container{
max-width:1100px;
margin:auto;
}

.logo{
text-align:center;
font-size:42px;
font-style:italic;
margin-bottom:25px;
color:var(--yellow);
}

.card{
background:#101010;
border:1px solid var(--border);
border-radius:20px;
padding:20px;
margin-bottom:20px;
}

.input{
width:100%;
height:60px;
background:#0b0b0b;
border:1px solid #2a2a2a;
border-radius:16px;
padding:0 18px;
font-size:16px;
color:#fff;
outline:none;
}

.regions{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(100px,1fr));
gap:10px;
margin-top:20px;
}

.region{
height:52px;
border:none;
border-radius:14px;
background:#171717;
color:#fff;
cursor:pointer;
font-size:14px;
}

.region.active{
background:var(--yellow);
color:#000;
}

.run{
width:100%;
height:64px;
background:var(--yellow);
border:none;
border-radius:18px;
font-size:18px;
cursor:pointer;
margin-top:20px;
color:#000;
}

.stats{
display:flex;
gap:15px;
margin-top:15px;
flex-wrap:wrap;
}

.stat{
background:#0d0d0d;
padding:12px 16px;
border-radius:12px;
border:1px solid #222;
font-size:13px;
}

.search{
margin-top:15px;
}

.output{
margin-top:20px;
display:grid;
gap:12px;
}

.link{
background:#0c0c0c;
border:1px solid #242424;
border-radius:14px;
padding:14px;
word-break:break-all;
}

.link-top{
display:flex;
justify-content:space-between;
gap:10px;
margin-bottom:10px;
}

.badge{
background:#1c1c1c;
padding:6px 10px;
border-radius:8px;
font-size:11px;
color:var(--green);
}

.actions{
display:flex;
gap:10px;
margin-top:10px;
}

.btn{
flex:1;
height:42px;
border:none;
border-radius:12px;
cursor:pointer;
background:#181818;
color:#fff;
}

.preview{
margin-top:10px;
max-width:100%;
border-radius:12px;
display:none;
}

.loading{
text-align:center;
padding:30px;
font-size:18px;
display:none;
}

</style>
</head>

<body>

<div class="container">

<div class="logo">
FF API EXPLORER
</div>

<div class="card">

<input
id="endpoint"
class="input"
placeholder="Enter Endpoint"
/>

<div class="regions">

<button class="region active" data-server="ind">IND</button>
<button class="region" data-server="br">BR</button>
<button class="region" data-server="sg">SG</button>
<button class="region" data-server="na">NA</button>
<button class="region" data-server="eu">EU</button>
<button class="region" data-server="pk">PK</button>

</div>

<button class="run" onclick="runApi()">
RUN API
</button>

<div class="stats">

<div class="stat">
Links:
<span id="count">0</span>
</div>

<div class="stat">
Server:
<span id="serverText">ind</span>
</div>

</div>

<input
id="search"
class="input search"
placeholder="Search links..."
oninput="filterLinks()"
/>

</div>

<div class="loading" id="loading">
Loading...
</div>

<div class="output" id="output"></div>

</div>

<script>

let selectedServer = "ind";
let allLinks = [];

document.querySelectorAll(".region").forEach(btn=>{

btn.onclick=()=>{

document.querySelectorAll(".region")
.forEach(x=>x.classList.remove("active"));

btn.classList.add("active");

selectedServer = btn.dataset.server;

document.getElementById("serverText")
.innerText = selectedServer;
};

});

async function runApi(){

const endpoint =
document.getElementById("endpoint").value.trim();

if(!endpoint){
alert("Enter endpoint");
return;
}

document.getElementById("loading").style.display="block";
document.getElementById("output").innerHTML="";

try{

const res = await fetch(
`/run_script?server=${selectedServer}&name=${encodeURIComponent(endpoint)}`
);

const data = await res.json();

document.getElementById("loading").style.display="none";

if(!data.success){

document.getElementById("output").innerHTML =
`<div class="card">${data.error}</div>`;

return;
}

allLinks = data.strings;

document.getElementById("count").innerText =
allLinks.length;

renderLinks(allLinks);

}catch(err){

document.getElementById("loading").style.display="none";

document.getElementById("output").innerHTML =
`<div class="card">${err}</div>`;
}

}

function renderLinks(links){

const output = document.getElementById("output");

output.innerHTML = "";

links.forEach(link=>{

const isImage =
link.match(/\.(png|jpg|jpeg|webp|gif)$/i);

const div = document.createElement("div");

div.className = "link";

div.innerHTML = `

<div class="link-top">

<div class="badge">
${link.split('.').pop().toUpperCase()}
</div>

</div>

<div>${link}</div>

<div class="actions">

<button class="btn"
onclick="copyLink('${link}')">
COPY
</button>

<a href="${link}" target="_blank">
<button class="btn">
OPEN
</button>
</a>

</div>

${isImage
? `<img class="preview" src="${link}" onload="this.style.display='block'">`
: ''
}

`;

output.appendChild(div);

});

}

function copyLink(link){

navigator.clipboard.writeText(link);

}

function filterLinks(){

const q =
document.getElementById("search")
.value.toLowerCase();

const filtered =
allLinks.filter(x=>
x.toLowerCase().includes(q)
);

renderLinks(filtered);

}

</script>

</body>
</html>
