<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Free Fire API Tool</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');

:root{
    --bg:#070707;
    --panel:#111111;
    --panel2:#171717;
    --border:#262626;
    --yellow:#ffde00;
    --green:#00ff99;
    --red:#ff4747;
    --text:#ffffff;
    --muted:#8f8f8f;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:var(--bg);
    color:var(--text);
    font-family:'Inter',sans-serif;
    padding:18px;
}

.container{
    max-width:1200px;
    margin:auto;
}

.title{
    text-align:center;
    margin-bottom:20px;
}

.title h1{
    font-size:34px;
    font-weight:900;
    color:var(--yellow);
}

.title p{
    color:var(--muted);
    font-size:13px;
    margin-top:6px;
}

.panel{
    background:var(--panel);
    border:1px solid var(--border);
    border-radius:18px;
    padding:18px;
    margin-bottom:18px;
}

.search-box{
    display:flex;
    gap:12px;
    flex-wrap:wrap;
}

.input{
    flex:1;
    min-width:240px;
    height:52px;
    border:none;
    outline:none;
    background:var(--panel2);
    border:1px solid var(--border);
    border-radius:14px;
    padding:0 16px;
    color:white;
    font-size:15px;
}

.main-btn{
    height:52px;
    padding:0 22px;
    border:none;
    border-radius:14px;
    background:var(--yellow);
    color:black;
    font-weight:800;
    cursor:pointer;
    transition:.15s;
}

.main-btn:hover{
    transform:translateY(-1px);
}

.server-grid{
    margin-top:16px;
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(120px,1fr));
    gap:10px;
}

.server-btn{
    height:48px;
    border:none;
    border-radius:12px;
    background:var(--panel2);
    border:1px solid var(--border);
    color:white;
    cursor:pointer;
    font-weight:700;
    transition:.15s;
}

.server-btn:hover{
    border-color:var(--yellow);
}

.server-btn.active{
    background:var(--yellow);
    color:black;
}

.top-tools{
    display:flex;
    flex-wrap:wrap;
    gap:10px;
    margin-bottom:16px;
}

.tool-btn{
    background:var(--panel2);
    border:1px solid var(--border);
    color:white;
    padding:10px 14px;
    border-radius:10px;
    cursor:pointer;
    font-size:13px;
    font-weight:700;
}

.tool-btn:hover{
    border-color:var(--yellow);
}

.search-filter{
    width:100%;
    margin-bottom:16px;
}

.stats{
    display:flex;
    flex-wrap:wrap;
    gap:12px;
    margin-bottom:16px;
}

.stat-box{
    flex:1;
    min-width:140px;
    background:var(--panel2);
    border:1px solid var(--border);
    border-radius:14px;
    padding:14px;
}

.stat-title{
    color:var(--muted);
    font-size:12px;
    margin-bottom:6px;
}

.stat-value{
    font-size:24px;
    font-weight:800;
}

.output{
    display:flex;
    flex-direction:column;
    gap:10px;
    max-height:70vh;
    overflow:auto;
}

.result-card{
    background:var(--panel2);
    border:1px solid var(--border);
    border-radius:14px;
    padding:14px;
    display:flex;
    align-items:center;
    gap:12px;
}

.result-content{
    flex:1;
    overflow:hidden;
}

.result-text{
    word-break:break-all;
    line-height:1.5;
    font-size:13px;
}

.badge{
    min-width:70px;
    text-align:center;
    padding:7px 10px;
    border-radius:10px;
    font-size:11px;
    font-weight:800;
}

.badge.link{
    background:#102116;
    color:var(--green);
}

.badge.raw{
    background:#222;
    color:#ccc;
}

.copy-btn{
    border:none;
    background:var(--yellow);
    color:black;
    padding:10px 14px;
    border-radius:10px;
    font-weight:800;
    cursor:pointer;
}

.copy-btn:hover{
    opacity:.9;
}

a{
    color:#56b3ff;
    text-decoration:none;
}

.status{
    margin-top:12px;
    color:var(--muted);
    font-size:13px;
}

.loading{
    color:var(--yellow);
}

.error{
    color:var(--red);
}

.success{
    color:var(--green);
}

::-webkit-scrollbar{
    width:8px;
}

::-webkit-scrollbar-thumb{
    background:#2f2f2f;
    border-radius:10px;
}

@media(max-width:700px){

    .result-card{
        flex-direction:column;
        align-items:flex-start;
    }

    .copy-btn{
        width:100%;
    }

}
</style>
</head>
<body>

<div class="container">

    <div class="title">
        <h1>FREE FIRE API TOOL</h1>
        <p>Advanced Raw String & Link Extractor</p>
    </div>

    <div class="panel">

        <div class="search-box">
            <input id="apiInput" class="input" type="text" placeholder="Enter API Name">
            <button class="main-btn" onclick="runSelectedServer()">
                FETCH DATA
            </button>
        </div>

        <div class="server-grid">

            <button class="server-btn active" onclick="selectServer(this,'ind')">IND</button>
            <button class="server-btn" onclick="selectServer(this,'mea')">MEA</button>
            <button class="server-btn" onclick="selectServer(this,'id')">ID</button>
            <button class="server-btn" onclick="selectServer(this,'cis')">CIS</button>
            <button class="server-btn" onclick="selectServer(this,'br')">BR</button>
            <button class="server-btn" onclick="selectServer(this,'latam')">LATAM</button>
            <button class="server-btn" onclick="selectServer(this,'vn')">VN</button>
            <button class="server-btn" onclick="selectServer(this,'tw')">TW</button>
            <button class="server-btn" onclick="selectServer(this,'th')">TH</button>
            <button class="server-btn" onclick="selectServer(this,'sg')">SG</button>
            <button class="server-btn" onclick="selectServer(this,'eu')">EU</button>
            <button class="server-btn" onclick="selectServer(this,'na')">NA</button>
            <button class="server-btn" onclick="selectServer(this,'pk')">PK</button>
            <button class="server-btn" onclick="selectServer(this,'bd')">BD</button>

        </div>

    </div>

    <div class="panel">

        <div class="top-tools">

            <button class="tool-btn" onclick="showMode('all')">
                ALL
            </button>

            <button class="tool-btn" onclick="showMode('links')">
                LINKS ONLY
            </button>

            <button class="tool-btn" onclick="showMode('raw')">
                RAW ONLY
            </button>

            <button class="tool-btn" onclick="copyAll()">
                COPY ALL
            </button>

            <button class="tool-btn" onclick="downloadTXT()">
                EXPORT TXT
            </button>

        </div>

        <input
            type="text"
            id="searchFilter"
            class="input search-filter"
            placeholder="Filter Results..."
            oninput="renderResults()"
        >

        <div class="stats">

            <div class="stat-box">
                <div class="stat-title">TOTAL</div>
                <div class="stat-value" id="totalCount">0</div>
            </div>

            <div class="stat-box">
                <div class="stat-title">LINKS</div>
                <div class="stat-value" id="linkCount">0</div>
            </div>

            <div class="stat-box">
                <div class="stat-title">RAW</div>
                <div class="stat-value" id="rawCount">0</div>
            </div>

        </div>

        <div class="output" id="output"></div>

        <div class="status" id="status">
            Ready
        </div>

    </div>

</div>

<script>

let currentServer = "ind";
let allResults = [];
let currentMode = "all";

function selectServer(el, server){

    document.querySelectorAll('.server-btn')
    .forEach(btn => btn.classList.remove('active'));

    el.classList.add('active');

    currentServer = server;
}

function showMode(mode){
    currentMode = mode;
    renderResults();
}

async function runSelectedServer(){

    const api = document.getElementById('apiInput').value.trim();

    if(!api){
        alert("Enter API name");
        return;
    }

    const output = document.getElementById('output');
    const status = document.getElementById('status');

    output.innerHTML = "";

    status.className = "status loading";
    status.textContent = "Loading API response...";

    try{

        const response = await fetch(
            `/run_script?server=${currentServer}&name=${encodeURIComponent(api)}`
        );

        const data = await response.json();

        if(data.error){

            status.className = "status error";
            status.textContent = data.error;
            return;
        }

        allResults = data.strings || [];

        updateCounts();

        renderResults();

        status.className = "status success";
        status.textContent =
            `Loaded ${allResults.length} strings`;

    }catch(err){

        status.className = "status error";
        status.textContent = "Request failed";

    }

}

function updateCounts(){

    const links = allResults.filter(x =>
        x.includes("http://") || x.includes("https://")
    );

    document.getElementById('totalCount').textContent =
        allResults.length;

    document.getElementById('linkCount').textContent =
        links.length;

    document.getElementById('rawCount').textContent =
        allResults.length - links.length;
}

function renderResults(){

    const output = document.getElementById('output');

    output.innerHTML = "";

    const filter =
        document.getElementById('searchFilter')
        .value
        .toLowerCase();

    let filtered = allResults.filter(item =>
        item.toLowerCase().includes(filter)
    );

    if(currentMode === "links"){

        filtered = filtered.filter(item =>
            item.includes("http://") ||
            item.includes("https://")
        );

    }

    if(currentMode === "raw"){

        filtered = filtered.filter(item =>
            !item.includes("http://") &&
            !item.includes("https://")
        );

    }

    filtered.forEach(item => {

        const isLink =
            item.includes("http://") ||
            item.includes("https://");

        const card = document.createElement('div');

        card.className = "result-card";

        card.innerHTML = `

            <div class="badge ${isLink ? 'link' : 'raw'}">
                ${isLink ? 'LINK' : 'RAW'}
            </div>

            <div class="result-content">
                <div class="result-text">
                    ${
                        isLink
                        ? `<a href="${item}" target="_blank">${escapeHtml(item)}</a>`
                        : escapeHtml(item)
                    }
                </div>
            </div>

            <button class="copy-btn">
                COPY
            </button>
        `;

        card.querySelector('.copy-btn')
        .onclick = () => {

            navigator.clipboard.writeText(item);

        };

        output.appendChild(card);

    });

}

function copyAll(){

    navigator.clipboard.writeText(
        allResults.join("\n")
    );

}

function downloadTXT(){

    const blob = new Blob(
        [allResults.join("\n")],
        {type:'text/plain'}
    );

    const a = document.createElement('a');

    a.href = URL.createObjectURL(blob);

    a.download = "results.txt";

    a.click();

}

function escapeHtml(text){

    return text
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;");

}

</script>

</body>
</html>
