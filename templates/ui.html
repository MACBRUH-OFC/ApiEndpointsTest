<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>FREE FIRE API ENGINE</title>

<link rel="preconnect" href="https://fonts.googleapis.com">

<style>
@font-face {
    font-family: 'GFF';
    src: url('https://dl.dir.freefiremobile.com/common/web_event/common/fonts/website/GFFLatinW05-Bold.woff') format('woff');
}

:root {
    --yellow: #ffde00;
    --bg: #030303;
    --panel: #0a0a0a;
    --card: #0f0f0f;
    --border: #1a1a1a;
    --border-hover: #2d2d2d;
    --text: #e0e0e0;
    --muted: #606060;
    
    /* Contrast highlights */
    --match-bg: #ffe600;
    --match-text: #000000;
    --match-active: #ff5e00;
}

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    background-color: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    min-height: 100vh;
    letter-spacing: -0.2px;
}

/* Premium micro scrollbars */
::-webkit-scrollbar {
    width: 6px;
    height: 6px;
}
::-webkit-scrollbar-track {
    background: #000000;
}
::-webkit-scrollbar-thumb {
    background: #1e1e1e;
    border-radius: 3px;
}
::-webkit-scrollbar-thumb:hover {
    background: var(--yellow);
}

.wrapper {
    width: 100%;
    max-width: 1100px;
    margin: 0 auto;
    padding: 40px 24px;
}

/* Header Optimization */
header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid var(--border);
    padding-bottom: 20px;
    margin-bottom: 32px;
}

.brand-group {
    display: flex;
    align-items: center;
    gap: 16px;
}

.brand-logo {
    height: 24px;
    object-fit: contain;
}

.badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 4px 10px;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 6px;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.5px;
    color: var(--muted);
}

.dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--yellow);
    box-shadow: 0 0 8px var(--yellow);
    animation: pulseGlow 2s infinite alternate;
}

@keyframes pulseGlow {
    0% { transform: scale(0.9); box-shadow: 0 0 4px var(--yellow); }
    100% { transform: scale(1.1); box-shadow: 0 0 12px var(--yellow); }
}

.engine-title {
    font-family: 'GFF', sans-serif;
    font-size: 18px;
    font-style: italic;
    text-transform: uppercase;
}
.engine-title span {
    color: var(--yellow);
}

/* Official Structured Containers */
.dashboard-container {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 20px;
    margin-bottom: 20px;
    box-shadow: 0 8px 24px rgba(0, 0, 0, 0.4);
}

/* Pure Inputs UI */
.input-row {
    position: relative;
    margin-bottom: 12px;
}

.main-input {
    width: 100%;
    height: 52px;
    background: #000000;
    border: 1px solid var(--border);
    border-radius: 8px;
    color: #ffffff;
    padding: 0 140px 0 16px;
    font-size: 14px;
    font-family: monospace;
    outline: none;
    transition: all 0.2s ease;
}

.main-input:focus {
    border-color: var(--yellow);
    box-shadow: 0 0 14px rgba(255, 222, 0, 0.12);
}

.run-action-btn {
    position: absolute;
    right: 6px;
    top: 6px;
    height: 40px;
    padding: 0 20px;
    background: var(--yellow);
    border: none;
    border-radius: 6px;
    color: #000000;
    font-family: 'GFF', sans-serif;
    font-size: 13px;
    font-weight: 900;
    cursor: pointer;
    transition: background 0.15s ease;
}

.run-action-btn:hover {
    background: #e5c800;
}

/* Recents/History pills layout */
.history-row {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    align-items: center;
}

.history-pill {
    padding: 4px 10px;
    background: #000000;
    border: 1px solid var(--border);
    border-radius: 4px;
    font-size: 11px;
    color: #a0a0a0;
    cursor: pointer;
    transition: all 0.15s ease;
    font-family: monospace;
}

.history-pill:hover {
    border-color: var(--yellow);
    color: var(--yellow);
    background: rgba(255, 222, 0, 0.02);
}

.section-label {
    font-size: 10px;
    text-transform: uppercase;
    color: var(--muted);
    font-weight: 700;
    letter-spacing: 0.8px;
    margin-bottom: 12px;
    display: block;
}

.server-selector {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(70px, 1fr));
    gap: 6px;
}

.srv-chip {
    height: 34px;
    background: #000000;
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--muted);
    font-size: 11px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.15s ease;
}

.srv-chip:hover {
    border-color: var(--border-hover);
    color: #fff;
}

.srv-chip.active {
    background: var(--yellow);
    border-color: var(--yellow);
    color: #000000;
    box-shadow: 0 0 10px rgba(255, 222, 0, 0.25);
}

/* Perspective View Switcher options */
.view-options {
    display: flex;
    gap: 8px;
}

.opt-toggle {
    padding: 8px 16px;
    background: #000000;
    border: 1px solid var(--border);
    border-radius: 6px;
    font-size: 11px;
    font-weight: 700;
    color: var(--muted);
    cursor: pointer;
    transition: all 0.15s ease;
}

.opt-toggle:hover {
    border-color: var(--border-hover);
}

.opt-toggle.active {
    border-color: var(--yellow);
    color: var(--yellow);
    background: rgba(255, 222, 0, 0.02);
}

/* Performance Metrics Track */
.metrics-row {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
}

.metric-card {
    background: #000000;
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 14px 16px;
}

.metric-card .lbl {
    font-size: 10px;
    text-transform: uppercase;
    color: var(--muted);
    letter-spacing: 0.5px;
    margin-bottom: 4px;
}

.metric-card .val {
    font-size: 20px;
    font-weight: 700;
    font-family: monospace;
}

/* Control Hub Console Deck */
.control-deck {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 16px;
    margin-bottom: 12px;
}

.search-wrapper {
    flex: 1;
    display: flex;
    align-items: center;
    background: #000000;
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 0 12px;
    height: 38px;
}

.search-wrapper:focus-within {
    border-color: var(--border-hover);
}

.search-input {
    width: 100%;
    background: transparent;
    border: none;
    outline: none;
    color: #ffffff;
    font-size: 13px;
}

.search-counter {
    font-size: 11px;
    color: var(--muted);
    font-family: monospace;
    white-space: nowrap;
    margin-right: 8px;
}

.search-nav {
    display: flex;
    gap: 4px;
}

.search-step-btn {
    width: 24px;
    height: 24px;
    background: transparent;
    border: none;
    color: var(--muted);
    cursor: pointer;
    border-radius: 4px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 11px;
}

.search-step-btn:hover:not(:disabled) {
    color: #fff;
    background: var(--card);
}

.search-step-btn:disabled {
    opacity: 0.2;
    cursor: not-allowed;
}

.utility-actions {
    display: flex;
    gap: 6px;
}

.util-btn {
    height: 38px;
    padding: 0 14px;
    background: #000000;
    border: 1px solid var(--border);
    border-radius: 6px;
    color: #a0a0a0;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 6px;
    transition: all 0.15s ease;
}

.util-btn:hover {
    border-color: var(--border-hover);
    color: #ffffff;
}

/* Output Monitor Console screen background scanning scanlines */
.console-monitor {
    width: 100%;
    height: 500px;
    background: #000000;
    background-image: linear-gradient(rgba(10, 10, 10, 0.45) 50%, rgba(0, 0, 0, 0.45) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.02), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.02));
    background-size: 100% 4px, 6px 100%;
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 0;
    overflow: auto;
    color: #bbbbbb;
    font-family: ui-monospace, SFMono-Regular, SF Mono, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
}

/* Group Block Layouts */
.group-block {
    margin-bottom: 0px;
    border-bottom: 1px solid #141414;
}

.group-block:last-child {
    border-bottom: none;
}

.group-header {
    font-family: 'GFF', sans-serif;
    font-size: 11px;
    text-transform: uppercase;
    color: var(--yellow);
    letter-spacing: 1px;
    padding: 12px 14px;
    background: #060606;
    border-bottom: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: center;
    position: sticky;
    top: 0;
    z-index: 10;
}

.group-meta {
    display: flex;
    align-items: center;
    gap: 8px;
}

.group-copy-btn {
    background: transparent;
    border: none;
    color: var(--muted);
    font-size: 9px;
    font-weight: 700;
    cursor: pointer;
    text-transform: uppercase;
    padding: 2px 6px;
    border-radius: 3px;
    transition: all 0.15s ease;
}

.group-copy-btn:hover {
    color: var(--yellow);
    background: rgba(255, 222, 0, 0.05);
}

.group-count {
    background: rgba(255, 222, 0, 0.08);
    padding: 2px 8px;
    border-radius: 4px;
    font-size: 10px;
    color: var(--yellow);
    border: 1px solid rgba(255, 222, 0, 0.15);
}

/* Row Styling with Media support */
.url-row {
    display: flex;
    align-items: center;
    padding: 10px 14px;
    border-bottom: 1px solid #141414;
    font-family: monospace;
    font-size: 13px;
    word-break: break-all;
    background: #020202;
    position: relative;
    cursor: pointer;
    transition: background 0.15s ease;
}

.url-row:hover {
    background: #0a0a0a;
}

.url-row:last-child {
    border-bottom: none;
}

.url-href {
    color: #58a6ff;
    text-decoration: none;
    transition: color 0.1s ease;
}

.url-href:hover {
    color: #79b8ff;
    text-decoration: underline;
}

.row-actions-block {
    margin-left: auto;
    display: flex;
    align-items: center;
    gap: 8px;
    padding-left: 12px;
}

/* Clean vector SVG for clipboard copy */
.copy-svg-icon {
    width: 14px;
    height: 14px;
    color: var(--muted);
    cursor: pointer;
    transition: color 0.15s ease, transform 0.1s ease;
}

.copy-svg-icon:hover {
    color: var(--yellow);
    transform: scale(1.1);
}

/* Fixed Image Alignment Frame */
.media-preview-container {
    flex-shrink: 0;
    margin-right: 12px;
    width: 44px;
    height: 44px;
    background: #000000;
    border: 1px solid var(--border);
    border-radius: 6px;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
}

.img-preview-thumb {
    max-width: 100%;
    max-height: 100%;
    object-fit: contain; /* Prevents vertical/horizontal stretching on diverse dimensions */
    cursor: pointer;
    display: block;
    transition: filter 0.15s ease;
}

.img-preview-thumb:hover {
    filter: brightness(1.2);
}

.video-preview-thumb {
    max-width: 100%;
    max-height: 100%;
    object-fit: contain;
    cursor: pointer;
    display: block;
    transition: filter 0.15s ease;
}

.video-preview-thumb:hover {
    filter: brightness(1.2);
}

.audio-preview-player {
    height: 28px;
    width: 140px;
    border-radius: 4px;
    background: #000000;
}

/* Decoded Row Layouts */
.decoded-row {
    padding: 8px 14px;
    border-bottom: 1px solid #141414;
    font-family: monospace;
    font-size: 13px;
    color: #bbbbbb;
    word-break: break-all;
}

.decoded-row:last-child {
    border-bottom: none;
}

/* Search Highlights */
mark.search-match {
    background-color: var(--match-bg);
    color: var(--match-text);
    border-radius: 1px;
}

mark.search-match.match-active {
    background-color: var(--match-active);
    color: #ffffff;
}

/* Premium Simulated Loader */
.scanner-loader {
    padding: 30px;
    text-align: center;
    font-family: monospace;
}

.scanner-text {
    font-size: 13px;
    letter-spacing: 1px;
    color: var(--yellow);
    margin-bottom: 16px;
    animation: pulseBlink 1.5s infinite alternate;
}

@keyframes pulseBlink {
    0% { opacity: 0.6; }
    100% { opacity: 1; }
}

.scanner-bar-container {
    width: 100%;
    max-width: 320px;
    height: 8px;
    background: #111111;
    border: 1px solid var(--border);
    border-radius: 4px;
    margin: 0 auto;
    overflow: hidden;
    position: relative;
}

.scanner-bar-fill {
    width: 0%;
    height: 100%;
    background: var(--yellow);
    box-shadow: 0 0 10px var(--yellow);
    transition: width 0.1s linear;
}

.lightbox-overlay {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0, 0, 0, 0.95);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 10000;
}

.lightbox-content {
    position: relative;
    max-width: 90%;
    max-height: 90%;
}

.lightbox-content img {
    max-width: 100%;
    max-height: 90vh;
    object-fit: contain;
    border: 1px solid var(--border);
    border-radius: 8px;
    background: #000000;
    box-shadow: 0 10px 40px rgba(0, 0, 0, 0.8);
}

.lightbox-close {
    position: absolute;
    top: -40px;
    right: 0;
    background: transparent;
    border: none;
    color: #ffffff;
    font-size: 24px;
    cursor: pointer;
    transition: color 0.1s ease;
}

.lightbox-close:hover {
    color: var(--yellow);
}

.toast {
    position: fixed;
    bottom: 20px;
    right: 20px;
    background: #ffffff;
    color: #000000;
    padding: 10px 18px;
    border-radius: 6px;
    font-size: 12px;
    font-weight: 700;
    opacity: 0;
    transform: translateY(10px);
    transition: all 0.2s ease;
    z-index: 1000;
    pointer-events: none;
}

.toast.show {
    opacity: 1;
    transform: translateY(0);
}

@media (max-width: 768px) {
    header { flex-direction: column; align-items: flex-start; gap: 14px; }
    .control-deck { flex-direction: column; align-items: stretch; gap: 8px; }
    .server-selector { grid-template-columns: repeat(4, 1fr); }
    .metrics-row { grid-template-columns: 1fr; gap: 8px; }
}
</style>
</head>
<body>

<div class="wrapper">

    <!-- Header Block -->
    <header>
        <div class="brand-group">
            <img src="https://dl.dir.freefiremobile.com/common/web_event/official2/dist/client/img/full_logo.969f536.png" class="brand-logo" alt="FF">
            <div class="badge">
                <div class="dot"></div>
                <span>LIVE RESPONDER</span>
            </div>
        </div>
        <div class="engine-title">API <span>TOOL</span></div>
    </header>

    <!-- CONTAINER 1: Pipeline inputs & query caching -->
    <div class="dashboard-container">
        <div class="input-row">
            <input type="text" id="apiName" class="main-input" placeholder="Enter endpoint path string (e.g. LoginGetDesc)...">
            <button class="run-action-btn" onclick="runAPI()">SCAN ENGINE</button>
        </div>

        <div class="history-row" id="historyContainer">
            <!-- Dynamic pills populate here -->
        </div>
    </div>

    <!-- CONTAINER 2: Clusters selection -->
    <div class="dashboard-container">
        <div class="section-label">Target Region Cluster</div>
        <div class="server-selector" id="serverSelectorGrid">
            <button class="srv-chip active" onclick="setServer(this,'ind')">IND</button>
            <button class="srv-chip" onclick="setServer(this,'mea')">MEA</button>
            <button class="srv-chip" onclick="setServer(this,'id')">ID</button>
            <button class="srv-chip" onclick="setServer(this,'cis')">CIS</button>
            <button class="srv-chip" onclick="setServer(this,'br')">BR</button>
            <button class="srv-chip" onclick="setServer(this,'latam')">LATAM</button>
            <button class="srv-chip" onclick="setServer(this,'vn')">VN</button>
            <button class="srv-chip" onclick="setServer(this,'tw')">TW</button>
            <button class="srv-chip" onclick="setServer(this,'th')">TH</button>
            <button class="srv-chip" onclick="setServer(this,'sg')">SG</button>
            <button class="srv-chip" onclick="setServer(this,'eu')">EU</button>
            <button class="srv-chip" onclick="setServer(this,'na')">NA</button>
            <button class="srv-chip" onclick="setServer(this,'pk')">PK</button>
            <button class="srv-chip" onclick="setServer(this,'bd')">BD</button>
        </div>
    </div>

    <!-- CONTAINER 3: Perspective View Switcher -->
    <div class="dashboard-container">
        <div class="section-label">Output Perspective View</div>
        <div class="view-options">
            <button class="opt-toggle active" id="btn-links" onclick="setViewMode('links')">LINKS ONLY</button>
            <button class="opt-toggle" id="btn-decoded" onclick="setViewMode('decoded')">DECODED RESPONSE</button>
            <button class="opt-toggle" id="btn-raw" onclick="setViewMode('raw')">RAW RESPONSE</button>
        </div>
    </div>

    <!-- CONTAINER 4: Operational Metrics -->
    <div class="dashboard-container">
        <div class="metrics-row">
            <div class="metric-card">
                <div class="lbl">Total Decoded Strings</div>
                <div class="val" id="stringCount">0</div>
            </div>
            <div class="metric-card">
                <div class="lbl">Discovered Links</div>
                <div class="val" id="linkCount">0</div>
            </div>
            <div class="metric-card">
                <div class="lbl">Engine Status</div>
                <div class="val" id="statusText" style="color: var(--muted);">IDLE</div>
            </div>
        </div>
    </div>

    <!-- CONTAINER 5: Control deck & output monitor screen -->
    <div class="dashboard-container">
        <div class="control-deck">
            <div class="search-wrapper">
                <input type="text" class="search-input" id="searchBox" placeholder="Filter / Search output..." oninput="performSearch()">
                <span class="search-counter" id="searchCount">0/0</span>
                <div class="search-nav">
                    <button class="search-step-btn" id="prevSearchBtn" onclick="navigateSearch(-1)" disabled>▲</button>
                    <button class="search-step-btn" id="nextSearchBtn" onclick="navigateSearch(1)" disabled>▼</button>
                </div>
            </div>
            
            <div class="utility-actions">
                <button class="util-btn" onclick="copyOutput()">Copy</button>
                <button class="util-btn" onclick="downloadOutput()">Download</button>
                <button class="util-btn" onclick="clearOutput()">Reset</button>
            </div>
        </div>

        <div class="console-monitor" id="output">SYSTEM LOG: READY DEVICE OVERFLOW</div>
    </div>
</div>

<!-- Image Lightbox Modal Overlay -->
<div id="imageLightbox" class="lightbox-overlay" onclick="closeLightbox()">
    <div class="lightbox-content" onclick="event.stopPropagation()">
        <img id="lightboxImage" src="" alt="Preview">
        <button class="lightbox-close" onclick="closeLightbox()">✕</button>
    </div>
</div>

<div class="toast" id="toastNotifier">Copied to clipboard</div>

<script>
let selectedServer = "ind";
let viewMode = "links"; // Option states: 'links' | 'decoded' | 'raw'
let lastOutputText = "";
let currentLinksArray = [];
let apiCachedData = null;

let searchMatches = [];
let currentMatchIndex = -1;

let queryHistory = JSON.parse(localStorage.getItem("ff_query_history") || "[]");

const BASE_LINK = "https://dl.dir.freefiremobile.com/common/";

const VALID_EXTENSIONS = [
    "png", "jpg", "jpeg", "webp", "gif",
    "bmp", "ktx", "html", "json",
    "mp4", "mp3", "wav", "ogg", "webm"
];

// Initialize query history pills on page load
document.addEventListener("DOMContentLoaded", () => {
    updateHistoryUI();
});

function setServer(btn, server) {
    selectedServer = server;
    document.querySelectorAll(".srv-chip").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
}

function setViewMode(mode) {
    viewMode = mode;
    document.querySelectorAll(".opt-toggle").forEach(b => b.classList.remove("active"));
    document.getElementById(`btn-${mode}`).classList.add("active");
    if (apiCachedData) {
        renderOutput(apiCachedData);
    }
}

function updateHistoryUI() {
    const container = document.getElementById("historyContainer");
    if (queryHistory.length === 0) {
        container.innerHTML = `<span style="color: var(--muted); font-style: italic; font-size:11px;">No scan history stored.</span>`;
        return;
    }
    container.innerHTML = `<span style="color: var(--muted); font-size:11px; font-weight:700; margin-right:4px; text-transform:uppercase;">Recent Scans:</span>`;
    queryHistory.forEach(endpoint => {
        const pill = document.createElement("button");
        pill.className = "history-pill";
        pill.innerText = endpoint;
        pill.onclick = () => {
            document.getElementById("apiName").value = endpoint;
            runAPI();
        };
        container.appendChild(pill);
    });
}

function saveToHistory(endpoint) {
    if (!endpoint) return;
    queryHistory = queryHistory.filter(e => e !== endpoint);
    queryHistory.unshift(endpoint);
    if (queryHistory.length > 5) queryHistory.pop(); // Cache threshold
    localStorage.setItem("ff_query_history", JSON.stringify(queryHistory));
    updateHistoryUI();
}

function updateStatusUI(status, hexColor) {
    const el = document.getElementById("statusText");
    el.innerText = status;
    el.style.color = hexColor || "var(--text)";
}

function displayToast(msg) {
    const toast = document.getElementById("toastNotifier");
    toast.innerText = msg;
    toast.classList.add("show");
    setTimeout(() => toast.classList.remove("show"), 1800);
}

// Convert relative endpoints into working browser destination formats
function processHtmlUrl(val) {
    val = val.trim();
    if (!val) return null;

    // Direct filename format cleanups
    val = val.replace(/\.ff_extend/gi, '.jpg');
    val = val.replace(/\.ktx(p)?/gi, '.jpg');

    let val_lower = val.toLowerCase();

    // 1. Return absolute URLs as is
    if (val_lower.startsWith("http://") || val_lower.startsWith("https://")) {
        return { text: val, link: val };
    }

    // 2. Map half-link relative paths matching any extension (e.g. Local/IND/, test/, OB16/)
    const hasValidExtension = VALID_EXTENSIONS.some(ext => val_lower.endsWith('.' + ext)) || val_lower.endsWith('.ff_extend') || val_lower.endsWith('.ktxp');

    if (hasValidExtension) {
        const cleanVal = val.replace(/^\/+/, ''); // Clean duplicate slashes
        const cleanValLower = cleanVal.toLowerCase();

        let linkUrl = "";
        if (cleanValLower.startsWith("common/")) {
            linkUrl = "https://dl.dir.freefiremobile.com/" + cleanVal;
        } else {
            linkUrl = BASE_LINK + cleanVal;
        }
        // Return structured tuple: text represents relative endpoint path only, link represents target href
        return { text: val, link: linkUrl };
    }

    // 3. Map common social links
    const social_domains = ["instagram.com", "discord.gg", "youtube.com", "youtu.be", "facebook.com", "twitter.com", "x.com", "whatsapp.com", "linktr.ee"];
    if (social_domains.some(domain => val_lower.includes(domain))) {
        let linkUrl = val;
        if (!val_lower.startsWith("http://") && !val_lower.startsWith("https://")) {
            linkUrl = "https://" + val;
        }
        return { text: val, link: linkUrl };
    }

    return null;
}

function getCategory(url) {
    const lower = url.toLowerCase();
    if (/\.(png|jpg|jpeg|webp|gif|bmp)/i.test(lower)) return "images";
    if (/\.(mp4|webm)/i.test(lower)) return "videos";
    if (/\.(mp3|wav|ogg)/i.test(lower)) return "audio";
    return "other";
}

async function runAPI() {
    const apiName = document.getElementById("apiName").value.trim();
    if (!apiName) {
        alert("Enter a target endpoint path string.");
        return;
    }

    updateStatusUI("SCANNING", "var(--yellow)");
    resetSearchState();

    // Trigger visual simulation progress loader inside monitor console
    const output = document.getElementById("output");
    output.innerHTML = `
    <div class="scanner-loader">
        <div class="scanner-text" id="scannerStatus">INITIATING PIPELINE SCAN: 0%</div>
        <div class="scanner-bar-container">
            <div class="scanner-bar-fill" id="scannerProgress"></div>
        </div>
    </div>`;

    let progress = 0;
    const interval = setInterval(() => {
        if (progress < 90) {
            progress += Math.floor(Math.random() * 15) + 5;
            if (progress > 90) progress = 90;
            document.getElementById("scannerProgress").style.width = `${progress}%`;
            document.getElementById("scannerStatus").innerText = `SCANNING TARGET PIPELINE: ${progress}%`;
        }
    }, 150);

    try {
        let endpoint = `/run_script?server=${selectedServer}&name=${encodeURIComponent(apiName)}`;
        const res = await fetch(endpoint);
        const data = await res.json();

        clearInterval(interval);
        document.getElementById("scannerProgress").style.width = `100%`;
        document.getElementById("scannerStatus").innerText = `DECRYPTING PAYLOAD: 100%`;

        setTimeout(() => {
            if (data.error) {
                updateStatusUI("ERROR", "#ff4444");
                output.innerHTML = `<div style="color:#ff4444; font-family:monospace; padding: 16px;">Engine Fault: ${data.error}</div>`;
                return;
            }

            document.getElementById("stringCount").innerText = data.count || 0;
            document.getElementById("linkCount").innerText = data.raw_count || 0;
            updateStatusUI("ONLINE", "#00ff95");

            currentLinksArray = data.urls || [];
            apiCachedData = data; 
            
            saveToHistory(apiName);
            renderOutput(data);
        }, 300);

    } catch (err) {
        clearInterval(interval);
        updateStatusUI("FAULT", "#ff4444");
        output.innerHTML = `<div style="color:#ff4444; font-family:monospace; padding: 16px;">Network connection handshake termination reset.</div>`;
    }
}

function copyCategoryUrls(category) {
    const urls = [];
    const allCandidates = new Set([...(apiCachedData.urls || []), ...(apiCachedData.strings || [])]);
    allCandidates.forEach(cand => {
        const parsed = processHtmlUrl(cand);
        if (parsed && getCategory(parsed.link) === category) {
            urls.push(parsed.link);
        }
    });

    if (urls.length === 0) return;
    navigator.clipboard.writeText(urls.join("\n"));
    displayToast(`Copied all discovered ${category.toUpperCase()} endpoints`);
}

function openLightbox(src) {
    const lightbox = document.getElementById("imageLightbox");
    const img = document.getElementById("lightboxImage");
    img.src = src;
    lightbox.style.display = "flex";
}

function closeLightbox() {
    document.getElementById("imageLightbox").style.display = "none";
}

function renderOutput(data) {
    const output = document.getElementById("output");
    output.innerHTML = ""; 

    if (viewMode === "links") {
        let processedTuples = [];
        const allCandidates = new Set([...(data.urls || []), ...(data.strings || [])]);
        
        allCandidates.forEach(cand => {
            const parsed = processHtmlUrl(cand);
            if (parsed) {
                processedTuples.push(parsed);
            }
        });

        // De-duplicate tuples by link url
        const seen = new Set();
        processedTuples = processedTuples.filter(item => {
            const duplicate = seen.has(item.link);
            seen.add(item.link);
            return !duplicate;
        });

        processedTuples.sort((a, b) => a.text.localeCompare(b.text));
        currentLinksArray = processedTuples.map(item => item.text);

        if (processedTuples.length === 0) {
            output.innerHTML = `<div style="color:var(--muted); font-style:italic; padding: 16px;">No endpoint URLs matched.</div>`;
            lastOutputText = "";
        } else {
            const grouped = { images: [], videos: [], audio: [], other: [] };
            processedTuples.forEach(item => {
                grouped[getCategory(item.link)].push(item);
            });

            let finalHtml = "";

            // 1. Render IMAGES Category
            if (grouped.images.length > 0) {
                let sectionHtml = `<div class="group-block" id="block-images">
                    <div class="group-header">
                        <span>IMAGES</span>
                        <div class="group-meta">
                            <button class="group-copy-btn" onclick="copyCategoryUrls('images')">[Copy Group]</button>
                            <span class="group-count" id="badge-images">${grouped.images.length}</span>
                        </div>
                    </div>`;
                grouped.images.forEach(item => {
                    sectionHtml += `
                    <div class="url-row" data-url="${item.text}">
                        <div class="media-preview-container">
                            <img src="${item.link}" class="img-preview-thumb" loading="lazy" onclick="openLightbox('${item.link}')" onerror="this.src='https://dl.dir.freefiremobile.com/common/web_event/official2/dist/client/img/full_logo.969f536.png'">
                        </div>
                        <a href="${item.link}" target="_blank" class="url-href" onclick="event.stopPropagation();">${item.text}</a>
                        <div class="row-actions-block">
                            <!-- Clean SVG vector copy icon -->
                            <svg class="copy-svg-icon" viewBox="0 0 24 24" onclick="copyIndividualText('${item.link}')"><path fill="currentColor" d="M16 1H4c-1.1 0-2 .9-2 2v14h2V3h12V1zm3 4H8c-1.1 0-2 .9-2 22px;v44px;border-radius:4px;border:1px solid var(--border);margin-right:12px;v14c0 1.1.9 2 2 2h11c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm0 16H8V7h11v14z"/></svg>
                        </div>
                    </div>`;
                });
                sectionHtml += `</div>`;
                finalHtml += sectionHtml;
            }

            // 2. Render VIDEOS Category
            if (grouped.videos.length > 0) {
                let sectionHtml = `<div class="group-block" id="block-videos">
                    <div class="group-header">
                        <span>VIDEOS</span>
                        <div class="group-meta">
                            <button class="group-copy-btn" onclick="copyCategoryUrls('videos')">[Copy Group]</button>
                            <span class="group-count" id="badge-videos">${grouped.videos.length}</span>
                        </div>
                    </div>`;
                grouped.videos.forEach(item => {
                    sectionHtml += `
                    <div class="url-row" data-url="${item.text}">
                        <div class="media-preview-container">
                            <video src="${item.link}" class="video-preview-thumb" preload="metadata" muted loop onmouseover="this.play()" onmouseout="this.pause(); this.currentTime=0;"></video>
                        </div>
                        <a href="${item.link}" target="_blank" class="url-href" onclick="event.stopPropagation();">${item.text}</a>
                        <div class="row-actions-block">
                            <svg class="copy-svg-icon" viewBox="0 0 24 24" onclick="copyIndividualText('${item.link}')"><path fill="currentColor" d="M16 1H4c-1.1 0-2 .9-2 2v14h2V3h12V1zm3 4H8c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h11c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm0 16H8V7h11v14z"/></svg>
                        </div>
                    </div>`;
                });
                sectionHtml += `</div>`;
                finalHtml += sectionHtml;
            }

            // 3. Render AUDIO Category
            if (grouped.audio.length > 0) {
                let sectionHtml = `<div class="group-block" id="block-audio">
                    <div class="group-header">
                        <span>AUDIO</span>
                        <div class="group-meta">
                            <button class="group-copy-btn" onclick="copyCategoryUrls('audio')">[Copy Group]</button>
                            <span class="group-count" id="badge-audio">${grouped.audio.length}</span>
                        </div>
                    </div>`;
                grouped.audio.forEach(item => {
                    sectionHtml += `
                    <div class="url-row" data-url="${item.text}">
                        <div class="media-preview-container">
                            <audio src="${item.link}" controls class="audio-preview-player" onclick="event.stopPropagation();"></audio>
                        </div>
                        <a href="${item.link}" target="_blank" class="url-href" onclick="event.stopPropagation();">${item.text}</a>
                        <div class="row-actions-block">
                            <svg class="copy-svg-icon" viewBox="0 0 24 24" onclick="copyIndividualText('${item.link}')"><path fill="currentColor" d="M16 1H4c-1.1 0-2 .9-2 2v14h2V3h12V1zm3 4H8c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h11c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm0 16H8V7h11v14z"/></svg>
                        </div>
                    </div>`;
                });
                sectionHtml += `</div>`;
                finalHtml += sectionHtml;
            }

            // 4. Render OTHER configs/endpoints
            if (grouped.other.length > 0) {
                let sectionHtml = `<div class="group-block" id="block-other">
                    <div class="group-header">
                        <span>OTHER / CONFIGS</span>
                        <div class="group-meta">
                            <button class="group-copy-btn" onclick="copyCategoryUrls('other')">[Copy Group]</button>
                            <span class="group-count" id="badge-other">${grouped.other.length}</span>
                        </div>
                    </div>`;
                grouped.other.forEach(item => {
                    sectionHtml += `
                    <div class="url-row" data-url="${item.text}">
                        <a href="${item.link.startsWith('http') ? item.link : '#'}" target="_blank" class="url-href" onclick="event.stopPropagation();">${item.text}</a>
                        <div class="row-actions-block">
                            <svg class="copy-svg-icon" viewBox="0 0 24 24" onclick="copyIndividualText('${item.link}')"><path fill="currentColor" d="M16 1H4c-1.1 0-2 .9-2 2v14h2V3h12V1zm3 4H8c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h11c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm0 16H8V7h11v14z"/></svg>
                        </div>
                    </div>`;
                });
                sectionHtml += `</div>`;
                finalHtml += sectionHtml;
            }

            output.innerHTML = finalHtml;
            lastOutputText = processedTuples.map(item => item.link).join("\n");
        }
    } 
    else if (viewMode === "decoded") {
        const strings = data.strings || [];
        if (strings.length === 0) {
            output.innerHTML = `<div style="color:var(--muted); font-style:italic; padding: 16px;">No decoded protobuf strings found.</div>`;
            lastOutputText = "";
        } else {
            let html = "";
            strings.forEach(str => {
                let cleanStr = str.replace(/\.ff_extend/gi, '.jpg');
                cleanStr = cleanStr.replace(/\.ktx(p)?/gi, '.jpg');

                html += `
                <div class="decoded-row" data-text="${cleanStr}">
                    <span class="decoded-text">${cleanStr}</span>
                </div>`;
            });
            output.innerHTML = html;
            lastOutputText = strings.map(str => str.replace(/\.ff_extend/gi, '.jpg').replace(/\.ktx(p)?/gi, '.jpg')).join("\n");
        }
    } 
    else if (viewMode === "raw") {
        lastOutputText = data.raw_response || "";
        output.textContent = lastOutputText;
    }
    
    performSearch();
}

function copyOutput() {
    if (!lastOutputText) return;
    navigator.clipboard.writeText(lastOutputText);
    displayToast("Console content buffered");
}

function clearOutput() {
    document.getElementById("output").innerHTML = "SYSTEM LOG: FLUSH COMPLETED";
    document.getElementById("stringCount").innerText = "0";
    document.getElementById("linkCount").innerText = "0";
    document.getElementById("apiName").value = "";
    document.getElementById("searchBox").value = "";
    updateStatusUI("IDLE", "var(--muted)");
    lastOutputText = "";
    apiCachedData = null;
    currentLinksArray = [];
    resetSearchState();
    displayToast("System caches cleared");
}

function downloadOutput() {
    if (!lastOutputText) return;
    const blob = new Blob([lastOutputText], { type: "text/plain" });
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = `ff_api_logs_${selectedServer}.log`;
    a.click();
}

/* Node Searching & Real-time Filter-while-typing Logic */
function resetSearchState() {
    searchMatches = [];
    currentMatchIndex = -1;
    document.getElementById("searchCount").innerText = "0/0";
    document.getElementById("prevSearchBtn").disabled = true;
    document.getElementById("nextSearchBtn").disabled = true;
}

function performSearch() {
    const query = document.getElementById("searchBox").value.trim().toLowerCase();
    const output = document.getElementById("output");
    
    if (viewMode === "links") {
        if (!apiCachedData) return;
        const groups = output.querySelectorAll(".group-block");
        let visibleCount = 0;
        
        groups.forEach(group => {
            const rows = group.querySelectorAll(".url-row");
            let groupVisibleCount = 0;
            
            rows.forEach(row => {
                const url = row.getAttribute("data-url") || "";
                const hrefElement = row.querySelector(".url-href");
                
                if (!query) {
                    row.style.display = "flex";
                    hrefElement.innerHTML = url;
                    groupVisibleCount++;
                } else if (url.toLowerCase().includes(query)) {
                    row.style.display = "flex";
                    groupVisibleCount++;
                    const regex = new RegExp(`(${escapePattern(query)})`, "gi");
                    hrefElement.innerHTML = url.replace(regex, `<mark class="search-match">$1</mark>`);
                } else {
                    row.style.display = "none";
                }
            });
            
            if (groupVisibleCount > 0) {
                group.style.display = "block";
                const badge = group.querySelector(".group-count");
                if (badge) badge.innerText = groupVisibleCount;
                visibleCount += groupVisibleCount;
            } else {
                group.style.display = "none";
            }
        });
        
        searchMatches = Array.from(output.querySelectorAll("mark.search-match"));
        updateSearchStats(visibleCount, query);
    } 
    else if (viewMode === "decoded") {
        if (!apiCachedData) return;
        const rows = output.querySelectorAll(".decoded-row");
        let visibleCount = 0;
        
        rows.forEach(row => {
            const text = row.getAttribute("data-text") || "";
            const textElement = row.querySelector(".decoded-text");
            
            if (!query) {
                row.style.display = "block";
                textElement.innerHTML = text;
                visibleCount++;
            } else if (text.toLowerCase().includes(query)) {
                row.style.display = "block";
                visibleCount++;
                const regex = new RegExp(`(${escapePattern(query)})`, "gi");
                textElement.innerHTML = text.replace(regex, `<mark class="search-match">$1</mark>`);
            } else {
                row.style.display = "none";
            }
        });
        
        searchMatches = Array.from(output.querySelectorAll("mark.search-match"));
        updateSearchStats(visibleCount, query);
    } 
    else if (viewMode === "raw") {
        if (!query) {
            resetSearchState();
            output.textContent = lastOutputText;
            return;
        }

        output.textContent = lastOutputText;
        highlightNodes(output, query);
        searchMatches = Array.from(output.querySelectorAll("mark.search-match"));
        
        if (searchMatches.length > 0) {
            currentMatchIndex = 0;
            updateSearchStatsUI();
            applyFocusHighlight();
        } else {
            currentMatchIndex = -1;
            updateSearchStatsUI();
        }
    }
}

function updateSearchStats(visibleCount, query) {
    const total = viewMode === "links" ? (currentLinksArray.length) : (apiCachedData ? apiCachedData.strings.length : 0);
    if (!query) {
        document.getElementById("searchCount").innerText = `${total}/${total}`;
        resetSearchState();
    } else {
        const matchLen = searchMatches.length;
        document.getElementById("searchCount").innerText = `Filtered: ${visibleCount} | Matches: ${matchLen}`;
        const state = matchLen === 0;
        document.getElementById("prevSearchBtn").disabled = state;
        document.getElementById("nextSearchBtn").disabled = state;
        if (matchLen > 0) {
            currentMatchIndex = 0;
            applyFocusHighlight();
        } else {
            currentMatchIndex = -1;
        }
    }
}

function highlightNodes(root, token) {
    const regex = new RegExp(`(${escapePattern(token)})`, "gi");
    function parser(node) {
        if (node.nodeType === Node.TEXT_NODE) {
            if (node.textContent.match(regex)) {
                const wrapper = document.createElement("span");
                wrapper.innerHTML = node.textContent.replace(regex, `<mark class="search-match">$1</mark>`);
                node.parentNode.replaceChild(wrapper, node);
            }
        } else if (node.nodeType === Node.ELEMENT_NODE && node.nodeName !== 'MARK' && node.nodeName !== 'SCRIPT' && node.nodeName !== 'STYLE') {
            for (let i = node.childNodes.length - 1; i >= 0; i--) {
                parser(node.childNodes[i]);
            }
        }
    }
    parser(root);
}

function escapePattern(str) {
    return str.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
}

document.getElementById("searchBox").addEventListener("keydown", function(e) {
    if (searchMatches.length === 0) return;
    if (e.key === "Enter") {
        e.preventDefault();
        if (e.shiftKey) {
            navigateSearch(-1);
        } else {
            navigateSearch(1);
        }
    }
});
