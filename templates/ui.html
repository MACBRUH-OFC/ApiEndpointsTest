<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">

<title>FREE FIRE API TOOL</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>

@font-face{
    font-family:'GFF';
    src:url('https://dl.dir.freefiremobile.com/common/web_event/common/fonts/website/GFFLatinW05-Bold.woff') format('woff');
}

:root{
    --yellow:#ffde00;
    --bg:#070707;
    --panel:#111111;
    --panel2:#161616;
    --border:#262626;
    --green:#00ff95;
    --red:#ff4343;
    --blue:#38bdf8;
    --text:#ffffff;
    --muted:#7f7f7f;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#000;
    color:#fff;
    font-family:Arial,sans-serif;
    min-height:100vh;
    background-image:url('https://dl.dir.freefiremobile.com/common/web_event/official2/dist/client/img/bg_pc.617c669.jpg');
    background-size:cover;
    background-position:center;
    background-attachment:fixed;
}

body::before{
    content:"";
    position:fixed;
    inset:0;
    background:rgba(0,0,0,.92);
    z-index:-1;
}

.gff{
    font-family:'GFF',sans-serif;
}

.topbar{
    width:100%;
    height:70px;
    border-bottom:2px solid var(--yellow);
    display:flex;
    align-items:center;
    justify-content:center;
    background:#000;
    position:sticky;
    top:0;
    z-index:100;
}

.topbar img{
    height:28px;
}

.wrapper{
    width:100%;
    max-width:1400px;
    margin:auto;
    padding:20px;
}

.hero{
    text-align:center;
    margin-top:25px;
    margin-bottom:25px;
}

.hero h1{
    font-size:55px;
    line-height:0.9;
    font-style:italic;
}

.hero h1 span{
    color:var(--yellow);
}

.panel{
    background:rgba(15,15,15,.97);
    border:1px solid var(--border);
    border-radius:24px;
    padding:22px;
    box-shadow:0 20px 50px rgba(0,0,0,.7);
}

.input-box{
    width:100%;
    height:60px;
    border-radius:18px;
    border:1px solid var(--border);
    background:#0e0e0e;
    color:#fff;
    padding:0 18px;
    font-size:16px;
    outline:none;
    margin-bottom:18px;
}

.input-box:focus{
    border-color:var(--yellow);
}

.server-grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(120px,1fr));
    gap:10px;
    margin-bottom:18px;
}

.server-btn{
    height:50px;
    border:none;
    border-radius:14px;
    background:#151515;
    border:1px solid #252525;
    color:#fff;
    cursor:pointer;
    font-weight:bold;
    transition:.15s;
    font-size:13px;
}

.server-btn:hover{
    border-color:var(--yellow);
    transform:translateY(-2px);
}

.server-btn.active{
    background:var(--yellow);
    color:#000;
}

.option-row{
    display:flex;
    flex-wrap:wrap;
    gap:12px;
    margin-bottom:18px;
}

.option-card{
    flex:1;
    min-width:180px;
    height:58px;
    background:#131313;
    border:1px solid #262626;
    border-radius:16px;
    display:flex;
    align-items:center;
    padding:0 16px;
    gap:12px;
}

.option-card input{
    width:18px;
    height:18px;
    accent-color:var(--yellow);
}

.run-btn{
    width:100%;
    height:62px;
    border:none;
    border-radius:18px;
    background:var(--yellow);
    color:#000;
    font-size:18px;
    font-weight:900;
    cursor:pointer;
    transition:.15s;
    margin-bottom:18px;
}

.run-btn:hover{
    transform:translateY(-2px);
}

.stats{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
    gap:14px;
    margin-bottom:18px;
}

.stat-box{
    background:#131313;
    border:1px solid #252525;
    border-radius:18px;
    padding:18px;
}

.stat-title{
    font-size:11px;
    color:#8a8a8a;
    margin-bottom:10px;
    text-transform:uppercase;
    letter-spacing:1px;
}

.stat-value{
    font-size:26px;
    font-weight:900;
    color:var(--yellow);
}

.toolbar{
    display:flex;
    flex-wrap:wrap;
    gap:10px;
    margin-bottom:14px;
}

.tool-btn{
    height:45px;
    padding:0 18px;
    border:none;
    border-radius:12px;
    background:#181818;
    border:1px solid #262626;
    color:#fff;
    cursor:pointer;
    font-weight:bold;
}

.tool-btn:hover{
    border-color:var(--yellow);
}

.search-box{
    width:100%;
    height:52px;
    background:#101010;
    border:1px solid #252525;
    border-radius:14px;
    color:#fff;
    padding:0 16px;
    outline:none;
    margin-bottom:14px;
}

.output{
    width:100%;
    height:600px;
    background:#0c0c0c;
    border:1px solid #252525;
    border-radius:18px;
    padding:18px;
    overflow:auto;
    white-space:pre-wrap;
    word-break:break-word;
    line-height:1.5;
    font-size:14px;
}

.link-item{
    padding:12px;
    background:#131313;
    border:1px solid #252525;
    border-radius:12px;
    margin-bottom:10px;
    transition:.15s;
}

.link-item:hover{
    border-color:var(--yellow);
}

.link-item a{
    color:#7dd3fc;
    text-decoration:none;
    word-break:break-all;
}

.badge{
    display:inline-flex;
    align-items:center;
    gap:8px;
    padding:7px 14px;
    background:#161616;
    border:1px solid #252525;
    border-radius:999px;
    margin-bottom:18px;
}

.dot{
    width:7px;
    height:7px;
    border-radius:50%;
    background:var(--yellow);
    box-shadow:0 0 12px var(--yellow);
}

.loading{
    color:var(--yellow);
    animation:pulse 1s infinite;
}

@keyframes pulse{
    50%{
        opacity:.4;
    }
}

@media(max-width:700px){

.hero h1{
    font-size:38px;
}

.output{
    height:500px;
}

}

</style>
</head>
<body>

<div class="topbar">
    <img src="https://dl.dir.freefiremobile.com/common/web_event/official2/dist/client/img/full_logo.969f536.png">
</div>

<div class="wrapper">

    <div class="hero gff">
        <div class="badge">
            <div class="dot"></div>
            <span>LIVE API RESPONSE ANALYZER</span>
        </div>

        <h1>FREE FIRE<br><span>API TOOL</span></h1>
    </div>

    <div class="panel">

        <input type="text" id="apiName" class="input-box" placeholder="ENTER API NAME">

        <div class="server-grid">

            <button class="server-btn active" onclick="setServer(this,'ind')">IND</button>
            <button class="server-btn" onclick="setServer(this,'mea')">MEA</button>
            <button class="server-btn" onclick="setServer(this,'id')">ID</button>
            <button class="server-btn" onclick="setServer(this,'cis')">CIS</button>
            <button class="server-btn" onclick="setServer(this,'br')">BR</button>
            <button class="server-btn" onclick="setServer(this,'latam')">LATAM</button>
            <button class="server-btn" onclick="setServer(this,'vn')">VN</button>
            <button class="server-btn" onclick="setServer(this,'tw')">TW</button>
            <button class="server-btn" onclick="setServer(this,'th')">TH</button>
            <button class="server-btn" onclick="setServer(this,'sg')">SG</button>
            <button class="server-btn" onclick="setServer(this,'eu')">EU</button>
            <button class="server-btn" onclick="setServer(this,'na')">NA</button>
            <button class="server-btn" onclick="setServer(this,'pk')">PK</button>
            <button class="server-btn" onclick="setServer(this,'bd')">BD</button>

        </div>

        <div class="option-row">

            <div class="option-card">
                <input type="checkbox" id="showLinks" checked>
                <span>LINKS ONLY</span>
            </div>

            <div class="option-card">
                <input type="checkbox" id="showRaw">
                <span>RAW RESPONSE</span>
            </div>

            <div class="option-card">
                <input type="checkbox" id="showStrings">
                <span>ALL STRINGS</span>
            </div>

        </div>

        <button class="run-btn gff" onclick="runAPI()">
            RUN API SCAN
        </button>

        <div class="stats">

            <div class="stat-box">
                <div class="stat-title">TOTAL STRINGS</div>
                <div class="stat-value" id="stringCount">0</div>
            </div>

            <div class="stat-box">
                <div class="stat-title">TOTAL LINKS</div>
                <div class="stat-value" id="linkCount">0</div>
            </div>

            <div class="stat-box">
                <div class="stat-title">STATUS</div>
                <div class="stat-value" id="statusText">IDLE</div>
            </div>

        </div>

        <div class="toolbar">

            <button class="tool-btn" onclick="copyOutput()">
                <i class="fa-solid fa-copy"></i> COPY
            </button>

            <button class="tool-btn" onclick="downloadOutput()">
                <i class="fa-solid fa-download"></i> DOWNLOAD
            </button>

            <button class="tool-btn" onclick="clearOutput()">
                <i class="fa-solid fa-trash"></i> CLEAR
            </button>

        </div>

        <input type="text" class="search-box" id="searchBox" placeholder="SEARCH INSIDE RESULTS..." oninput="filterResults()">

        <div class="output" id="output">
READY
        </div>

    </div>

</div>

<script>

let selectedServer = "ind";
let lastOutput = "";
let currentLinks = [];

function setServer(btn,server){

    selectedServer = server;

    document.querySelectorAll(".server-btn").forEach(b=>{
        b.classList.remove("active");
    });

    btn.classList.add("active");
}

async function runAPI(){

    const apiName = document.getElementById("apiName").value.trim();

    if(!apiName){
        alert("ENTER API NAME");
        return;
    }

    document.getElementById("statusText").innerText = "LOADING";
    document.getElementById("output").innerHTML = '<div class="loading">FETCHING RESPONSE...</div>';

    try{

        const res = await fetch(`/run_script?server=${selectedServer}&name=${encodeURIComponent(apiName)}`);

        const data = await res.json();

        if(data.error){

            document.getElementById("statusText").innerText = "ERROR";

            document.getElementById("output").innerHTML = `
                <div style="color:#ff4343;">
                    ${data.error}
                </div>
            `;

            return;
        }

        document.getElementById("stringCount").innerText = data.count || 0;
        document.getElementById("linkCount").innerText = data.raw_count || 0;
        document.getElementById("statusText").innerText = "SUCCESS";

        currentLinks = data.urls || [];

        renderOutput(data);

    }catch(err){

        document.getElementById("statusText").innerText = "FAILED";

        document.getElementById("output").innerHTML = `
            <div style="color:#ff4343;">
                REQUEST FAILED
            </div>
        `;
    }
}

function renderOutput(data){

    const output = document.getElementById("output");

    const showLinks = document.getElementById("showLinks").checked;
    const showRaw = document.getElementById("showRaw").checked;
    const showStrings = document.getElementById("showStrings").checked;

    if(showRaw){

        lastOutput = data.raw_response || "";
        output.textContent = lastOutput;
        return;
    }

    if(showStrings){

        lastOutput = (data.strings || []).join("\n");
        output.textContent = lastOutput;
        return;
    }

    if(showLinks){

        let html = "";

        currentLinks.forEach(link=>{

            html += `
                <div class="link-item">
                    <a href="${link}" target="_blank">${link}</a>
                </div>
            `;
        });

        output.innerHTML = html;

        lastOutput = currentLinks.join("\n");
    }
}

function copyOutput(){

    navigator.clipboard.writeText(lastOutput);

    alert("COPIED");
}

function clearOutput(){

    document.getElementById("output").innerHTML = "CLEARED";

    lastOutput = "";
}

function downloadOutput(){

    if(!lastOutput){
        alert("NO OUTPUT");
        return;
    }

    const blob = new Blob([lastOutput],{
        type:"text/plain"
    });

    const a = document.createElement("a");

    a.href = URL.createObjectURL(blob);

    a.download = "results.txt";

    a.click();
}

function filterResults(){

    const q = document.getElementById("searchBox").value.toLowerCase();

    const items = document.querySelectorAll(".link-item");

    items.forEach(item=>{

        item.style.display = item.innerText.toLowerCase().includes(q)
        ? "block"
        : "none";

    });
}

</script>

</body>
</html>
